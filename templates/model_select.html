<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Selection — Paraval</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #06090f;
      color: #e8e0d0;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .panel {
      width: min(920px, calc(100vw - 40px));
      max-height: calc(100vh - 120px);
      overflow: auto;
      border-radius: 20px;
      border: 1px solid rgba(210,175,70,0.16);
      background: linear-gradient(155deg, rgba(18,22,36,0.94), rgba(12,15,26,0.98));
      box-shadow: 0 22px 56px rgba(0,0,0,0.6);
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 1.4rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #f0dfa0;
    }
    .sub {
      color: #8f8778;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: Consolas, 'Courier New', monospace;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid rgba(210,175,70,0.24);
      background: rgba(15, 19, 31, 0.96);
      color: #f0dfa0;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { border-color: rgba(210,175,70,0.55); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status {
      margin: 8px 0 12px;
      min-height: 22px;
      color: #8f8778;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.85rem;
    }
    .status.error { color: #d58f83; }
    .status.ok { color: #a8c78a; }
    .upload-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .file-input {
      flex: 1 1 260px;
      min-width: 240px;
      border: 1px solid rgba(210,175,70,0.2);
      background: rgba(15, 19, 31, 0.7);
      color: #d9cfae;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.8rem;
      font-family: Consolas, 'Courier New', monospace;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid rgba(210,175,70,0.15);
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      border-color: rgba(210,175,70,0.38);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.32);
    }
    .card.selected {
      border-color: rgba(210,175,70,0.72);
      box-shadow: 0 0 0 2px rgba(210,175,70,0.2);
    }
    .card h3 {
      color: #e8d898;
      font-size: 0.92rem;
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      word-break: break-word;
    }
    .meta {
      color: #9e937c;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.74rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .empty {
      border: 1px dashed rgba(210,175,70,0.2);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      color: #857d6f;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.86rem;
    }
  </style>
</head>
<body data-supabase-url="{{ supabase_url|e }}" data-supabase-anon-key="{{ supabase_anon_key|e }}">
<canvas id="bg-canvas"></canvas>
<div class="shell">
  <section class="panel">
    <div class="header">
      <div>
        <h1 class="title">Model Selection</h1>
        <p id="selected-character" class="sub">Loading selected character...</p>
      </div>
      <div class="actions">
        <button id="refresh-btn" class="btn" type="button">Refresh</button>
        <button id="enter-world-btn" class="btn" type="button" disabled>Enter World</button>
        <a class="btn" href="/hub">Back to Hub</a>
      </div>
    </div>

    <div id="status" class="status">Loading available models...</div>

    <div class="upload-row">
      <input id="model-file" class="file-input" type="file" accept=".glb,.gltf,.bin,image/*,model/gltf-binary,model/gltf+json" multiple />
      <button id="upload-btn" class="btn" type="button">Upload Model</button>
    </div>

    <div id="model-grid" class="grid"></div>
  </section>
</div>

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  function rand(a, b) { return a + Math.random() * (b - a); }
  for (let i = 0; i < 90; i++) {
    particles.push({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6), vx: rand(-0.06, 0.06), vy: rand(-0.14, -0.04), alpha: rand(0.08, 0.45), hue: rand(32, 52) });
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -4) { p.y = H + 4; p.x = rand(0, W); }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 68%, ${p.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script type="module">
const SELECTED_CHARACTER_STORAGE_KEY = 'paraval_selected_character';
const SELECTED_MODEL_STORAGE_KEY = 'paraval_selected_model_url';

const selectedCharacterLabelEl = document.getElementById('selected-character');
const statusEl = document.getElementById('status');
const modelGridEl = document.getElementById('model-grid');
const refreshBtn = document.getElementById('refresh-btn');
const enterWorldBtn = document.getElementById('enter-world-btn');
const modelFileEl = document.getElementById('model-file');
const uploadBtn = document.getElementById('upload-btn');

const urlSearch = new URLSearchParams(window.location.search || '');
const selectedCharacterId = String(urlSearch.get('characterId') || '').trim();
let selectedCharacter = null;
let selectedModelUrl = '';

function setStatus(msg, tone = '') {
  statusEl.textContent = msg;
  statusEl.className = `status${tone ? ` ${tone}` : ''}`;
}

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function loadSelectedCharacter() {
  try {
    const raw = localStorage.getItem(SELECTED_CHARACTER_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : null;
    if (parsed && typeof parsed === 'object' && parsed.id) {
      selectedCharacter = {
        id: String(parsed.id),
        name: String(parsed.name || ''),
      };
    }
  } catch (_err) {
    selectedCharacter = null;
  }

  if (selectedCharacterId && selectedCharacter && selectedCharacter.id !== selectedCharacterId) {
    selectedCharacter = {
      id: selectedCharacterId,
      name: selectedCharacter.name || selectedCharacterId,
    };
    localStorage.setItem(SELECTED_CHARACTER_STORAGE_KEY, JSON.stringify(selectedCharacter));
  }

  if (!selectedCharacter || !selectedCharacter.id) {
    window.location.replace('/hub');
    return false;
  }

  selectedCharacterLabelEl.textContent = `Selected character: ${selectedCharacter.name || selectedCharacter.id}`;
  return true;
}

function renderModels(models) {
  if (!Array.isArray(models) || models.length === 0) {
    modelGridEl.innerHTML = '<div class="empty">No uploaded models found yet. Upload a .glb/.gltf bundle first.</div>';
    return;
  }

  modelGridEl.innerHTML = models.map((row) => {
    const label = row && row.label ? row.label : 'Unnamed Model';
    const url = row && row.url ? row.url : '';
    const source = row && row.source ? row.source : '-';
    const isSelected = url && selectedModelUrl && url === selectedModelUrl;
    return `
      <article class="card ${isSelected ? 'selected' : ''}" data-model-url="${escapeHtml(url)}">
        <h3>${escapeHtml(label)}</h3>
        <div class="meta">Source: ${escapeHtml(source)}\nURL: ${escapeHtml(url || '-')}</div>
      </article>
    `;
  }).join('');

  const cards = modelGridEl.querySelectorAll('.card[data-model-url]');
  cards.forEach((card) => {
    card.addEventListener('click', () => {
      const url = String(card.getAttribute('data-model-url') || '').trim();
      if (!url) return;
      selectedModelUrl = url;
      localStorage.setItem(SELECTED_MODEL_STORAGE_KEY, selectedModelUrl);
      cards.forEach((el) => el.classList.remove('selected'));
      card.classList.add('selected');
      enterWorldBtn.disabled = false;
      setStatus(`Selected model ${url}. Enter world when ready.`, 'ok');
    });
  });
}

async function loadModels() {
  setStatus('Loading models...');
  const response = await fetch('/api/character-models', { credentials: 'same-origin' });
  const payload = await response.json().catch(() => ({ ok: false, models: [] }));
  if (!response.ok || payload.ok === false) {
    setStatus(`Could not load models: ${payload.error || response.statusText}`, 'error');
    renderModels([]);
    return;
  }
  const models = Array.isArray(payload.models) ? payload.models : [];
  renderModels(models);
  if (selectedModelUrl) {
    enterWorldBtn.disabled = false;
    setStatus(`Loaded ${models.length} model(s).`, 'ok');
  } else {
    enterWorldBtn.disabled = true;
    setStatus(`Loaded ${models.length} model(s). Select one to continue.`, '');
  }
}

async function uploadModelFiles() {
  const files = modelFileEl && modelFileEl.files ? Array.from(modelFileEl.files) : [];
  if (!files.length) {
    setStatus('Choose one or more model files first.', 'error');
    return;
  }

  setStatus('Uploading model files...');
  const fd = new FormData();
  files.forEach((file) => fd.append('model_files', file));
  const response = await fetch('/api/upload-character-model', {
    method: 'POST',
    body: fd,
    credentials: 'same-origin',
  });
  const payload = await response.json().catch(() => ({ ok: false, error: 'invalid-server-response' }));
  if (!response.ok || payload.ok === false) {
    setStatus(`Upload failed: ${payload.error || response.statusText}`, 'error');
    return;
  }

  const modelUrl = payload.model_url || (payload.files && payload.files[0] && payload.files[0].url) || '';
  if (modelUrl) {
    selectedModelUrl = String(modelUrl);
    localStorage.setItem(SELECTED_MODEL_STORAGE_KEY, selectedModelUrl);
  }

  if (modelFileEl) modelFileEl.value = '';
  setStatus('Model uploaded.', 'ok');
  await loadModels();
}

if (loadSelectedCharacter()) {
  try {
    selectedModelUrl = String(localStorage.getItem(SELECTED_MODEL_STORAGE_KEY) || '').trim();
  } catch (_err) {
    selectedModelUrl = '';
  }

  refreshBtn.addEventListener('click', loadModels);
  uploadBtn.addEventListener('click', uploadModelFiles);

  enterWorldBtn.addEventListener('click', () => {
    if (!selectedModelUrl) {
      setStatus('Select a model first.', 'error');
      return;
    }
    const target = `/map3d?characterId=${encodeURIComponent(selectedCharacter.id)}&modelUrl=${encodeURIComponent(selectedModelUrl)}`;
    window.location.href = target;
  });

  loadModels().catch((err) => {
    setStatus(`Failed loading models: ${err && err.message ? err.message : String(err)}`, 'error');
  });
}
</script>
</body>
</html>
