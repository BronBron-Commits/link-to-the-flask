<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Selection — Paraval</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #06090f;
      color: #e8e0d0;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .panel {
      width: min(920px, calc(100vw - 40px));
      max-height: calc(100vh - 120px);
      overflow: auto;
      border-radius: 20px;
      border: 1px solid rgba(210,175,70,0.16);
      background: linear-gradient(155deg, rgba(18,22,36,0.94), rgba(12,15,26,0.98));
      box-shadow: 0 22px 56px rgba(0,0,0,0.6);
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 1.4rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #f0dfa0;
    }
    .sub {
      color: #8f8778;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: Consolas, 'Courier New', monospace;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid rgba(210,175,70,0.24);
      background: rgba(15, 19, 31, 0.96);
      color: #f0dfa0;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { border-color: rgba(210,175,70,0.55); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status {
      margin: 8px 0 12px;
      min-height: 22px;
      color: #8f8778;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.85rem;
    }
    .status.error { color: #d58f83; }
    .status.ok { color: #a8c78a; }
    .upload-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 14px;
      align-items: start;
    }
    .file-input {
      flex: 1 1 260px;
      min-width: 240px;
      border: 1px solid rgba(210,175,70,0.2);
      background: rgba(15, 19, 31, 0.7);
      color: #d9cfae;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.8rem;
      font-family: Consolas, 'Courier New', monospace;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid rgba(210,175,70,0.15);
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      border-color: rgba(210,175,70,0.38);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.32);
    }
    .card.selected {
      border-color: rgba(210,175,70,0.72);
      box-shadow: 0 0 0 2px rgba(210,175,70,0.2);
    }
    .card h3 {
      color: #e8d898;
      font-size: 0.92rem;
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      word-break: break-word;
    }
    .meta {
      color: #9e937c;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.74rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .empty {
      border: 1px dashed rgba(210,175,70,0.2);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      color: #857d6f;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.86rem;
    }
    .preview {
      border: 1px solid rgba(210,175,70,0.16);
      border-radius: 14px;
      background: radial-gradient(circle at 50% 20%, rgba(59, 68, 97, 0.34), rgba(13, 17, 29, 0.98) 60%);
      overflow: hidden;
      min-height: 300px;
      position: sticky;
      top: 0;
    }
    .preview-head {
      border-bottom: 1px solid rgba(210,175,70,0.14);
      padding: 10px 12px;
      color: #e4d39b;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: Consolas, 'Courier New', monospace;
    }
    .preview-viewport {
      width: 100%;
      height: 340px;
      background: linear-gradient(180deg, rgba(26, 32, 50, 0.5), rgba(9, 12, 20, 0.95));
    }
    .preview-meta {
      border-top: 1px solid rgba(210,175,70,0.14);
      padding: 10px 12px;
      color: #9e937c;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.74rem;
      line-height: 1.5;
      word-break: break-word;
      min-height: 54px;
    }
    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .preview {
        position: relative;
      }
      .preview-viewport {
        height: 280px;
      }
    }
  </style>
</head>
<body data-supabase-url="{{ supabase_url|e }}" data-supabase-anon-key="{{ supabase_anon_key|e }}">
<canvas id="bg-canvas"></canvas>
<div class="shell">
  <section class="panel">
    <div class="header">
      <div>
        <h1 class="title">Model Selection</h1>
        <p id="selected-character" class="sub">Loading selected character...</p>
      </div>
      <div class="actions">
        <button id="refresh-btn" class="btn" type="button">Refresh</button>
        <button id="enter-world-btn" class="btn" type="button" disabled>Enter World</button>
        <a class="btn" href="/hub">Back to Hub</a>
      </div>
    </div>

    <div id="status" class="status">Loading available models...</div>

    <div class="upload-row">
      <input id="model-file" class="file-input" type="file" accept=".glb,.gltf,.bin,image/*,model/gltf-binary,model/gltf+json" multiple />
      <button id="upload-btn" class="btn" type="button">Upload Model</button>
    </div>

    <div class="layout">
      <div id="model-grid" class="grid"></div>
      <aside class="preview" aria-label="Selected model preview">
        <div class="preview-head">Live Preview</div>
        <div id="preview-viewport" class="preview-viewport"></div>
        <div id="preview-meta" class="preview-meta">Select a model to preview it.</div>
      </aside>
    </div>
  </section>
</div>

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  function rand(a, b) { return a + Math.random() * (b - a); }
  for (let i = 0; i < 90; i++) {
    particles.push({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6), vx: rand(-0.06, 0.06), vy: rand(-0.14, -0.04), alpha: rand(0.08, 0.45), hue: rand(32, 52) });
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -4) { p.y = H + 4; p.x = rand(0, W); }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 68%, ${p.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script type="module">
import * as THREE from '/static/three.module.js';
import { GLTFLoader } from '/static/GLTFLoader.js';

const SELECTED_CHARACTER_STORAGE_KEY = 'paraval_selected_character';
const SELECTED_MODEL_STORAGE_KEY = 'paraval_selected_model_url';

const selectedCharacterLabelEl = document.getElementById('selected-character');
const statusEl = document.getElementById('status');
const modelGridEl = document.getElementById('model-grid');
const refreshBtn = document.getElementById('refresh-btn');
const enterWorldBtn = document.getElementById('enter-world-btn');
const modelFileEl = document.getElementById('model-file');
const uploadBtn = document.getElementById('upload-btn');
const previewViewportEl = document.getElementById('preview-viewport');
const previewMetaEl = document.getElementById('preview-meta');

const urlSearch = new URLSearchParams(window.location.search || '');
const selectedCharacterId = String(urlSearch.get('characterId') || '').trim();
const FALLBACK_CHARACTER = { id: 'guest-adventurer', name: 'Guest Adventurer' };
let selectedCharacter = null;
let selectedModelUrl = '';
let previewRenderer = null;
let previewScene = null;
let previewCamera = null;
let previewLoader = null;
let previewModelRoot = null;
let previewSpinGroup = null;
let previewFrameHandle = 0;
let previewRequestId = 0;

function setStatus(msg, tone = '') {
  statusEl.textContent = msg;
  statusEl.className = `status${tone ? ` ${tone}` : ''}`;
}

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function setPreviewMeta(msg) {
  if (previewMetaEl) previewMetaEl.textContent = msg || '';
}

function initPreviewScene() {
  if (!previewViewportEl || previewRenderer) return;

  previewRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  previewRenderer.outputEncoding = THREE.sRGBEncoding;
  previewRenderer.setClearColor(0x000000, 0);
  previewViewportEl.appendChild(previewRenderer.domElement);

  previewScene = new THREE.Scene();
  previewCamera = new THREE.PerspectiveCamera(38, 1, 0.01, 200);
  previewCamera.position.set(0, 1.1, 3.2);

  const ambient = new THREE.AmbientLight(0xd9d1b8, 0.9);
  const key = new THREE.DirectionalLight(0xffefc4, 1.0);
  key.position.set(2.5, 3.5, 2.5);
  const rim = new THREE.DirectionalLight(0x94b6ff, 0.55);
  rim.position.set(-2.5, 1.5, -2.5);

  previewSpinGroup = new THREE.Group();
  previewScene.add(previewSpinGroup);
  previewScene.add(ambient, key, rim);

  previewLoader = new GLTFLoader();

  const resize = () => {
    if (!previewRenderer || !previewCamera || !previewViewportEl) return;
    const width = Math.max(10, previewViewportEl.clientWidth || 10);
    const height = Math.max(10, previewViewportEl.clientHeight || 10);
    previewRenderer.setSize(width, height, false);
    previewCamera.aspect = width / height;
    previewCamera.updateProjectionMatrix();
  };

  if (typeof ResizeObserver !== 'undefined') {
    const observer = new ResizeObserver(resize);
    observer.observe(previewViewportEl);
  } else {
    window.addEventListener('resize', resize);
  }
  resize();

  const animate = () => {
    previewFrameHandle = requestAnimationFrame(animate);
    if (previewSpinGroup) previewSpinGroup.rotation.y += 0.005;
    previewRenderer.render(previewScene, previewCamera);
  };
  animate();
}

function disposeObject3D(root) {
  if (!root) return;
  root.traverse((obj) => {
    if (obj.geometry && typeof obj.geometry.dispose === 'function') {
      obj.geometry.dispose();
    }
    const mat = obj.material;
    const disposeMat = (m) => {
      if (!m) return;
      for (const key in m) {
        const value = m[key];
        if (value && value.isTexture && typeof value.dispose === 'function') {
          value.dispose();
        }
      }
      if (typeof m.dispose === 'function') m.dispose();
    };
    if (Array.isArray(mat)) mat.forEach(disposeMat);
    else disposeMat(mat);
  });
}

function fitPreviewCamera(root) {
  if (!root || !previewCamera) return;
  const box = new THREE.Box3().setFromObject(root);
  if (box.isEmpty()) {
    previewCamera.position.set(0, 1.1, 3.2);
    previewCamera.lookAt(0, 0.9, 0);
    return;
  }
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z, 0.2);

  root.position.sub(center);
  const fov = THREE.MathUtils.degToRad(previewCamera.fov);
  const dist = (maxDim * 1.2) / Math.tan(fov * 0.5);
  previewCamera.position.set(0, maxDim * 0.35, Math.max(dist, 1.5));
  previewCamera.lookAt(0, Math.max(size.y * 0.2, 0.3), 0);
}

function previewModel(url) {
  initPreviewScene();
  if (!previewLoader || !previewSpinGroup) return;
  if (!url) {
    setPreviewMeta('Select a model to preview it.');
    return;
  }

  const requestId = ++previewRequestId;
  setPreviewMeta(`Loading preview: ${url}`);
  previewLoader.load(
    url,
    (gltf) => {
      if (requestId !== previewRequestId) return;
      if (previewModelRoot) {
        previewSpinGroup.remove(previewModelRoot);
        disposeObject3D(previewModelRoot);
        previewModelRoot = null;
      }
      previewModelRoot = gltf.scene || null;
      if (!previewModelRoot) {
        setPreviewMeta('Could not render this model (empty scene).');
        return;
      }
      previewSpinGroup.add(previewModelRoot);
      fitPreviewCamera(previewModelRoot);
      setPreviewMeta(`Previewing: ${url}`);
    },
    undefined,
    (err) => {
      if (requestId !== previewRequestId) return;
      const message = err && err.message ? err.message : String(err || 'unknown error');
      setPreviewMeta(`Preview failed: ${message}`);
    }
  );
}

function selectModel(url, cardNodes) {
  const modelUrl = String(url || '').trim();
  if (!modelUrl) return;
  selectedModelUrl = modelUrl;
  localStorage.setItem(SELECTED_MODEL_STORAGE_KEY, selectedModelUrl);

  if (cardNodes && typeof cardNodes.forEach === 'function') {
    cardNodes.forEach((el) => el.classList.remove('selected'));
    const targetCard = Array.from(cardNodes).find((el) => String(el.getAttribute('data-model-url') || '').trim() === modelUrl);
    if (targetCard) targetCard.classList.add('selected');
  }

  enterWorldBtn.disabled = false;
  setStatus(`Selected model ${modelUrl}. Enter world when ready.`, 'ok');
  previewModel(modelUrl);
}

function loadSelectedCharacter() {
  try {
    const raw = localStorage.getItem(SELECTED_CHARACTER_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : null;
    if (parsed && typeof parsed === 'object' && parsed.id) {
      selectedCharacter = {
        id: String(parsed.id),
        name: String(parsed.name || ''),
      };
    }
  } catch (_err) {
    selectedCharacter = null;
  }

  if (selectedCharacterId && selectedCharacter && selectedCharacter.id !== selectedCharacterId) {
    selectedCharacter = {
      id: selectedCharacterId,
      name: selectedCharacter.name || selectedCharacterId,
    };
    localStorage.setItem(SELECTED_CHARACTER_STORAGE_KEY, JSON.stringify(selectedCharacter));
  }

  if (!selectedCharacter || !selectedCharacter.id) {
    selectedCharacter = { ...FALLBACK_CHARACTER };
    localStorage.setItem(SELECTED_CHARACTER_STORAGE_KEY, JSON.stringify(selectedCharacter));
  }

  selectedCharacterLabelEl.textContent = `Selected character: ${selectedCharacter.name || selectedCharacter.id}`;
  return true;
}

function renderModels(models) {
  if (!Array.isArray(models) || models.length === 0) {
    modelGridEl.innerHTML = '<div class="empty">No uploaded models found yet. Upload a .glb/.gltf bundle first.</div>';
    return;
  }

  modelGridEl.innerHTML = models.map((row) => {
    const label = row && row.label ? row.label : 'Unnamed Model';
    const url = row && row.url ? row.url : '';
    const source = row && row.source ? row.source : '-';
    const isSelected = url && selectedModelUrl && url === selectedModelUrl;
    return `
      <article class="card ${isSelected ? 'selected' : ''}" data-model-url="${escapeHtml(url)}">
        <h3>${escapeHtml(label)}</h3>
        <div class="meta">Source: ${escapeHtml(source)}\nURL: ${escapeHtml(url || '-')}</div>
      </article>
    `;
  }).join('');

  const cards = modelGridEl.querySelectorAll('.card[data-model-url]');
  cards.forEach((card) => {
    card.addEventListener('click', () => {
      const url = String(card.getAttribute('data-model-url') || '').trim();
      selectModel(url, cards);
    });
  });

  if (selectedModelUrl) {
    selectModel(selectedModelUrl, cards);
  }
}

async function loadModels() {
  setStatus('Loading models...');
  const response = await fetch('/api/character-models', { credentials: 'same-origin' });
  const payload = await response.json().catch(() => ({ ok: false, models: [] }));
  if (!response.ok || payload.ok === false) {
    setStatus(`Could not load models: ${payload.error || response.statusText}`, 'error');
    renderModels([]);
    return;
  }
  const models = Array.isArray(payload.models) ? payload.models : [];
  renderModels(models);
  if (selectedModelUrl) {
    enterWorldBtn.disabled = false;
    setStatus(`Loaded ${models.length} model(s).`, 'ok');
    previewModel(selectedModelUrl);
  } else {
    enterWorldBtn.disabled = true;
    setStatus(`Loaded ${models.length} model(s). Select one to continue.`, '');
    previewModel('');
  }
}

async function uploadModelFiles() {
  const files = modelFileEl && modelFileEl.files ? Array.from(modelFileEl.files) : [];
  if (!files.length) {
    setStatus('Choose one or more model files first.', 'error');
    return;
  }

  setStatus('Uploading model files...');
  const fd = new FormData();
  files.forEach((file) => fd.append('model_files', file));
  const response = await fetch('/api/upload-character-model', {
    method: 'POST',
    body: fd,
    credentials: 'same-origin',
  });
  const payload = await response.json().catch(() => ({ ok: false, error: 'invalid-server-response' }));
  if (!response.ok || payload.ok === false) {
    setStatus(`Upload failed: ${payload.error || response.statusText}`, 'error');
    return;
  }

  const modelUrl = payload.model_url || (payload.files && payload.files[0] && payload.files[0].url) || '';
  if (modelUrl) {
    selectedModelUrl = String(modelUrl).trim();
    localStorage.setItem(SELECTED_MODEL_STORAGE_KEY, selectedModelUrl);
    previewModel(selectedModelUrl);
  }

  if (modelFileEl) modelFileEl.value = '';
  setStatus('Model uploaded.', 'ok');
  await loadModels();
}

if (loadSelectedCharacter()) {
  try {
    selectedModelUrl = String(localStorage.getItem(SELECTED_MODEL_STORAGE_KEY) || '').trim();
  } catch (_err) {
    selectedModelUrl = '';
  }

  refreshBtn.addEventListener('click', loadModels);
  uploadBtn.addEventListener('click', uploadModelFiles);

  enterWorldBtn.addEventListener('click', () => {
    if (!selectedModelUrl) {
      setStatus('Select a model first.', 'error');
      return;
    }
    const target = `/world-select?characterId=${encodeURIComponent(selectedCharacter.id)}&modelUrl=${encodeURIComponent(selectedModelUrl)}`;
    window.location.href = target;
  });

  loadModels().catch((err) => {
    setStatus(`Failed loading models: ${err && err.message ? err.message : String(err)}`, 'error');
  });
}
</script>
</body>
</html>
