<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Selection — Paraval</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #06090f;
      color: #e8e0d0;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 12px;
    }
    .panel {
      width: 100%;
      height: calc(100vh - 24px);
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(210,175,70,0.16);
      background: linear-gradient(155deg, rgba(18,22,36,0.94), rgba(12,15,26,0.98));
      box-shadow: 0 22px 56px rgba(0,0,0,0.6);
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 1.4rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #f0dfa0;
    }
    .sub {
      color: #8f8778;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: Consolas, 'Courier New', monospace;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid rgba(210,175,70,0.24);
      background: rgba(15, 19, 31, 0.96);
      color: #f0dfa0;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { border-color: rgba(210,175,70,0.55); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status {
      margin: 8px 0 12px;
      min-height: 22px;
      color: #8f8778;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.85rem;
    }
    .status.error { color: #d58f83; }
    .status.ok { color: #a8c78a; }
    .upload-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .layout {

      align-items: stretch;

      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.8rem;
      font-family: Consolas, 'Courier New', monospace;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }
    .model-rail {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
      border: 1px solid rgba(210,175,70,0.15);
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      padding: 12px;
    }
    .rail-head,
    .viewer-headline {
      color: #bda77a;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .rail-copy,
    .viewer-copy {
      margin-top: 6px;
      color: #8f8778;
      font-size: 0.78rem;
      line-height: 1.5;
      font-family: Consolas, 'Courier New', monospace;
    }
    .viewer-controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card {
      border: 1px solid rgba(210,175,70,0.15);
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;

    .card:hover {

    .card.selected {

    }
    .card h3 {

      letter-spacing: 0.06em;

    .meta {

      font-size: 0.74rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

      border-radius: 14px;
      padding: 18px;

      font-size: 0.86rem;

    .preview {

      border-radius: 14px;

      min-height: 0;

      grid-template-rows: auto minmax(0, 1fr) auto;
    }
    .preview-head {
      border-bottom: 1px solid rgba(210,175,70,0.14);

    }

      background: linear-gradient(180deg, rgba(26, 32, 50, 0.5), rgba(9, 12, 20, 0.95));

      border-top: 1px solid rgba(210,175,70,0.14);
      padding: 12px 16px;
      color: #9e937c;

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  function rand(a, b) { return a + Math.random() * (b - a); }
  for (let i = 0; i < 90; i++) {
    particles.push({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6), vx: rand(-0.06, 0.06), vy: rand(-0.14, -0.04), alpha: rand(0.08, 0.45), hue: rand(32, 52) });
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -4) { p.y = H + 4; p.x = rand(0, W); }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 68%, ${p.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script type="module">
import * as THREE from '/static/three.module.js';
import { createAssetImporter } from '{{ asset_url("utils/assetImporter.js") }}';
import { retargetClip } from '{{ asset_url("utils/SkeletonUtils.js") }}';

const SELECTED_CHARACTER_STORAGE_KEY = 'paraval_selected_character';
const SELECTED_MODEL_STORAGE_KEY = 'paraval_selected_model_url';
const OPEN_WORLD_MODEL_URL = '{{ asset_url("everything_optimized_draco.glb") }}';
const SWING_DANCE_FBX_URL = '{{ asset_url("Swing Dancing.fbx") }}';
const LOCAL_FBX_LOADER_URL = '{{ asset_url("three-addons/loaders/FBXLoader.js") }}';
const FBX_LOADER_CDN_URL = 'https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/loaders/FBXLoader.js';

const selectedCharacterLabelEl = document.getElementById('selected-character');
const statusEl = document.getElementById('status');
const modelGridEl = document.getElementById('model-grid');
const refreshBtn = document.getElementById('refresh-btn');
const modelFileEl = document.getElementById('model-file');
const uploadBtn = document.getElementById('upload-btn');
const uploadFolderBtn = document.getElementById('upload-folder-btn');
const modelFolderEl = document.getElementById('model-folder');
const previewViewportEl = document.getElementById('preview-viewport');
const previewMetaEl = document.getElementById('preview-meta');
const previewDanceBtn = document.getElementById('preview-dance-btn');

const urlSearch = new URLSearchParams(window.location.search || '');
const selectedCharacterId = String(urlSearch.get('characterId') || '').trim();
const FALLBACK_CHARACTER = { id: 'guest-adventurer', name: 'Guest Adventurer' };
let selectedCharacter = null;
let selectedModelUrl = '';
let previewRenderer = null;
let previewScene = null;
let previewCamera = null;
let previewAssetImporter = null;
let previewModelRoot = null;
let previewSpinGroup = null;
let previewFrameHandle = 0;
let previewRequestId = 0;
let previewLastFrameMs = 0;
let previewMixer = null;
let previewDanceAction = null;
let previewDanceClip = null;
let previewDanceSourceRig = null;
let previewDanceLoaded = false;
let previewDanceLoadingPromise = null;
let previewDanceEnabled = false;
let cachedFbxLoaderCtor = null;
let fbxLoaderImportPromise = null;
const modelValidationCache = new Map();

const RIG_SLOT_PATTERNS = {
  hips: [/(^|[_.])hips?([_.]|$)/i, /pelvis/i, /mixamorig:?hips/i, /^root$/i],
  spine: [/spine$/i, /spine[_.-]?0*1/i, /mixamorig:?spine$/i, /torso/i],
  chest: [/chest/i, /upperchest/i, /spine[_.-]?0*2/i, /mixamorig:?spine1/i],
  head: [/head/i, /mixamorig:?head/i],
  leftUpperArm: [/left.*upperarm/i, /upperarm.*left/i, /mixamorig:?leftarm/i, /^armature.*arm.*l/i, /arm[_ .-]*l/i],
  leftLowerArm: [/left.*(lowerarm|forearm)/i, /(lowerarm|forearm).*(left|_l|\.l| l)/i, /mixamorig:?leftforearm/i],
  rightUpperArm: [/right.*upperarm/i, /upperarm.*right/i, /mixamorig:?rightarm/i, /^armature.*arm.*r/i, /arm[_ .-]*r/i],
  rightLowerArm: [/right.*(lowerarm|forearm)/i, /(lowerarm|forearm).*(right|_r|\.r| r)/i, /mixamorig:?rightforearm/i],
  leftUpperLeg: [/left.*(upleg|thigh|upperleg)/i, /(upleg|thigh|upperleg).*(left|_l|\.l| l)/i, /mixamorig:?leftupleg/i],
  leftLowerLeg: [/left.*(leg|calf|lowerleg)/i, /(leg|calf|lowerleg).*(left|_l|\.l| l)/i, /mixamorig:?leftleg/i],
  rightUpperLeg: [/right.*(upleg|thigh|upperleg)/i, /(upleg|thigh|upperleg).*(right|_r|\.r| r)/i, /mixamorig:?rightupleg/i],
  rightLowerLeg: [/right.*(leg|calf|lowerleg)/i, /(leg|calf|lowerleg).*(right|_r|\.r| r)/i, /mixamorig:?rightleg/i],
};

const REQUIRED_RIG_SLOTS = [
  'hips', 'spine', 'chest',
  'leftUpperArm', 'rightUpperArm',
  'leftUpperLeg', 'rightUpperLeg',
];

const MIN_FALLBACK_BONE_MATCHES = 4;
const MIN_TOTAL_MAPPED_BONES = 6;

function setStatus(msg, tone = '') {
  statusEl.textContent = msg;
  statusEl.className = `status${tone ? ` ${tone}` : ''}`;
}

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function setPreviewMeta(msg) {
  if (previewMetaEl) previewMetaEl.textContent = msg || '';
}

function updateDanceButtonState() {
  if (!previewDanceBtn) return;
  previewDanceBtn.disabled = !previewDanceEnabled;
  if (!previewDanceEnabled) {
    previewDanceBtn.textContent = 'Preview Swing Dance';
  }
}

function setDanceButtonPlaying(isPlaying) {
  if (!previewDanceBtn) return;
  previewDanceBtn.textContent = isPlaying ? 'Stop Swing Dance' : 'Preview Swing Dance';
}

async function resolveFbxLoaderCtor() {
  if (cachedFbxLoaderCtor) return cachedFbxLoaderCtor;
  if (fbxLoaderImportPromise) return fbxLoaderImportPromise;

  fbxLoaderImportPromise = (async () => {
    try {
      const localModule = await import(LOCAL_FBX_LOADER_URL);
      if (localModule && localModule.FBXLoader) {
        cachedFbxLoaderCtor = localModule.FBXLoader;
        return cachedFbxLoaderCtor;
      }
    } catch (_localImportError) {
      // Fallback to CDN loader when local file cannot be loaded.
    }

    const remoteModule = await import(FBX_LOADER_CDN_URL);
    if (!remoteModule || !remoteModule.FBXLoader) {
      throw new Error('FBXLoader module did not export FBXLoader.');
    }
    cachedFbxLoaderCtor = remoteModule.FBXLoader;
    return cachedFbxLoaderCtor;
  })();

  try {
    return await fbxLoaderImportPromise;
  } finally {
    fbxLoaderImportPromise = null;
  }
}

function initPreviewScene() {
  if (!previewViewportEl || previewRenderer) return;

  previewRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  previewRenderer.outputEncoding = THREE.sRGBEncoding;
  previewRenderer.setClearColor(0x000000, 0);
  previewViewportEl.appendChild(previewRenderer.domElement);

  previewScene = new THREE.Scene();
  previewCamera = new THREE.PerspectiveCamera(38, 1, 0.01, 200);
  previewCamera.position.set(0, 1.1, 3.2);

  const ambient = new THREE.AmbientLight(0xd9d1b8, 0.9);
  const key = new THREE.DirectionalLight(0xffefc4, 1.0);
  key.position.set(2.5, 3.5, 2.5);
  const rim = new THREE.DirectionalLight(0x94b6ff, 0.55);
  rim.position.set(-2.5, 1.5, -2.5);

  previewSpinGroup = new THREE.Group();
  previewScene.add(previewSpinGroup);
  previewScene.add(ambient, key, rim);

  previewAssetImporter = createAssetImporter({ renderer: previewRenderer });

  const resize = () => {
    if (!previewRenderer || !previewCamera || !previewViewportEl) return;
    const width = Math.max(10, previewViewportEl.clientWidth || 10);
    const height = Math.max(10, previewViewportEl.clientHeight || 10);
    previewRenderer.setSize(width, height, false);
    previewCamera.aspect = width / height;
    previewCamera.updateProjectionMatrix();
  };

  if (typeof ResizeObserver !== 'undefined') {
    const observer = new ResizeObserver(resize);
    observer.observe(previewViewportEl);
  } else {
    window.addEventListener('resize', resize);
  }
  resize();

  const animate = () => {
    previewFrameHandle = requestAnimationFrame(animate);
    const now = performance.now();
    if (!previewLastFrameMs) previewLastFrameMs = now;
    const dt = Math.min((now - previewLastFrameMs) / 1000, 0.05);
    previewLastFrameMs = now;

    if (previewDanceAction && previewMixer) {
      previewMixer.update(dt);
    }

    if (previewSpinGroup && !previewDanceAction) previewSpinGroup.rotation.y += 0.005;
    previewRenderer.render(previewScene, previewCamera);
  };
  previewLastFrameMs = performance.now();
  animate();
}

function getPrimarySkinnedMesh(root) {
  if (!root) return null;
  let best = null;
  root.traverse((obj) => {
    if (!obj || !obj.isSkinnedMesh || !obj.skeleton || !Array.isArray(obj.skeleton.bones)) return;
    if (!best || obj.skeleton.bones.length > best.skeleton.bones.length) {
      best = obj;
    }
  });
  return best;
}

function findRigSlotBones(skeleton) {
  const result = {};
  if (!skeleton || !Array.isArray(skeleton.bones)) return result;
  const bones = skeleton.bones;
  Object.entries(RIG_SLOT_PATTERNS).forEach(([slot, patterns]) => {
    const bone = bones.find((b) => {
      const name = String((b && b.name) || '').trim();
      return patterns.some((re) => re.test(name));
    });
    if (bone) result[slot] = bone;
  });
  return result;
}

function normalizeBoneName(name) {
  return String(name || '')
    .trim()
    .toLowerCase()
    .replace(/^mixamorig[:_]?/g, '')
    .replace(/[^a-z0-9]/g, '');
}

function buildFallbackBoneNameMap(targetSkeleton, sourceSkeleton) {
  const names = {};
  if (!targetSkeleton || !sourceSkeleton) {
    return { names, matchCount: 0 };
  }

  const targetBones = Array.isArray(targetSkeleton.bones) ? targetSkeleton.bones : [];
  const sourceBones = Array.isArray(sourceSkeleton.bones) ? sourceSkeleton.bones : [];
  if (!targetBones.length || !sourceBones.length) {
    return { names, matchCount: 0 };
  }

  const sourceByNormalized = new Map();
  sourceBones.forEach((bone) => {
    const sourceName = String((bone && bone.name) || '').trim();
    const normalized = normalizeBoneName(sourceName);
    if (!sourceName || !normalized || sourceByNormalized.has(normalized)) return;
    sourceByNormalized.set(normalized, sourceName);
  });

  let matchCount = 0;
  targetBones.forEach((targetBone) => {
    const targetName = String((targetBone && targetBone.name) || '').trim();
    if (!targetName) return;
    const normalized = normalizeBoneName(targetName);
    if (!normalized) return;
    const sourceName = sourceByNormalized.get(normalized);
    if (!sourceName) return;
    names[targetName] = sourceName;
    matchCount += 1;
  });

  return { names, matchCount };
}

function buildSourceBoneLookup(sourceSkeleton) {
  const byNormalized = new Map();
  const byRaw = new Map();
  const sourceBones = Array.isArray(sourceSkeleton?.bones) ? sourceSkeleton.bones : [];

  sourceBones.forEach((bone) => {
    const sourceName = String((bone && bone.name) || '').trim();
    if (!sourceName) return;
    byRaw.set(sourceName, sourceName);

    const normalized = normalizeBoneName(sourceName);
    if (normalized && !byNormalized.has(normalized)) {
      byNormalized.set(normalized, sourceName);
    }
  });

  return { byNormalized, byRaw };
}

function createBoneNameResolver(sourceSkeleton, explicitNames = {}) {
  const lookup = buildSourceBoneLookup(sourceSkeleton);
  return (targetBone) => {
    const targetName = String((targetBone && targetBone.name) || '').trim();
    if (!targetName) return '';

    const explicit = explicitNames[targetName];
    if (explicit && lookup.byRaw.has(explicit)) {
      return explicit;
    }

    const normalized = normalizeBoneName(targetName);
    if (!normalized) return explicit || targetName;

    const normalizedMatch = lookup.byNormalized.get(normalized);
    if (normalizedMatch) return normalizedMatch;

    return explicit || targetName;
  };
}

function resetPreviewPose() {
  if (!previewModelRoot) return;
  previewModelRoot.traverse((obj) => {
    if (obj && obj.isSkinnedMesh && obj.skeleton && typeof obj.skeleton.pose === 'function') {
      obj.skeleton.pose();
    }
  });
}

function stopSwingDancePreview({ keepMeta = false } = {}) {
  if (previewDanceAction) {
    previewDanceAction.stop();
    previewDanceAction = null;
  }
  if (previewMixer) {
    previewMixer.stopAllAction();
    previewMixer = null;
  }
  resetPreviewPose();
  setDanceButtonPlaying(false);
  if (!keepMeta && selectedModelUrl) {
    setPreviewMeta(`Previewing: ${selectedModelUrl}`);
  }
}

async function ensureSwingDanceLoaded() {
  if (previewDanceLoaded && previewDanceClip && previewDanceSourceRig) {
    return { clip: previewDanceClip, sourceRig: previewDanceSourceRig };
  }
  if (previewDanceLoadingPromise) return previewDanceLoadingPromise;

  previewDanceLoadingPromise = (async () => {
    const LoaderCtor = await resolveFbxLoaderCtor();

    const loader = new LoaderCtor();
    const fbxRoot = await new Promise((resolve, reject) => {
      loader.load(SWING_DANCE_FBX_URL, resolve, undefined, reject);
    });

    const clip = Array.isArray(fbxRoot.animations) && fbxRoot.animations.length
      ? fbxRoot.animations[0]
      : null;
    if (!clip) {
      throw new Error('Swing dance FBX did not contain an animation clip.');
    }

    let sourceRig = getPrimarySkinnedMesh(fbxRoot);

    if (!sourceRig) {
      const trackBoneNames = new Set();
      (clip.tracks || []).forEach((track) => {
        const rawName = String((track && track.name) || '').trim();
        if (!rawName) return;

        const bracketMatch = rawName.match(/\.bones\[([^\]]+)\]/i);
        if (bracketMatch && bracketMatch[1]) {
          trackBoneNames.add(String(bracketMatch[1]).trim());
          return;
        }

        const dotIdx = rawName.indexOf('.');
        if (dotIdx > 0) {
          trackBoneNames.add(rawName.slice(0, dotIdx).trim());
        }
      });

      const allBones = [];
      fbxRoot.traverse((obj) => {
        if (obj && obj.isBone) allBones.push(obj);
      });

      const filteredBones = allBones.filter((bone) => {
        if (!trackBoneNames.size) return true;
        const name = String((bone && bone.name) || '').trim();
        return name && trackBoneNames.has(name);
      });

      const sourceBones = filteredBones.length ? filteredBones : allBones;
      if (sourceBones.length) {
        sourceRig = new THREE.Skeleton(sourceBones);
      }
    }

    if (!sourceRig) {
      throw new Error('Swing dance FBX is missing a usable source skeleton.');
    }

    previewDanceClip = clip;
    previewDanceSourceRig = sourceRig;
    previewDanceLoaded = true;
    return { clip, sourceRig };
  })();

  try {
    return await previewDanceLoadingPromise;
  } finally {
    previewDanceLoadingPromise = null;
  }
}

function buildRetargetNames(targetSkeleton, sourceSkeleton) {
  const targetSlots = findRigSlotBones(targetSkeleton);
  const sourceSlots = findRigSlotBones(sourceSkeleton);
  const names = {};

  Object.keys(RIG_SLOT_PATTERNS).forEach((slot) => {
    const targetBone = targetSlots[slot];
    const sourceBone = sourceSlots[slot];
    if (targetBone && sourceBone) {
      names[targetBone.name] = sourceBone.name;
    }
  });

  const fallback = buildFallbackBoneNameMap(targetSkeleton, sourceSkeleton);
  Object.entries(fallback.names).forEach(([targetName, sourceName]) => {
    if (!names[targetName]) {
      names[targetName] = sourceName;
    }
  });

  const requiredMapped = REQUIRED_RIG_SLOTS.filter((slot) => targetSlots[slot] && sourceSlots[slot]).length;
  return {
    names,
    targetSlots,
    sourceSlots,
    requiredMapped,
    fallbackMatched: fallback.matchCount,
    totalMappedBones: Object.keys(names).length,
  };
}

function refreshDancePreviewEligibility() {
  previewDanceEnabled = false;
  if (!previewModelRoot) {
    updateDanceButtonState();
    return;
  }

  const targetMesh = getPrimarySkinnedMesh(previewModelRoot);
  if (!targetMesh || !targetMesh.skeleton) {
    updateDanceButtonState();
    return;
  }

  const boneCount = Array.isArray(targetMesh.skeleton.bones) ? targetMesh.skeleton.bones.length : 0;
  previewDanceEnabled = boneCount >= 8;
  updateDanceButtonState();
}

async function playSwingDancePreview() {
  if (!previewModelRoot) {
    setStatus('Select a model before running the swing dance preview.', 'error');
    return;
  }

  const targetMesh = getPrimarySkinnedMesh(previewModelRoot);
  if (!targetMesh || !targetMesh.skeleton) {
    setStatus('This model is not rigged. Swing dance preview requires a skinned rig.', 'error');
    setPreviewMeta('Swing dance unavailable: selected model is not rigged.');
    previewDanceEnabled = false;
    updateDanceButtonState();
    return;
  }

  setStatus('Preparing swing dance preview...', '');
  setPreviewMeta('Loading swing dance animation and checking rig compatibility...');

  try {
    const { clip, sourceRig } = await ensureSwingDanceLoaded();
    const sourceSkeleton = sourceRig && sourceRig.isObject3D
      ? sourceRig.skeleton
      : sourceRig;
    const mapping = buildRetargetNames(targetMesh.skeleton, sourceSkeleton);
    const boneNameResolver = createBoneNameResolver(sourceSkeleton, mapping.names);

    const requiredSlotThreshold = Math.ceil(REQUIRED_RIG_SLOTS.length * 0.72);
    const hasSlotCompatibility = mapping.requiredMapped >= requiredSlotThreshold;
    const hasFallbackCompatibility = mapping.fallbackMatched >= MIN_FALLBACK_BONE_MATCHES;
    const hasMinimumBoneCoverage = mapping.totalMappedBones >= MIN_TOTAL_MAPPED_BONES;

    if (!hasSlotCompatibility && !hasFallbackCompatibility && !hasMinimumBoneCoverage) {
      setStatus('Rig match is weak. Running best-effort swing dance retarget.', '');
      setPreviewMeta('Rig compatibility is limited; running best-effort retargeting.');
    }

    stopSwingDancePreview({ keepMeta: true });

    const retargetOptions = {
      names: mapping.names,
      getBoneName: boneNameResolver,
      preserveBoneMatrix: true,
      preserveBonePositions: true,
      useFirstFramePosition: true,
    };
    const sourceHips = mapping.sourceSlots.hips;
    if (sourceHips && sourceHips.name) {
      retargetOptions.hip = sourceHips.name;
    } else if (mapping.targetSlots.hips) {
      const resolvedHip = boneNameResolver(mapping.targetSlots.hips);
      if (resolvedHip) retargetOptions.hip = resolvedHip;
    }

    const clipForTarget = retargetClip(targetMesh, sourceRig, clip, {
      ...retargetOptions,
    });

    // Retargeted clips address target skeleton bones, so bind the mixer to the skinned mesh.
    previewMixer = new THREE.AnimationMixer(targetMesh);
    previewDanceAction = previewMixer.clipAction(clipForTarget);
    previewDanceAction.reset();
    previewDanceAction.setLoop(THREE.LoopRepeat, Infinity);
    previewDanceAction.setEffectiveWeight(1);
    previewDanceAction.play();

    setDanceButtonPlaying(true);
    setStatus('Swing dance preview running.', 'ok');
    setPreviewMeta('Swing dance active (retargeted from Mixamo FBX).');
  } catch (error) {
    stopSwingDancePreview({ keepMeta: true });
    const message = error && error.message ? error.message : String(error || 'unknown error');
    setStatus(`Swing dance preview failed: ${message}`, 'error');
    setPreviewMeta(`Swing dance preview failed: ${message}`);
  }
}

function toggleSwingDancePreview() {
  if (previewDanceAction) {
    stopSwingDancePreview();
    setStatus('Swing dance preview stopped.', 'ok');
    return;
  }
  void playSwingDancePreview();
}

function disposeObject3D(root) {
  if (!root) return;
  root.traverse((obj) => {
    if (obj.geometry && typeof obj.geometry.dispose === 'function') {
      obj.geometry.dispose();
    }
    const mat = obj.material;
    const disposeMat = (m) => {
      if (!m) return;
      for (const key in m) {
        const value = m[key];
        if (value && value.isTexture && typeof value.dispose === 'function') {
          value.dispose();
        }
      }
      if (typeof m.dispose === 'function') m.dispose();
    };
    if (Array.isArray(mat)) mat.forEach(disposeMat);
    else disposeMat(mat);
  });
}

function resolveAssetUrl(url) {
  try {
    return new URL(String(url || '').trim(), window.location.href);
  } catch {
    return null;
  }
}

function getMaterialTextureSlots(material) {
  if (!material || typeof material !== 'object') return [];
  const slots = [];
  for (const key of Object.keys(material)) {
    const value = material[key];
    if (value && value.isTexture) {
      slots.push({ key, texture: value });
    }
  }
  return slots;
}

function hasUsableTextureImage(texture) {
  if (!texture || !texture.isTexture) return false;
  const image = texture.image;
  if (!image) return false;
  const src = String((image.currentSrc || image.src || '')).trim();
  if (src) return true;
  if (image.data && typeof image.width === 'number' && typeof image.height === 'number') {
    return image.width > 0 && image.height > 0;
  }
  if (typeof image.width === 'number' && typeof image.height === 'number') {
    return image.width > 0 && image.height > 0;
  }
  return false;
}

async function assertExternalImageUrisAccessible(importedAsset, modelUrl) {
  if (!importedAsset || importedAsset.format !== 'gltf') return;
  const parser = importedAsset.source && importedAsset.source.parser ? importedAsset.source.parser : null;
  const gltfJson = parser && parser.json && typeof parser.json === 'object' ? parser.json : null;
  const images = Array.isArray(gltfJson && gltfJson.images) ? gltfJson.images : [];
  if (!images.length) return;

  const baseUrl = resolveAssetUrl(modelUrl);
  if (!baseUrl) return;

  for (const imageDef of images) {
    const uri = String(imageDef && imageDef.uri ? imageDef.uri : '').trim();
    if (!uri) continue;
    if (/^(data:|blob:)/i.test(uri)) continue;

    let imageUrl;
    try {
      imageUrl = new URL(uri, baseUrl).href;
    } catch {
      throw new Error(`invalid-texture-uri:${uri}`);
    }

    let response;
    try {
      response = await fetch(imageUrl, { method: 'HEAD', credentials: 'same-origin' });
    } catch {
      response = null;
    }

    if (!response || !response.ok) {
      const fallback = await fetch(imageUrl, { method: 'GET', credentials: 'same-origin' }).catch(() => null);
      if (!fallback || !fallback.ok) {
        throw new Error(`missing-texture:${uri}`);
      }
    }
  }
}

async function validateModelEntry(row) {
  const url = String(row && row.url ? row.url : '').trim();
  if (!url) {
    return { ok: false, reason: 'missing-model-url' };
  }

  const cached = modelValidationCache.get(url);
  if (cached) {
    return cached;
  }

  initPreviewScene();
  if (!previewAssetImporter) {
    const result = { ok: false, reason: 'asset-importer-unavailable' };
    modelValidationCache.set(url, result);
    return result;
  }

  let importedAsset = null;
  try {
    importedAsset = await previewAssetImporter.load(url);
    const scene = importedAsset && importedAsset.scene;
    if (!scene) {
      throw new Error('asset-scene-missing');
    }

    await assertExternalImageUrisAccessible(importedAsset, url);

    const brokenTextureRefs = [];
    scene.traverse((obj) => {
      if (!obj || !obj.isMesh) return;
      const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
      materials.forEach((material) => {
        getMaterialTextureSlots(material).forEach(({ key, texture }) => {
          if (!hasUsableTextureImage(texture)) {
            brokenTextureRefs.push(`${obj.name || obj.uuid}:${key}`);
          }
        });
      });
    });

    if (brokenTextureRefs.length) {
      throw new Error('missing-texture-bindings');
    }

    const result = { ok: true, reason: '' };
    modelValidationCache.set(url, result);
    return result;
  } catch (error) {
    const reason = String(error && error.message ? error.message : error || 'model-validation-failed');
    const result = { ok: false, reason };
    modelValidationCache.set(url, result);
    return result;
  } finally {
    if (importedAsset && importedAsset.scene) {
      disposeObject3D(importedAsset.scene);
    }
  }
}

async function filterValidModels(models) {
  if (!Array.isArray(models) || !models.length) {
    return { validModels: [], invalidModels: [] };
  }

  const queue = models.slice();
  const validModels = [];
  const invalidModels = [];
  const workerCount = Math.max(1, Math.min(3, queue.length));
  let checked = 0;

  setStatus(`Validating ${queue.length} model(s) for load and texture integrity...`, '');

  async function worker() {
    while (queue.length) {
      const row = queue.shift();
      if (!row) continue;
      const verdict = await validateModelEntry(row);
      checked += 1;
      if (verdict.ok) {
        validModels.push(row);
      } else {
        invalidModels.push({ row, reason: verdict.reason });
      }
      setStatus(`Validated ${checked}/${models.length} models...`, '');
    }
  }

  await Promise.all(Array.from({ length: workerCount }, () => worker()));
  return { validModels, invalidModels };
}

function fitPreviewCamera(root) {
  if (!root || !previewCamera) return;
  const box = new THREE.Box3().setFromObject(root);
  if (box.isEmpty()) {
    previewCamera.position.set(0, 1.1, 3.2);
    previewCamera.lookAt(0, 0.9, 0);
    return;
  }
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z, 0.2);

  root.position.sub(center);
  const fov = THREE.MathUtils.degToRad(previewCamera.fov);
  const dist = (maxDim * 1.2) / Math.tan(fov * 0.5);
  previewCamera.position.set(0, maxDim * 0.35, Math.max(dist, 1.5));
  previewCamera.lookAt(0, Math.max(size.y * 0.2, 0.3), 0);
}

function previewModel(url) {
  initPreviewScene();
  if (!previewAssetImporter || !previewSpinGroup) return;
  stopSwingDancePreview({ keepMeta: true });
  if (!url) {
    setPreviewMeta('Select a model to preview it.');
    previewModelRoot = null;
    refreshDancePreviewEligibility();
    return;
  }

  const requestId = ++previewRequestId;
  setPreviewMeta(`Loading preview: ${url}`);
  void (async () => {
    try {
      const importedAsset = await previewAssetImporter.load(url);
      if (requestId !== previewRequestId) return;
      if (previewModelRoot) {
        previewSpinGroup.remove(previewModelRoot);
        disposeObject3D(previewModelRoot);
        previewModelRoot = null;
      }
      previewModelRoot = importedAsset && importedAsset.scene ? importedAsset.scene : null;
      if (!previewModelRoot) {
        setPreviewMeta('Could not render this model (empty scene).');
        refreshDancePreviewEligibility();
        return;
      }
      previewSpinGroup.add(previewModelRoot);
      fitPreviewCamera(previewModelRoot);
      setPreviewMeta(`Previewing: ${url}`);
      refreshDancePreviewEligibility();
    } catch (err) {
      if (requestId !== previewRequestId) return;
      const message = err && err.message ? err.message : String(err || 'unknown error');
      setPreviewMeta(`Preview failed: ${message}`);
      previewModelRoot = null;
      refreshDancePreviewEligibility();
    }
  })();
}

function previewStoredModel(url) {
  const modelUrl = String(url || '').trim();
  if (!modelUrl) return;
  selectedModelUrl = modelUrl;
  localStorage.setItem(SELECTED_MODEL_STORAGE_KEY, selectedModelUrl);
  setStatus(`Previewing stored model ${modelUrl}.`, 'ok');
  previewModel(modelUrl);
}

function loadSelectedCharacter() {
  try {
    const raw = localStorage.getItem(SELECTED_CHARACTER_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : null;
    if (parsed && typeof parsed === 'object' && parsed.id) {
      selectedCharacter = {
        id: String(parsed.id),
        name: String(parsed.name || ''),
      };
    }
  } catch (_err) {
    selectedCharacter = null;
  }

  if (selectedCharacterId && selectedCharacter && selectedCharacter.id !== selectedCharacterId) {
    selectedCharacter = {
      id: selectedCharacterId,
      name: selectedCharacter.name || selectedCharacterId,
    };
    localStorage.setItem(SELECTED_CHARACTER_STORAGE_KEY, JSON.stringify(selectedCharacter));
  }

  if (!selectedCharacter || !selectedCharacter.id) {
    selectedCharacter = { ...FALLBACK_CHARACTER };
    localStorage.setItem(SELECTED_CHARACTER_STORAGE_KEY, JSON.stringify(selectedCharacter));
  }

  selectedCharacterLabelEl.textContent = `Selected character: ${selectedCharacter.name || selectedCharacter.id}`;
  return true;
}

function renderModels(models) {
  if (!Array.isArray(models) || models.length === 0) {
    modelGridEl.innerHTML = '<div class="empty">No stored models yet. Upload a .glb/.gltf/.fbx bundle to add one.</div>';
    return;
  }

  modelGridEl.innerHTML = models.map((row) => {
    const label = row && row.label ? row.label : 'Unnamed Model';
    const url = row && row.url ? row.url : '';
    const source = row && row.source ? row.source : '-';
    return `
      <article class="card" data-model-url="${escapeHtml(url)}">
        <h3>${escapeHtml(label)}</h3>
        <div class="meta">Source: ${escapeHtml(source)}\nURL: ${escapeHtml(url || '-')}</div>
      </article>
    `;
  }).join('');

  const cards = modelGridEl.querySelectorAll('.card[data-model-url]');
  cards.forEach((card) => {
    card.addEventListener('click', () => {
      const url = String(card.getAttribute('data-model-url') || '').trim();
      cards.forEach((el) => el.classList.remove('selected'));
      card.classList.add('selected');
      previewStoredModel(url);
    });
  });

  if (selectedModelUrl) {
    const existing = Array.from(cards).find((el) => String(el.getAttribute('data-model-url') || '').trim() === selectedModelUrl);
    if (existing) {
      cards.forEach((el) => el.classList.remove('selected'));
      existing.classList.add('selected');
      previewStoredModel(selectedModelUrl);
    }
  }
}

async function loadModels() {
  setStatus('Loading models...');
  const response = await fetch('/api/character-models', { credentials: 'same-origin' });
  const payload = await response.json().catch(() => ({ ok: false, models: [] }));
  if (!response.ok || payload.ok === false) {
    setStatus(`Could not load models: ${payload.error || response.statusText}`, 'error');
    renderModels([]);
    return;
  }
  const models = Array.isArray(payload.models) ? payload.models : [];
  const { validModels, invalidModels } = await filterValidModels(models);

  if (selectedModelUrl) {
    const exists = validModels.some((row) => String((row && row.url) || '').trim() === selectedModelUrl);
    if (!exists) {
      selectedModelUrl = '';
      localStorage.removeItem(SELECTED_MODEL_STORAGE_KEY);
      previewModel('');
    }
  }

  renderModels(validModels);
  if (selectedModelUrl) {
    setStatus(`Stored ${validModels.length} model(s). Hidden ${invalidModels.length} broken/incomplete model(s).`, 'ok');
    previewModel(selectedModelUrl);
  } else {
    setStatus(`Stored ${validModels.length} model(s). Hidden ${invalidModels.length} broken/incomplete model(s).`, 'ok');
    previewModel('');
  }
}

async function uploadModelFiles() {
  const folderFiles = modelFolderEl && modelFolderEl.files ? Array.from(modelFolderEl.files) : [];
  const directFiles = modelFileEl && modelFileEl.files ? Array.from(modelFileEl.files) : [];
  const files = folderFiles.length ? folderFiles : directFiles;
  if (!files.length) {
    setStatus('Choose one or more model files first.', 'error');
    return;
  }

  setStatus('Uploading model files...');
  const fd = new FormData();
  files.forEach((file) => {
    const relativeName = String(file.webkitRelativePath || file.name || '').trim();
    fd.append('model_files', file, relativeName || file.name);
  });
  const preferredEntry = files.find((file) => /\.(glb|gltf|fbx)$/i.test(String(file.name || '')));
  if (preferredEntry) {
    fd.append('model_entry', String(preferredEntry.webkitRelativePath || preferredEntry.name || '').trim());
  }
  const response = await fetch('/api/upload-character-model', {
    method: 'POST',
    body: fd,
    credentials: 'same-origin',
  });
  const payload = await response.json().catch(() => ({ ok: false, error: 'invalid-server-response' }));
  if (!response.ok || payload.ok === false) {
    setStatus(`Upload failed: ${payload.error || response.statusText}`, 'error');
    return;
  }

  const modelUrl = payload.model_url || (payload.files && payload.files[0] && payload.files[0].url) || '';
  if (modelUrl) {
    selectedModelUrl = String(modelUrl).trim();
    localStorage.setItem(SELECTED_MODEL_STORAGE_KEY, selectedModelUrl);
    previewModel(selectedModelUrl);
  }

  if (modelFileEl) modelFileEl.value = '';
  if (modelFolderEl) modelFolderEl.value = '';
  setStatus('Model uploaded.', 'ok');
  await loadModels();
}

if (loadSelectedCharacter()) {
  try {
    selectedModelUrl = String(localStorage.getItem(SELECTED_MODEL_STORAGE_KEY) || '').trim();
  } catch (_err) {
    selectedModelUrl = '';
  }

  refreshBtn.addEventListener('click', loadModels);
  uploadBtn.addEventListener('click', uploadModelFiles);
  if (uploadFolderBtn && modelFolderEl) {
    uploadFolderBtn.addEventListener('click', () => modelFolderEl.click());
    modelFolderEl.addEventListener('change', () => {
      if (modelFolderEl.files && modelFolderEl.files.length) {
        void uploadModelFiles();
      }
    });
  }
  if (previewDanceBtn) {
    previewDanceBtn.addEventListener('click', toggleSwingDancePreview);
  }

  loadModels().catch((err) => {
    setStatus(`Failed loading models: ${err && err.message ? err.message : String(err)}`, 'error');
  });
}
</script>
