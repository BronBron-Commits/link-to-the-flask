<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — Paraval</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #06090f;
      color: #e8e0d0;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
      gap: 0;
    }

    .crest {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .crest svg {
      width: 52px;
      height: 52px;
    }

    .title {
      font-size: 1.9rem;
      font-weight: normal;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #d9cfae;
      text-shadow: 0 2px 18px rgba(220,170,50,0.22);
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #514e44;
      margin-bottom: 18px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(210,175,70,0.35), transparent);
      margin-bottom: 22px;
    }

    .auth-panel {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(210,175,70,0.12);
      border-radius: 18px;
      padding: 26px 28px 22px;
      backdrop-filter: blur(12px);
    }

    .auth-title {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a89878;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 0.8rem;
      color: #6a6458;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .auth-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .field-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a7060;
    }

    .auth-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(210,175,70,0.14);
      border-radius: 8px;
      color: #e8e0d0;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.88rem;
      padding: 9px 11px;
      width: 100%;
      outline: none;
      transition: border-color 0.18s;
    }
    .auth-input:focus { border-color: rgba(210,175,70,0.38); }
    .auth-input::placeholder { color: #3a3830; }

    .auth-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .auth-btn {
      flex: 1;
      min-width: 110px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid rgba(210,175,70,0.22);
      background: rgba(255,255,255,0.03);
      color: #d9cfae;
      font-family: Georgia, serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .auth-btn:hover {
      border-color: rgba(210,175,70,0.55);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.32);
    }
    .auth-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .auth-btn.primary {
      background: linear-gradient(155deg, rgba(80,61,20,0.98), rgba(39,31,14,0.98));
    }
    .auth-btn.is-hidden { display: none !important; }

    .auth-status {
      min-height: 20px;
      margin-top: 14px;
      color: #8f8778;
      font-size: 0.8rem;
      line-height: 1.45;
      text-align: center;
    }
    .auth-status.is-error { color: #d58f83; }
    .auth-status.is-success { color: #a8c78a; }

    .account-summary {
      display: none;
      margin-top: 14px;
      border: 1px solid rgba(210,175,70,0.12);
      border-radius: 14px;
      background: rgba(255,255,255,0.025);
      padding: 14px;
      gap: 10px;
    }
    .account-summary.show { display: grid; }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #d9cfae;
      font-size: 0.82rem;
      font-family: Consolas, 'Courier New', monospace;
    }
    .summary-label {
      color: #8f8778;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.68rem;
      white-space: nowrap;
    }
    .summary-value { text-align: right; word-break: break-word; }

    /* ── Nav links ── */
    .nav-links {
      display: flex;
      gap: 20px;
      margin-top: 18px;
      justify-content: center;
    }
    .nav-link {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6a6458;
      text-decoration: none;
      transition: color 0.18s;
    }
    .nav-link:hover { color: #d9cfae; }

    .footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: #3a3830;
      text-transform: uppercase;
    }
  </style>
</head>
<body data-supabase-url="{{ supabase_url|e }}" data-supabase-anon-key="{{ supabase_anon_key|e }}">

<canvas id="bg-canvas"></canvas>

<div class="shell">
  <div class="crest">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="36" cy="54" rx="18" ry="7" fill="rgba(180,120,20,0.18)"/>
      <path d="M28 44 C24 34 18 28 22 18 C25 10 34 8 36 14 C38 8 47 10 50 18 C54 28 48 34 44 44 Z"
            fill="url(#flameGrad)" opacity="0.9"/>
      <path d="M31 44 C29 37 26 32 29 24 C31 18 36 18 36 22 C36 18 41 18 43 24 C46 32 43 37 41 44 Z"
            fill="url(#innerFlame)" opacity="0.85"/>
      <circle cx="36" cy="46" r="4.5" fill="url(#orbGrad)" opacity="0.95"/>
      <defs>
        <linearGradient id="flameGrad" x1="36" y1="8" x2="36" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f9d46a"/>
          <stop offset="60%" stop-color="#e07820"/>
          <stop offset="100%" stop-color="#8b2a00"/>
        </linearGradient>
        <linearGradient id="innerFlame" x1="36" y1="18" x2="36" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#f9c048" stop-opacity="0.4"/>
        </linearGradient>
        <radialGradient id="orbGrad" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stop-color="#ffe97a"/>
          <stop offset="100%" stop-color="#c06010"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <h1 class="title">Paraval</h1>
  <p class="subtitle">Player Account</p>
  <div class="divider"></div>

  <section class="auth-panel" aria-label="Account management">
    <div class="auth-title">Account</div>
    <p class="auth-subtitle" id="account-greeting">Loading your profile…</p>

    <div class="auth-fields">
      <div class="field-wrap">
        <label class="field-label" for="auth-display-name">Display Name</label>
        <input id="auth-display-name" class="auth-input" type="text" autocomplete="nickname" placeholder="Paraval Wanderer" />
      </div>
      <div class="field-wrap">
        <label class="field-label" for="auth-password">New Password</label>
        <input id="auth-password" class="auth-input" type="password" autocomplete="new-password" placeholder="Leave blank to keep current" />
      </div>
    </div>

    <div class="auth-actions">
      <button id="auth-save-profile" class="auth-btn primary" type="button">Save Profile</button>
      <button id="auth-reset-password" class="auth-btn" type="button">Email Reset Link</button>
      <button id="auth-sign-out" class="auth-btn" type="button">Sign Out</button>
    </div>

    <div id="auth-status" class="auth-status"></div>

    <div id="auth-summary" class="account-summary">
      <div class="summary-row"><span class="summary-label">Display</span><span id="summary-display-name" class="summary-value">-</span></div>
      <div class="summary-row"><span class="summary-label">Email</span><span id="summary-email" class="summary-value">-</span></div>
      <div class="summary-row"><span class="summary-label">Status</span><span id="summary-status" class="summary-value">-</span></div>
      <div class="summary-row"><span class="summary-label">User ID</span><span id="summary-id" class="summary-value">-</span></div>
    </div>
  </section>

  <nav class="nav-links">
    <a class="nav-link" href="/">&#8592; Back</a>
    <a class="nav-link" href="/map3d">Enter World</a>
  </nav>
</div>

<p class="footer">Paraval &nbsp;·&nbsp; Tabletop Game Engine</p>

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  function rand(a, b) { return a + Math.random() * (b - a); }
  for (let i = 0; i < 90; i++) {
    particles.push({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6),
      vx: rand(-0.06, 0.06), vy: rand(-0.14, -0.04), alpha: rand(0.08, 0.45), hue: rand(32, 52) });
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -4) { p.y = H + 4; p.x = rand(0, W); }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 68%, ${p.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script type="module">
const displayNameEl = document.getElementById('auth-display-name');
const passwordEl = document.getElementById('auth-password');
const saveProfileBtn = document.getElementById('auth-save-profile');
const resetPasswordBtn = document.getElementById('auth-reset-password');
const signOutBtn = document.getElementById('auth-sign-out');
const statusEl = document.getElementById('auth-status');
const summaryEl = document.getElementById('auth-summary');
const summaryDisplayNameEl = document.getElementById('summary-display-name');
const summaryEmailEl = document.getElementById('summary-email');
const summaryStatusEl = document.getElementById('summary-status');
const summaryIdEl = document.getElementById('summary-id');
const greetingEl = document.getElementById('account-greeting');

const supabaseUrl = String(document.body.dataset.supabaseUrl || '').trim();
const supabaseAnonKey = String(document.body.dataset.supabaseAnonKey || '').trim();
let currentUser = null;

function setStatus(message, tone = '') {
  statusEl.textContent = message;
  statusEl.className = `auth-status${tone ? ` is-${tone}` : ''}`;
}

function renderAccount(user) {
  currentUser = user || null;
  if (user && (user.email || user.id)) {
    greetingEl.textContent = `Welcome back, ${user.displayName || user.email || 'Adventurer'}.`;
    summaryEl.classList.add('show');
    summaryDisplayNameEl.textContent = user.displayName || 'Not set';
    summaryEmailEl.textContent = user.email || '-';
    summaryStatusEl.textContent = user.emailConfirmed ? 'Email confirmed' : 'Pending email confirmation';
    summaryIdEl.textContent = user.id || '-';
    displayNameEl.value = user.displayName || '';
  } else {
    greetingEl.textContent = '';
    summaryEl.classList.remove('show');
  }
}

// Check existing backend session
const meResponse = await fetch('/api/auth/me', { credentials: 'same-origin' });
const mePayload = await meResponse.json();

if (!mePayload.authenticated || !mePayload.user) {
  // Not signed in — send back to the landing page
  window.location.replace('/');
}

renderAccount(mePayload.user || null);

if (!supabaseUrl || !supabaseAnonKey) {
  setStatus('Supabase is not configured on this server.', 'error');
  saveProfileBtn.disabled = true;
  resetPasswordBtn.disabled = true;
} else {
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  const supabase = createClient(supabaseUrl, supabaseAnonKey, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false },
  });

  async function exchangeSession(session) {
    const response = await fetch('/api/auth/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ accessToken: session.access_token }),
    });
    const payload = await response.json().catch(() => ({ ok: false, error: 'invalid-server-response' }));
    if (!response.ok || payload.ok === false) {
      throw new Error(String(payload.error || response.statusText || 'auth-session-failed'));
    }
    renderAccount(payload.user || null);
  }

  saveProfileBtn.addEventListener('click', async () => {
    const sessionResult = await supabase.auth.getSession();
    if (!sessionResult.data.session) {
      setStatus('Session expired. Please sign in again.', 'error');
      return;
    }
    const displayName = String(displayNameEl.value || '').trim();
    const nextPassword = String(passwordEl.value || '');
    setStatus('Saving…', '');
    const updatePayload = { data: { display_name: displayName } };
    if (nextPassword) {
      if (nextPassword.length < 8) {
        setStatus('Use a password with at least 8 characters.', 'error');
        return;
      }
      updatePayload.password = nextPassword;
    }
    const result = await supabase.auth.updateUser(updatePayload);
    if (result.error) { setStatus(result.error.message, 'error'); return; }
    const refreshed = await supabase.auth.getSession();
    if (refreshed.data.session) {
      try {
        await exchangeSession(refreshed.data.session);
      } catch (error) {
        setStatus(`Backend sync failed: ${error.message}`, 'error');
        return;
      }
    }
    passwordEl.value = '';
    setStatus('Profile saved.', 'success');
  });

  resetPasswordBtn.addEventListener('click', async () => {
    const email = String((currentUser && currentUser.email) || '').trim();
    if (!email) { setStatus('No email address on file.', 'error'); return; }
    setStatus('Sending password reset email…', '');
    const result = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/account',
    });
    if (result.error) { setStatus(result.error.message, 'error'); return; }
    setStatus('Password reset email sent.', 'success');
  });

  signOutBtn.addEventListener('click', async () => {
    await supabase.auth.signOut();
    await fetch('/api/auth/logout', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
    });
    window.location.replace('/');
  });

  supabase.auth.onAuthStateChange((_event, session) => {
    if (!session) {
      window.location.replace('/');
    }
  });
}
</script>

</body>
</html>
