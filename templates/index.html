<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Engine View</title>
<style>
/* Removed invalid CSS properties */
body{background:#111;color:white;text-align:center;font-family:sans-serif;margin:0}
canvas{background:#222;display:block;position:fixed;top:0;left:0;margin:0;padding:0;z-index:0;}
/* Joystick and button styles removed */
</style>
</head>
<body>

<canvas id="game" width="400" height="400"></canvas>
<script>
function resizeCanvas() {
	const canvas = document.getElementById('game');
	canvas.width = window.innerWidth;
	canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('DOMContentLoaded', resizeCanvas);
</script>

<!-- Joystick and button UI removed -->

<!-- THIS loads your actual game code -->
<script type="module" src="/static/game.js?v=99"></script>

</body>
</html>
