<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link to the Flask</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #06090f;
      color: #e8e0d0;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }

    /* ── Particle canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout shell ── */
    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
      gap: 0;
    }

    /* ── Crest / logo area ── */
    .crest {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .crest svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 18px rgba(180,140,60,0.55));
      animation: float 4.8s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    /* ── Title ── */
    .title {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #f0dfa0;
      text-shadow: 0 0 40px rgba(210,175,70,0.4), 0 2px 16px rgba(0,0,0,0.7);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: clamp(0.8rem, 1.6vw, 1rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8a7f6a;
      margin-bottom: 48px;
    }

    /* ── Divider ── */
    .divider {
      width: 240px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(210,175,70,0.45), transparent);
      margin-bottom: 48px;
    }

    .enter-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      padding: 16px 28px;
      border-radius: 999px;
      border: 1px solid rgba(210,175,70,0.35);
      background: linear-gradient(155deg, rgba(18,22,36,0.96), rgba(12,15,26,0.98));
      color: #f0dfa0;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.88rem;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .enter-link:hover {
      border-color: rgba(210,175,70,0.6);
      box-shadow: 0 12px 44px rgba(0,0,0,0.65), 0 0 22px rgba(180,140,60,0.18);
      transform: translateY(-3px);
    }
    .enter-link:active {
      transform: translateY(-1px);
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: #3a3830;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="shell">
  <div class="crest">
    <!-- Flame / flask crest SVG -->
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="36" cy="54" rx="18" ry="7" fill="rgba(180,120,20,0.18)"/>
      <path d="M28 44 C24 34 18 28 22 18 C25 10 34 8 36 14 C38 8 47 10 50 18 C54 28 48 34 44 44 Z"
            fill="url(#flameGrad)" opacity="0.9"/>
      <path d="M31 44 C29 37 26 32 29 24 C31 18 36 18 36 22 C36 18 41 18 43 24 C46 32 43 37 41 44 Z"
            fill="url(#innerFlame)" opacity="0.85"/>
      <circle cx="36" cy="46" r="4.5" fill="url(#orbGrad)" opacity="0.95"/>
      <defs>
        <linearGradient id="flameGrad" x1="36" y1="8" x2="36" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f9d46a"/>
          <stop offset="60%" stop-color="#e07820"/>
          <stop offset="100%" stop-color="#8b2a00"/>
        </linearGradient>
        <linearGradient id="innerFlame" x1="36" y1="18" x2="36" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#f9c048" stop-opacity="0.4"/>
        </linearGradient>
        <radialGradient id="orbGrad" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stop-color="#ffe97a"/>
          <stop offset="100%" stop-color="#c06010"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <h1 class="title">Paraval</h1>
  <p class="subtitle">A Tabletop Game Engine</p>
  <div class="divider"></div>

  <a class="enter-link" href="/static/combat_arena.html">Enter</a>
</div>

<p class="footer">Paraval &nbsp;·&nbsp; Tabletop Game Engine</p>

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function rand(a, b) { return a + Math.random() * (b - a); }

  for (let i = 0; i < 90; i++) {
    particles.push({
      x: rand(0, W), y: rand(0, H),
      r: rand(0.4, 1.6),
      vx: rand(-0.06, 0.06), vy: rand(-0.14, -0.04),
      alpha: rand(0.08, 0.45),
      hue: rand(32, 52),
    });
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -4) { p.y = H + 4; p.x = rand(0, W); }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 68%, ${p.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

</body>
</html>
