<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireplace Chamber</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08090f;
      font-family: Consolas, 'Courier New', monospace;
      color: #eef2ff;
    }
    #back-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      text-decoration: none;
      border: 1px solid rgba(99,102,241,0.4);
      background: rgba(10,12,22,0.8);
      color: #c7d2fe;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(4px);
    }
    #back-link:hover {
      background: rgba(26, 32, 66, 0.9);
      color: #eef2ff;
    }
    #scene-label {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,12,22,0.75);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #8892b0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }
    #creator-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 360px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 92px);
      overflow: auto;
      z-index: 20;
      background: linear-gradient(155deg, rgba(14,16,30,0.95) 0%, rgba(10,12,24,0.97) 100%);
      border: 1px solid rgba(99,102,241,0.36);
      border-radius: 14px;
      box-shadow: 0 16px 44px rgba(0,0,0,0.62);
      backdrop-filter: blur(6px);
      padding: 14px;
    }
    #creator-title {
      margin: 0 0 6px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }
    #creator-sub {
      margin: 0 0 12px;
      font-size: 11px;
      line-height: 1.45;
      color: #8188b0;
    }
    .creator-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .creator-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .creator-field.full {
      grid-column: 1 / -1;
    }
    .creator-label {
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6a739f;
    }
    .creator-input,
    .creator-select {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.3);
      background: rgba(8,10,20,0.84);
      color: #eef2ff;
      padding: 8px 9px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    .creator-input:focus,
    .creator-select:focus {
      border-color: rgba(129,140,248,0.9);
      box-shadow: 0 0 0 2px rgba(129,140,248,0.2);
    }
    .creator-other {
      display: none;
      margin-top: 6px;
    }
    .creator-other.show {
      display: block;
    }
    #creator-preview {
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      font-size: 11px;
      line-height: 1.5;
      color: #a7b0d8;
      white-space: pre-wrap;
    }
    .creator-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .creator-btn {
      flex: 1;
      border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.32);
      background: rgba(24,29,53,0.95);
      color: #e6e9ff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      padding: 10px 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .creator-btn:hover {
      background: rgba(53,63,115,0.95);
    }
    .creator-btn:active {
      transform: scale(0.98);
    }
    .creator-btn.primary {
      background: linear-gradient(145deg, rgba(74,86,168,0.95), rgba(57,68,136,0.95));
      border-color: rgba(129,140,248,0.7);
    }
    .creator-btn.primary:hover {
      background: linear-gradient(145deg, rgba(98,112,214,0.96), rgba(70,82,164,0.96));
    }
    #creator-note {
      margin-top: 8px;
      font-size: 10px;
      color: #6a739f;
      letter-spacing: 0.04em;
    }
    #lobby-status {
      margin-top: 10px;
      font-size: 11px;
      color: #98a1cf;
      letter-spacing: 0.03em;
    }
    #lobby-roster {
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      font-size: 11px;
      line-height: 1.45;
      color: #a7b0d8;
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <a id="back-link" href="/">&larr; Back to Room</a>
  <div id="scene-label">Character Creation Chamber</div>

  <aside id="creator-panel">
    <h2 id="creator-title">Forge Your Character</h2>
    <p id="creator-sub">Shape your identity by the fire, then step into the world.</p>

    <div class="creator-grid">
      <label class="creator-field full">
        <span class="creator-label">Character Name</span>
        <input id="cc-name" class="creator-input" type="text" placeholder="Alyra Stormglass" />
      </label>

      <label class="creator-field">
        <span class="creator-label">Species</span>
        <select id="cc-species" class="creator-select">
          <option>Aasimar</option>
          <option>Dragonborn</option>
          <option>Dwarf</option>
          <option>Human</option>
          <option>Elf</option>
          <option>Firbolg</option>
          <option>Genasi</option>
          <option>Gnome</option>
          <option>Goblin</option>
          <option>Goliath</option>
          <option>Halfling</option>
          <option>Half-Elf</option>
          <option>Half-Orc</option>
          <option>Kenku</option>
          <option>Kobold</option>
          <option>Orc</option>
          <option>Tabaxi</option>
          <option>Tiefling</option>
          <option>Yuan-ti</option>
          <option value="__other__">Other (type your own)</option>
        </select>
        <input id="cc-species-other" class="creator-input creator-other" type="text" placeholder="Custom species" />
      </label>

      <label class="creator-field">
        <span class="creator-label">Class</span>
        <select id="cc-class" class="creator-select">
          <option>Barbarian</option>
          <option>Bard</option>
          <option>Cleric</option>
          <option>Druid</option>
          <option>Fighter</option>
          <option>Monk</option>
          <option>Paladin</option>
          <option>Ranger</option>
          <option>Rogue</option>
          <option>Sorcerer</option>
          <option>Warlock</option>
          <option>Wizard</option>
          <option value="__other__">Other (type your own)</option>
        </select>
        <input id="cc-class-other" class="creator-input creator-other" type="text" placeholder="Custom class" />
      </label>

      <label class="creator-field">
        <span class="creator-label">Origin</span>
        <select id="cc-origin" class="creator-select">
          <option>Noble House</option>
          <option>Arcane Academy</option>
          <option>Street Survivor</option>
          <option>Temple Ward</option>
          <option>Frontier Outpost</option>
          <option>Shadow Court</option>
          <option value="__other__">Other (type your own)</option>
        </select>
        <input id="cc-origin-other" class="creator-input creator-other" type="text" placeholder="Custom origin" />
      </label>

      <label class="creator-field">
        <span class="creator-label">Voice</span>
        <select id="cc-voice" class="creator-select">
          <option>Calm</option>
          <option>Stoic</option>
          <option>Bold</option>
          <option>Mystic</option>
          <option value="__other__">Other (type your own)</option>
        </select>
        <input id="cc-voice-other" class="creator-input creator-other" type="text" placeholder="Custom voice" />
      </label>

      <label class="creator-field full">
        <span class="creator-label">Aura Color</span>
        <input id="cc-color" class="creator-input" type="color" value="#7f6bff" />
      </label>

      <label class="creator-field full">
        <span class="creator-label">Faction Side</span>
        <select id="cc-side" class="creator-select">
          <option value="heroes">Heroes</option>
          <option value="villains">Villains</option>
        </select>
      </label>

      <label class="creator-field full">
        <span class="creator-label">Character Model From Game Folder</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="cc-model-select" class="creator-select" style="flex:1 1 auto;"></select>
          <button id="cc-model-refresh" class="creator-btn" type="button" style="flex:0 0 auto;padding:8px 10px;">Refresh</button>
        </div>
      </label>

      <label class="creator-field full">
        <span class="creator-label">Character Model (.glb/.gltf)</span>
        <div style="display:flex;gap:8px;">
          <input id="cc-model-file" class="creator-input" type="file" accept=".glb,.gltf,.bin,image/*,model/gltf-binary,model/gltf+json" multiple />
          <button id="cc-model-upload" class="creator-btn" type="button" style="flex:0 0 auto;padding:8px 10px;">Upload</button>
        </div>
        <div id="cc-model-status" style="margin-top:6px;font-size:10px;color:#6a739f;letter-spacing:0.03em;">Using procedural avatar. Upload a rigged model and the game will auto-map the skeleton as far as it can. For .gltf, select .gltf + .bin + textures together.</div>
        <div id="cc-rig-report" style="margin-top:6px;font-size:10px;line-height:1.45;color:#8892b0;white-space:pre-wrap;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px;">Rig report: procedural avatar. Uploaded rigs get forgiving auto-mapping for gameplay.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
          <button id="cc-rig-backflip" class="creator-btn" type="button" style="padding:8px 10px;">Front Flip Preview</button>
          <button id="cc-rig-idle" class="creator-btn" type="button" style="padding:8px 10px;">Start Idle Preview</button>
          <button id="cc-rig-walk" class="creator-btn" type="button" style="padding:8px 10px;">Start Walk Preview</button>
          <button id="cc-rig-dance" class="creator-btn" type="button" style="padding:8px 10px;">Start Dance Preview</button>
          <button id="cc-rig-rebone" class="creator-btn" type="button" style="padding:8px 10px;">Use Fallback Rebone</button>
          <button id="cc-rig-clear-rotations" class="creator-btn" type="button" style="padding:8px 10px;">Clear Bone Rotations</button>
          <button id="cc-rig-diagnostics" class="creator-btn" type="button" style="padding:8px 10px;">Show Rig Diagnostics</button>
        </div>
      </label>

      <label class="creator-field full">
        <span class="creator-label">Training Dummy Avatar (.glb/.gltf)</span>
        <div style="display:flex;gap:8px;">
          <input id="cc-dummy-model-file" class="creator-input" type="file" accept=".glb,.gltf,.bin,image/*,model/gltf-binary,model/gltf+json" multiple />
          <button id="cc-dummy-model-upload" class="creator-btn" type="button" style="flex:0 0 auto;padding:8px 10px;">Upload Dummy</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;">
          <span style="font-size:11px;letter-spacing:0.04em;color:#9aa6d4;">Dummy Pose</span>
          <select id="cc-dummy-pose" class="creator-select" style="max-width:220px;">
            <option value="idle">Idle</option>
            <option value="guard">Guard</option>
            <option value="taunt">Taunt</option>
            <option value="slump">Slump</option>
          </select>
        </div>
        <div id="cc-dummy-model-status" style="margin-top:6px;font-size:10px;color:#6a739f;letter-spacing:0.03em;">Using default in-game dummy model. Upload a custom rig and choose a pose.</div>
      </label>
    </div>

    <div id="creator-preview"></div>

    <div class="creator-actions">
      <button id="cc-random" class="creator-btn">Randomize</button>
      <button id="cc-begin" class="creator-btn primary">Join Fireplace Lobby</button>
      <button id="cc-start-combat" class="creator-btn primary" type="button" style="display:none;">Start Combat</button>
    </div>

    <div id="lobby-status">Not connected to lobby.</div>
    <div id="lobby-roster">Lobby roster will appear here.</div>

    <div id="creator-note">Stored locally as character_profile_v1. Lobby runs in this fireplace scene.</div>
  </aside>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script type="module" src="/static/fireplace_scene.js"></script>
</body>
</html>
