<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireplace Chamber</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08090f;
      font-family: Consolas, 'Courier New', monospace;
      color: #eef2ff;
    }
    #back-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      text-decoration: none;
      border: 1px solid rgba(99,102,241,0.4);
      background: rgba(10,12,22,0.8);
      color: #c7d2fe;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(4px);
    }
    #back-link:hover {
      background: rgba(26, 32, 66, 0.9);
      color: #eef2ff;
    }
    #scene-label {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,12,22,0.75);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #8892b0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }
    #creator-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 360px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 92px);
      overflow: auto;
      z-index: 20;
      background: linear-gradient(155deg, rgba(14,16,30,0.95) 0%, rgba(10,12,24,0.97) 100%);
      border: 1px solid rgba(99,102,241,0.36);
      border-radius: 14px;
      box-shadow: 0 16px 44px rgba(0,0,0,0.62);
      backdrop-filter: blur(6px);
      padding: 14px;
    }
    #creator-title {
      margin: 0 0 6px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }
    #creator-sub {
      margin: 0 0 12px;
      font-size: 11px;
      line-height: 1.45;
      color: #8188b0;
    }
    .creator-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .creator-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .creator-field.full {
      grid-column: 1 / -1;
    }
    .creator-label {
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6a739f;
    }
    .creator-input,
    .creator-select {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.3);
      background: rgba(8,10,20,0.84);
      color: #eef2ff;
      padding: 8px 9px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    .creator-input:focus,
    .creator-select:focus {
      border-color: rgba(129,140,248,0.9);
      box-shadow: 0 0 0 2px rgba(129,140,248,0.2);
    }
    .creator-other {
      display: none;
      margin-top: 6px;
    }
    .creator-other.show {
      display: block;
    }
    #creator-preview {
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      font-size: 11px;
      line-height: 1.5;
      color: #a7b0d8;
      white-space: pre-wrap;
    }
    .creator-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .creator-btn {
      flex: 1;
      border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.32);
      background: rgba(24,29,53,0.95);
      color: #e6e9ff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      padding: 10px 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .creator-btn:hover {
      background: rgba(53,63,115,0.95);
    }
    .creator-btn:active {
      transform: scale(0.98);
    }
    .creator-btn.primary {
      background: linear-gradient(145deg, rgba(74,86,168,0.95), rgba(57,68,136,0.95));
      border-color: rgba(129,140,248,0.7);
    }
    .creator-btn.primary:hover {
      background: linear-gradient(145deg, rgba(98,112,214,0.96), rgba(70,82,164,0.96));
    }
    #creator-note {
      margin-top: 8px;
      font-size: 10px;
      color: #6a739f;
      letter-spacing: 0.04em;
    }
    #lobby-status {
      margin-top: 10px;
      font-size: 11px;
      color: #98a1cf;
      letter-spacing: 0.03em;
    }
    #lobby-roster {
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      font-size: 11px;
      line-height: 1.45;
      color: #a7b0d8;
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <a id="back-link" href="/">&larr; Back to Room</a>
  <div id="scene-label">Fireplace Chamber</div>

  <aside id="creator-panel">
    <h2 id="creator-title">Enter the Fireplace</h2>
    <p id="creator-sub">Upload your character model and sheet, then step into the world.</p>

    <div class="creator-grid">
      <label class="creator-field full">
        <span class="creator-label">Character Name</span>
        <input id="cc-name" class="creator-input" type="text" placeholder="Alyra Stormglass" />
      </label>

      <label class="creator-field full">
        <span class="creator-label">Aura Color</span>
        <input id="cc-color" class="creator-input" type="color" value="#7f6bff" />
      </label>

      <label class="creator-field full">
        <span class="creator-label">Faction Side</span>
        <select id="cc-side" class="creator-select">
          <option value="heroes">Heroes</option>
          <option value="villains">Villains</option>
        </select>
      </label>

      <label class="creator-field full">
        <span class="creator-label">Role</span>
        <select id="cc-role" class="creator-select">
          <option value="player">Player</option>
          <option value="dm">DM (Dungeon Master)</option>
        </select>
      </label>

      <label class="creator-field full">
        <span class="creator-label">Player Model (.glb / .gltf)</span>
        <div style="display:flex;gap:8px;">
          <input id="cc-model-file" class="creator-input" type="file" accept=".glb,.gltf,.bin,image/*,model/gltf-binary,model/gltf+json" multiple />
          <button id="cc-model-upload" class="creator-btn" type="button" style="flex:0 0 auto;padding:8px 10px;">Upload</button>
        </div>
        <div id="cc-model-status" style="margin-top:6px;font-size:10px;color:#6a739f;letter-spacing:0.03em;">No model uploaded — procedural avatar will be used.</div>
        <div id="cc-rig-report" style="display:none;"></div>
      </label>

      <label class="creator-field full">
        <span class="creator-label">Character Sheet (.pdf)</span>
        <div style="display:flex;gap:8px;">
          <input id="cc-pdf-file" class="creator-input" type="file" accept=".pdf" />
          <button id="cc-pdf-upload" class="creator-btn" type="button" style="flex:0 0 auto;padding:8px 10px;">Upload</button>
        </div>
        <div id="cc-pdf-status" style="margin-top:6px;font-size:10px;color:#6a739f;letter-spacing:0.03em;">No sheet uploaded yet.</div>
      </label>
    </div>

    <div id="creator-preview"></div>

    <div class="creator-actions">
      <button id="cc-begin" class="creator-btn primary">Join Fireplace Lobby</button>
      <button id="cc-start-combat" class="creator-btn primary" type="button" style="display:none;">Start Combat</button>
    </div>

    <div id="lobby-status">Not connected to lobby.</div>
    <div id="lobby-roster">Lobby roster will appear here.</div>

    <div id="creator-note">Character saved locally as character_profile_v1.</div>
  </aside>
  <div id="combat-ui-root"></div>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script type="module" src="/static/fireplace_scene.js"></script>
</body>
</html>
