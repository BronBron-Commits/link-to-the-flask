<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Playground</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070b12;
      color: #e7ebf3;
      font-family: Consolas, "Courier New", monospace;
    }

    #scene-root {
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid rgba(160, 180, 220, 0.3);
      background: rgba(7, 11, 18, 0.75);
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    .hud a {
      color: #d9e5ff;
      text-decoration: none;
      border: 1px solid rgba(160, 180, 220, 0.45);
      padding: 4px 8px;
      border-radius: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .hud span {
      color: #9ca8c5;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="hud">
    <a id="back-link" href="/world-select">World Select</a>
    <span>Dev Playground (Blank Scene)</span>
  </div>
  <div id="scene-root"></div>

  <script src="/static/three.js"></script>
  <script src="/static/OrbitControls.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search || '');
      const characterId = String(params.get('characterId') || '').trim();
      const modelUrl = String(params.get('modelUrl') || '').trim();
      const backLink = document.getElementById('back-link');

      if (characterId || modelUrl) {
        const backUrl = new URL('/world-select', window.location.origin);
        if (characterId) {
          backUrl.searchParams.set('characterId', characterId);
        }
        if (modelUrl) {
          backUrl.searchParams.set('modelUrl', modelUrl);
        }
        backLink.href = backUrl.pathname + backUrl.search;
      }

      const root = document.getElementById('scene-root');
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x070b12, 1);
      root.appendChild(renderer.domElement);

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(8, 6, 8);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 1, 0);
      controls.update();

      const hemi = new THREE.HemisphereLight(0x91a7ff, 0x111111, 1.0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(5, 12, 6);
      scene.add(dir);

      const grid = new THREE.GridHelper(120, 120, 0x4f6ea8, 0x25324f);
      grid.position.y = 0;
      scene.add(grid);

      const axes = new THREE.AxesHelper(2.5);
      axes.position.y = 0.01;
      scene.add(axes);

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      window.addEventListener('resize', onResize);

      function animate() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();
    })();
  </script>
</body>
</html>
