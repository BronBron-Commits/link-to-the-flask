<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paraval Open World</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #090b12;
            color: #e8edf7;
            font-family: Consolas, 'Courier New', monospace;
        }
        #back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 12;
            text-decoration: none;
            border: 1px solid rgba(130, 146, 208, 0.46);
            background: rgba(10, 14, 25, 0.78);
            color: #d6def4;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            letter-spacing: 0.04em;
            backdrop-filter: blur(4px);
        }
        #social-overlay {
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 13;
            width: min(420px, calc(100vw - 28px));
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            background: rgba(10, 14, 25, 0.8);
            backdrop-filter: blur(6px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.34);
            display: grid;
            gap: 8px;
            padding: 10px;
        }
        .social-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .social-title {
            color: #e9d8a4;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #voice-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #voice-toggle {
            border: 1px solid rgba(170, 192, 255, 0.56);
            border-radius: 8px;
            background: rgba(34, 46, 79, 0.9);
            color: #eaf0ff;
            font-family: inherit;
            font-size: 11px;
            padding: 6px 8px;
            cursor: pointer;
        }
        #voice-state {
            font-size: 10px;
            color: #95a6d4;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            min-width: 76px;
            text-align: right;
        }
        #social-players {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(7, 10, 18, 0.55);
            padding: 8px;
            max-height: 122px;
            overflow-y: auto;
            display: grid;
            gap: 4px;
        }
        .social-player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #b7c5ec;
            font-size: 11px;
            line-height: 1.4;
        }
        .social-player-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 260px;
        }
        .social-player-voice {
            font-size: 10px;
            color: #8ea0cd;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .voice-speaking {
            color: #9be6a4;
            font-weight: 700;
        }
        #social-chat-log {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(7, 10, 18, 0.55);
            padding: 8px;
            min-height: 86px;
            max-height: 170px;
            overflow-y: auto;
            display: grid;
            gap: 5px;
            align-content: start;
        }
        .chat-line {
            color: #d8e0f8;
            font-size: 11px;
            line-height: 1.4;
            word-break: break-word;
        }
        .chat-name {
            color: #f4d99c;
            font-weight: 700;
            margin-right: 6px;
        }
        .chat-system {
            color: #9bb2df;
            font-style: italic;
        }
        .social-chat-entry {
            display: flex;
            gap: 6px;
        }
        #social-chat-input {
            flex: 1;
            border-radius: 8px;
            border: 1px solid rgba(130, 146, 208, 0.5);
            background: rgba(10, 14, 25, 0.85);
            color: #e8edf7;
            padding: 7px 8px;
            font-family: inherit;
            font-size: 12px;
            outline: none;
        }
        #social-chat-send {
            border: 1px solid rgba(170, 192, 255, 0.56);
            border-radius: 8px;
            background: rgba(34, 46, 79, 0.9);
            color: #eaf0ff;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 0.04em;
            padding: 0 10px;
            cursor: pointer;
        }
        @media (max-width: 760px) {
            #social-overlay {
                right: 10px;
                left: 10px;
                width: auto;
                bottom: 10px;
            }
        }
        #name-gate {
            position: fixed;
            inset: 0;
            z-index: 24;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(18, 24, 38, 0.72), rgba(4, 6, 11, 0.92));
            backdrop-filter: blur(6px);
        }
        .name-card {
            width: min(460px, calc(100vw - 36px));
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            background: rgba(8, 12, 22, 0.9);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.56);
            padding: 16px;
        }
        .name-title {
            color: #e9d8a4;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .name-sub {
            color: #9fb0da;
            font-size: 12px;
            line-height: 1.45;
            margin-bottom: 10px;
        }
        #display-name-input {
            width: 100%;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid rgba(130, 146, 208, 0.52);
            background: rgba(12, 16, 28, 0.92);
            color: #e8edf7;
            padding: 10px 12px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 14px;
            outline: none;
        }
        #display-name-input:focus {
            border-color: rgba(184, 202, 255, 0.82);
            box-shadow: 0 0 0 2px rgba(138, 161, 230, 0.25);
        }
        .name-actions {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
        }
        #display-name-submit {
            border: 1px solid rgba(170, 192, 255, 0.7);
            border-radius: 10px;
            background: rgba(47, 64, 107, 0.94);
            color: #eaf0ff;
            padding: 9px 14px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
        }
        #display-name-error {
            min-height: 16px;
            margin-top: 8px;
            color: #e0a8a8;
            font-size: 11px;
        }
        #compass-gizmo {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 12;
            border-radius: 50%;
            pointer-events: none;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.55));
        }
        #hud-coords {
            position: fixed;
            top: 110px;
            right: 14px;
            z-index: 12;
            pointer-events: none;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.6;
            color: #b7c5ec;
            background: rgba(8, 12, 22, 0.72);
            border: 1px solid rgba(130, 146, 208, 0.28);
            border-radius: 6px;
            padding: 5px 9px;
            text-align: right;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <a id="back-link" href="/world-select">&larr; Back to Worlds</a>
    <canvas id="compass-gizmo" width="90" height="90" aria-label="Compass"></canvas>
    <div id="hud-coords">X&nbsp;0.00<br>Y&nbsp;0.00<br>Z&nbsp;0.00</div>

    <section id="name-gate" aria-label="Display name prompt">
        <div class="name-card">
            <div class="name-title">Enter Open World</div>
            <div class="name-sub">What's your display name?</div>
            <input id="display-name-input" type="text" maxlength="24" placeholder="Type your display name" />
            <div id="display-name-error"></div>
            <div class="name-actions">
                <button id="display-name-submit" type="button">Join World</button>
            </div>
        </div>
    </section>

    <section id="social-overlay" aria-label="Social overlay">
        <div class="social-head">
            <div class="social-title">Open World</div>
            <div id="voice-controls">
                <button id="voice-toggle" type="button">Enable Voice</button>
                <span id="voice-state">Voice Off</span>
            </div>
        </div>
        <div id="social-players"></div>
        <div id="social-chat-log"></div>
        <div class="social-chat-entry">
            <input id="social-chat-input" type="text" maxlength="300" placeholder="Type a message" />
            <button id="social-chat-send" type="button">Send</button>
        </div>
    </section>

    <script>
        window.__SOCIAL_ROOM_CONFIG__ = {
            roomTitle: 'Open World',
            sceneAssetUrl: '/static/everything_optimized_draco.glb',
        };
    </script>
    <script src="/runtime-asset-version.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module">
        const runtimeUrl = window.__assetUrl('/static/fireplace_walkroom.js');
        const cacheBust = `cb=${Date.now()}`;
        const sep = runtimeUrl.includes('?') ? '&' : '?';
        import(`${runtimeUrl}${sep}${cacheBust}`);
    </script>
</body>
</html>
