<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combat Arena</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08090f;
      font-family: Consolas, 'Courier New', monospace;
      color: #eef2ff;
    }
    #back-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      text-decoration: none;
      border: 1px solid rgba(99,102,241,0.4);
      background: rgba(10,12,22,0.8);
      color: #c7d2fe;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(4px);
    }
    #back-link:hover {
      background: rgba(26, 32, 66, 0.9);
      color: #eef2ff;
    }
    #scene-label {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,12,22,0.75);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #8892b0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }
    #combat-ui-root {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 800;
      pointer-events: none;
    }
    #combat-ui-root * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <script>window.__COMBAT_ARENA_MODE__ = true;</script>
  <a id="back-link" href="/static/fireplace_scene.html">&larr; Back to Lobby</a>
  <div id="scene-label">Combat Arena</div>
  <div id="combat-ui-root"></div>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script type="module" src="/static/fireplace_scene.js"></script>
</body>
</html>
