<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Paraval VR Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06090f;
      font-family: Georgia, serif;
    }
    #c {
      display: block;
      width: 100%; height: 100%;
    }
    #vr-btn-wrap {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #back-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      text-decoration: none;
      color: rgba(200,185,140,0.72);
      font-size: 13px;
      letter-spacing: 0.06em;
      border: 1px solid rgba(200,185,140,0.22);
      border-radius: 8px;
      padding: 7px 11px;
      background: rgba(6,9,15,0.7);
      backdrop-filter: blur(4px);
    }
    #back-link:hover { color: #e8d89a; border-color: rgba(200,185,140,0.55); }
    #hint {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(200,185,140,0.5);
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
      white-space: nowrap;
    }
    #no-xr-msg {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #c8b98c;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 24px;
    }
    #no-xr-msg.show { display: flex; }
    #no-xr-msg a { color: #a0c4e8; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-link" href="/">← Home</a>
<div id="hint"></div>
<div id="vr-btn-wrap"></div>
<div id="no-xr-msg">
  <span>WebXR / immersive-VR is not supported in this browser.</span>
  <span>Try Chrome on Android, Meta Browser, or a WebXR-capable desktop browser.</span>
  <a href="/">← Return to Home</a>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/static/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from '/static/GLTFLoader.js';

// ─── Inline minimal VRButton ─────────────────────────────────────────────────
function createVRButton(renderer) {
  const btn = document.createElement('button');
  btn.style.cssText = [
    'padding:12px 22px',
    'border:1px solid rgba(200,185,140,0.55)',
    'border-radius:10px',
    'background:rgba(15,19,31,0.94)',
    'color:#e8d89a',
    'font-size:13px',
    'letter-spacing:0.12em',
    'text-transform:uppercase',
    'cursor:pointer',
    'backdrop-filter:blur(4px)',
  ].join(';');

  if (!('xr' in navigator)) {
    document.getElementById('no-xr-msg').classList.add('show');
    return null;
  }

  let session = null;

  async function onStart(s) {
    s.addEventListener('end', onEnd);
    await renderer.xr.setSession(s);
    btn.textContent = 'Exit VR';
    session = s;
  }

  function onEnd() {
    session.removeEventListener('end', onEnd);
    btn.textContent = 'Enter VR';
    session = null;
  }

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (!supported) {
      document.getElementById('no-xr-msg').classList.add('show');
      btn.textContent = 'VR Not Supported';
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
    } else {
      btn.textContent = 'Enter VR';
      btn.onclick = () => {
        if (!session) {
          navigator.xr.requestSession('immersive-vr', {
            optionalFeatures: ['local-floor', 'bounded-floor', 'layers'],
          }).then(onStart);
        } else {
          session.end();
        }
      };
      // Auto-start if arriving from account hub Enter VR button
      let autostart = false;
      try { autostart = sessionStorage.getItem('vr-autostart') === '1'; sessionStorage.removeItem('vr-autostart'); } catch(_) {}
      if (autostart) btn.onclick();
    }
  }).catch(() => {
    document.getElementById('no-xr-msg').classList.add('show');
  });

  return btn;
}

// ─── Scene setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.setClearColor(0x06090f, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06090f, 0.045);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 80);
camera.position.set(0, 1.6, 0);
scene.add(camera);

// VR button
const vrBtn = createVRButton(renderer);
if (vrBtn) document.getElementById('vr-btn-wrap').appendChild(vrBtn);

// ─── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1830, 3.5));

const sun = new THREE.DirectionalLight(0xfff5d0, 1.8);
sun.position.set(4, 8, 3);
scene.add(sun);

const rimLight = new THREE.DirectionalLight(0x4466ff, 0.6);
rimLight.position.set(-5, 2, -4);
scene.add(rimLight);

// ─── Starfield ────────────────────────────────────────────────────────────────
(function buildStars() {
  const count = 1800;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 30 + Math.random() * 20;
    pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xfff8e8, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.7,
  })));
})();

// ─── Floor grid ───────────────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 30, 30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0e1a,
  roughness: 0.9,
  metalness: 0.1,
  wireframe: true,
  transparent: true,
  opacity: 0.18,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
scene.add(floor);

// Controllers (ray lines visible in VR) + gloves attached to grip spaces
const _gloveLoader = new GLTFLoader();
const _gripSpaces = [renderer.xr.getControllerGrip(0), renderer.xr.getControllerGrip(1)];

_gloveLoader.load('/static/gloves.glb', (gltf) => {
  // Debug: log bounding box to understand scale/position of the raw GLB
  const _bb = new THREE.Box3().setFromObject(gltf.scene);
  const _sz = new THREE.Vector3(); _bb.getSize(_sz);
  const _cn = new THREE.Vector3(); _bb.getCenter(_cn);
  console.log('[VR Hub] Glove BB size:', _sz, 'center:', _cn);

  _gripSpaces.forEach((grip, idx) => {
    // Debug marker: bright cyan box so we can confirm grip tracking regardless of glove
    const _marker = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.04, 0.04),
      new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true })
    );
    grip.add(_marker);

    const glove = gltf.scene.clone();

    // Force double-sided so mesh is visible regardless of winding/normals
    glove.traverse(node => {
      if (node.isMesh && node.material) {
        const mats = Array.isArray(node.material) ? node.material : [node.material];
        mats.forEach(m => { m.side = THREE.DoubleSide; });
      }
    });

    // Center the glove on the grip origin (counteract any baked offset in the GLB)
    glove.position.set(-_cn.x, -_cn.y, -_cn.z);

    // Scale to roughly hand-sized (~20cm) if the mesh is wildly off
    const maxDim = Math.max(_sz.x, _sz.y, _sz.z);
    if (maxDim > 0) {
      const target = 0.2; // 20cm target hand size
      if (maxDim > target * 5 || maxDim < target * 0.2) {
        const s = target / maxDim;
        glove.scale.setScalar(s);
        console.log('[VR Hub] Auto-scaled glove by', s.toFixed(4));
      }
    }

    grip.add(glove);
    scene.add(grip);
  });
  console.log('[VR Hub] Gloves loaded onto grip spaces');
}, undefined, (err) => {
  console.warn('[VR Hub] Failed to load gloves.glb:', err);
  _gripSpaces.forEach(grip => scene.add(grip));
});

[renderer.xr.getController(0), renderer.xr.getController(1)].forEach(ctrl => {
  ctrl.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-3)]),
    new THREE.LineBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.4 })
  ));
  scene.add(ctrl);
});

// Animation loop
renderer.setAnimationLoop(() => { renderer.render(scene, camera); });
</script>
</body>
</html>
