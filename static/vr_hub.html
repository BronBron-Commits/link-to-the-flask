// ─── Inline minimal VRButton ─────────────────────────────────────────────────
function createVRButton(renderer) {
  const btn = document.createElement('button');
  btn.style.cssText = [
    'padding:12px 22px',
    'border:1px solid rgba(200,185,140,0.55)',
    'border-radius:10px',
    'background:rgba(15,19,31,0.94)',
    'color:#e8d89a',
    'font-size:13px',
    'letter-spacing:0.12em',
    'text-transform:uppercase',
    'cursor:pointer',
    'backdrop-filter:blur(4px)',
  ].join(';');

  if (!('xr' in navigator)) {
    return null;
  }

  let session = null;

  async function onStart(s) {
    s.addEventListener('end', onEnd);
    await renderer.xr.setSession(s);
    btn.textContent = 'Exit VR';
    session = s;
  }

  function onEnd() {
    session.removeEventListener('end', onEnd);
    btn.textContent = 'Enter VR';
    session = null;
  }

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (!supported) {
      btn.textContent = 'VR Not Supported';
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
    } else {
      btn.textContent = 'Enter VR';
      btn.onclick = () => {
        if (!session) {
          navigator.xr.requestSession('immersive-vr', {
            optionalFeatures: ['local-floor', 'bounded-floor', 'layers'],
          }).then(onStart);
        } else {
          session.end();
        }
      };
      // Auto-start if arriving from account hub Enter VR button
      let autostart = false;
      try { autostart = sessionStorage.getItem('vr-autostart') === '1'; sessionStorage.removeItem('vr-autostart'); } catch(_) {}
      if (autostart) btn.onclick();
    }
  }).catch(() => {
    btn.textContent = 'VR Unavailable';
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.style.cursor = 'not-allowed';
  });

  return btn;
}

let _skyMat;
(function _buildSkybox() {
  const p = SKY_PRESETS.blue;
  const skyGeo = new THREE.SphereGeometry(60, 48, 24);
  _skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      uZenith:  { value: p.zenith.clone() },
      uUpper:   { value: p.upper.clone() },
      uMid:     { value: p.mid.clone() },
      uHorizon: { value: p.horizon.clone() },
      uNadir:   { value: p.nadir.clone() },
      uGlow:    { value: p.glow.clone() },
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uZenith;
      uniform vec3 uUpper;
      uniform vec3 uMid;
      uniform vec3 uHorizon;
      uniform vec3 uNadir;
      uniform vec3 uGlow;
      varying vec3 vWorldPos;

      // 5-stop smooth gradient
      vec3 skyGradient(float t) {
        if (t > 0.75) return mix(uUpper,   uZenith,  (t - 0.75) * 4.0);
        if (t > 0.50) return mix(uMid,     uUpper,   (t - 0.50) * 4.0);
        if (t > 0.30) return mix(uHorizon, uMid,     (t - 0.30) * 5.0);
        if (t > 0.10) return mix(uNadir,   uHorizon, (t - 0.10) * 5.0);
        return uNadir;
      }

      void main() {
        vec3 dir = normalize(vWorldPos);
        float t = clamp(dir.y * 0.5 + 0.5, 0.0, 1.0);
        vec3 sky = skyGradient(t);

        // Soft horizon glow band — peaks at t≈0.5, fades above and below
        float glowBand = exp(-pow((t - 0.48) / 0.09, 2.0));
        sky += uGlow * glowBand * 0.28;

        // Subtle lateral nebula sweep using world-space XZ angle
        float angle = atan(dir.z, dir.x);
        float nebula = sin(angle * 2.0 + 1.3) * 0.5 + 0.5;
        float nebulaHeight = smoothstep(0.55, 0.80, t) * (1.0 - smoothstep(0.80, 1.0, t));
        sky += uGlow * nebula * nebulaHeight * 0.10;

        // Sparse dim stars
        vec3 sp = floor(vWorldPos * 90.0);
        float h = fract(sin(dot(sp, vec3(127.1, 311.7, 74.3))) * 43758.5453);
        // vary star brightness slightly by a second hash
        float h2 = fract(sin(dot(sp, vec3(269.5, 183.3, 52.1))) * 43758.5453);
        float brightness = mix(0.15, 0.45, h2);
        float star = step(0.9985, h) * smoothstep(0.0, 0.35, dir.y) * brightness;

        gl_FragColor = vec4(sky + star, 1.0);
      }
    `
  });
  const skyMesh = new THREE.Mesh(skyGeo, _skyMat);
  skyMesh.renderOrder = -1;
  scene.add(skyMesh);
})();

function _applySkyPreset(name) {
  const p = SKY_PRESETS[name];
  if (!p || !_skyMat) return;
  _skyMat.uniforms.uZenith.value.copy(p.zenith);
  _skyMat.uniforms.uUpper.value.copy(p.upper);
  _skyMat.uniforms.uMid.value.copy(p.mid);
  _skyMat.uniforms.uHorizon.value.copy(p.horizon);
  _skyMat.uniforms.uNadir.value.copy(p.nadir);
  _skyMat.uniforms.uGlow.value.copy(p.glow);
  scene.fog.color.setHex(p.fogColor);
  renderer.setClearColor(p.fogColor, 1);
  // Update scene lighting to match preset
  _sceneAmbient.color.setHex(p.ambientColor);
  _sceneAmbient.intensity = p.ambientIntensity;
  _sceneSun.color.setHex(p.sunColor);
  _sceneSun.intensity = p.sunIntensity;
  _sceneRim.color.setHex(p.rimColor);
  _sceneRim.intensity = p.rimIntensity;
  _currentSky = name;
  if (_controlTablet) _refreshSkyBtns();
}

function _buildLasers() {
  const DEFS = [
    { col: 0xff0033, sx: 0,    sy: 1.4,  sz: 0.3  },
    { col: 0x00ff66, sx: 0.4,  sy: -1.1, sz: 0    },
    { col: 0x3388ff, sx: 0,    sy: 0.8,  sz: -0.9 },
    { col: 0xff00ff, sx: -0.5, sy: 1.9,  sz: 0    },
    { col: 0x00ffff, sx: 0.7,  sy: -0.6, sz: 0.5  },
    { col: 0xffff00, sx: -0.3, sy: 0.5,  sz: -1.3 },
  ];
  DEFS.forEach(({ col, sx, sy, sz }) => {
    const outerPivot = new THREE.Group();
    outerPivot.position.set(0, 4.0, 0);
    const innerPivot = new THREE.Group();
    outerPivot.add(innerPivot);
    const beam = new THREE.Mesh(
      new THREE.CylinderGeometry(0.006, 0.012, 10, 5),
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.65 })
    );
    beam.position.y = -5;
    innerPivot.add(beam);
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 8, 6),
      new THREE.MeshBasicMaterial({ color: col })
    );
    innerPivot.add(dot);
    const light = new THREE.PointLight(col, 0, 14, 2);
    innerPivot.add(light);
    _laserGroup.add(outerPivot);
    _laserPivots.push({ outerPivot, innerPivot, speedX: sx, speedY: sy, speedZ: sz, light });
  });
  _laserGroup.visible = false;
  scene.add(_laserGroup);
}

function _brightnessToY(b) {
  const t = (b - BRIGHTNESS_MIN) / (BRIGHTNESS_MAX - BRIGHTNESS_MIN);
  return (t - 0.5) * BRIGHTNESS_HEIGHT;
}
function _yToBrightness(y) {
  const t = y / BRIGHTNESS_HEIGHT + 0.5;
  return THREE.MathUtils.clamp(
    BRIGHTNESS_MIN + t * (BRIGHTNESS_MAX - BRIGHTNESS_MIN),
    BRIGHTNESS_MIN, BRIGHTNESS_MAX
  );
}

// ─── Control Tablet ───────────────────────────────────────────────────────────
// One grabbable, movable panel: brightness slider + laser toggle + disco toggle.

function _drawTabletBtn(c, tex, icon, label, active) {
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const bg = ctx.createLinearGradient(0, 0, 0, c.height);
  if (active) { bg.addColorStop(0, '#3a0a18'); bg.addColorStop(1, '#1a0208'); }
  else        { bg.addColorStop(0, '#0d1828'); bg.addColorStop(1, '#080e18'); }
  ctx.fillStyle = bg;
  if (ctx.roundRect) { ctx.roundRect(0, 0, c.width, c.height, 12); } else { ctx.rect(0, 0, c.width, c.height); }
  ctx.fill();
  ctx.strokeStyle = active ? '#ff4466' : '#3366aa';
  ctx.lineWidth = 3;
  if (ctx.roundRect) { ctx.roundRect(2, 2, c.width - 4, c.height - 4, 10); } else { ctx.rect(2, 2, c.width - 4, c.height - 4); }
  ctx.stroke();
  ctx.fillStyle = active ? '#ff6688' : '#88aadd';
  ctx.font = 'bold 30px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(icon + ' ' + label, c.width / 2, 46);
  ctx.font = 'bold 22px Georgia';
  ctx.fillStyle = active ? '#ffaabb' : '#557799';
  ctx.fillText(active ? '● ON' : '○ OFF', c.width / 2, 84);
  tex.needsUpdate = true;
}

function _drawBrightnessValue(c, tex, b) {
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = 'rgba(8,14,28,0.9)';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = '#2255aa';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, c.width - 2, c.height - 2);
  ctx.fillStyle = '#99bbff';
  ctx.font = 'bold 24px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(b.toFixed(2), c.width / 2, c.height / 2 + 8);
  tex.needsUpdate = true;
}

function _drawSkyBtn(c, tex, presetName, active) {
  const p = SKY_PRESETS[presetName];
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const hz = p.horizon, zn = p.zenith;
  const bg = ctx.createLinearGradient(0, 0, 0, c.height);
  bg.addColorStop(0, `rgb(${Math.round(zn.r*255)},${Math.round(zn.g*255)},${Math.round(zn.b*255)})`);
  bg.addColorStop(1, `rgb(${Math.round(hz.r*255)},${Math.round(hz.g*255)},${Math.round(hz.b*255)})`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, c.width, c.height);
  if (active) { ctx.fillStyle = 'rgba(255,255,255,0.20)'; ctx.fillRect(0, 0, c.width, c.height); }
  ctx.strokeStyle = active ? '#ffffff' : p.accentHex;
  ctx.lineWidth = active ? 5 : 2;
  ctx.strokeRect(2, 2, c.width - 4, c.height - 4);
  ctx.fillStyle = active ? '#ffffff' : p.accentHex;
  ctx.font = `bold ${active ? 26 : 22}px Georgia`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(p.label, c.width / 2, c.height / 2);
  tex.needsUpdate = true;
}

function _refreshSkyBtns() {
  if (!_controlTablet) return;
  for (const btn of (_controlTablet.userData.skyBtnMeshes || [])) {
    _drawSkyBtn(btn.userData.canvas, btn.userData.tex, btn.userData.skyPreset, btn.userData.skyPreset === _currentSky);
  }
}

function _buildControlTablet() {
  const root = new THREE.Group();
  const Z = 0.016; // local Z offset for face elements

  // Tablet body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.40, 0.70, 0.018),
    new THREE.MeshStandardMaterial({ color: 0x0a1020, roughness: 0.55, metalness: 0.45 })
  );
  root.add(body);

  // Header stripe
  const hdrC = document.createElement('canvas'); hdrC.width = 512; hdrC.height = 80;

function _drawSpellBtn(c, tex, icon, label, flavor, theme = {}) {
  const topBg = theme.topBg || '#2a0a00';
  const bottomBg = theme.bottomBg || '#100400';
  const border = theme.border || '#ff6600';
  const innerGlow = theme.innerGlow || 'rgba(255,120,0,0.35)';
  const iconColor = theme.iconColor || '#ffaa44';
  const labelColor = theme.labelColor || '#ff8822';
  const flavorColor = theme.flavorColor || '#aa5522';
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const bg = ctx.createLinearGradient(0, 0, 0, c.height);
  bg.addColorStop(0, topBg); bg.addColorStop(1, bottomBg);
  ctx.fillStyle = bg;
  if (ctx.roundRect) ctx.roundRect(0, 0, c.width, c.height, 14); else ctx.rect(0, 0, c.width, c.height);
  ctx.fill();
  ctx.strokeStyle = border; ctx.lineWidth = 3;
  if (ctx.roundRect) ctx.roundRect(2, 2, c.width-4, c.height-4, 12); else ctx.rect(2, 2, c.width-4, c.height-4);
  ctx.stroke();
  // inner glow line
  ctx.strokeStyle = innerGlow; ctx.lineWidth = 1;
  if (ctx.roundRect) ctx.roundRect(5, 5, c.width-10, c.height-10, 9); else ctx.rect(5, 5, c.width-10, c.height-10);
  ctx.stroke();
  ctx.fillStyle = iconColor; ctx.font = 'bold 52px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(icon, c.width/2, 70);
  ctx.fillStyle = labelColor; ctx.font = 'bold 26px Georgia'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(label, c.width/2, 108);
  ctx.fillStyle = flavorColor; ctx.font = '18px Georgia';
  ctx.fillText(flavor, c.width/2, 132);
  tex.needsUpdate = true;
}

function _resolveVrHubDisplayName() {
  const fromStorage = String(localStorage.getItem(DISPLAY_NAME_STORAGE_KEY) || '').trim();
  if (fromStorage) return fromStorage.slice(0, 32);
  try {
    const rawCharacter = String(localStorage.getItem(SELECTED_CHARACTER_STORAGE_KEY) || '').trim();
    if (rawCharacter) {
      const parsed = JSON.parse(rawCharacter);
      const candidate = String(parsed?.name || parsed?.id || '').trim();
      if (candidate) return candidate.slice(0, 32);
    }
  } catch (_) {}
  return 'Traveler';
}

function _drawPresenceRows(c, tex) {
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);

  const bg = ctx.createLinearGradient(0, 0, 0, c.height);
  bg.addColorStop(0, '#0a1120');
  bg.addColorStop(1, '#060b14');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = '#2f4f82';
  ctx.lineWidth = 3;
  ctx.strokeRect(2, 2, c.width - 4, c.height - 4);

  const roster = (_presenceState.roster && typeof _presenceState.roster === 'object') ? _presenceState.roster : {};
  const rows = Object.entries(roster)
    .filter(([sid]) => Boolean(String(sid || '').trim()))
    .sort((a, b) => {
      const aIsLocal = a[0] === _presenceState.localSid;
      const bIsLocal = b[0] === _presenceState.localSid;
      if (aIsLocal && !bIsLocal) return -1;
      if (!aIsLocal && bIsLocal) return 1;
      const aName = String(a[1]?.name || a[0]).toLowerCase();
      const bName = String(b[1]?.name || b[0]).toLowerCase();
      return aName.localeCompare(bName);
    });

  ctx.fillStyle = '#7ea4dc';
  ctx.font = 'bold 26px Georgia';
  ctx.textAlign = 'left';
  const countLabel = `${rows.length} present${_presenceState.connected ? '' : ' (offline)'}`;
  ctx.fillText(countLabel, 26, 44);

  const rowStart = 84;
  const rowHeight = 42;
  const maxRows = 10;
  if (!rows.length) {
    ctx.fillStyle = '#88a0bd';
    ctx.font = '24px Georgia';
    ctx.fillText(_presenceState.connected ? 'Waiting for players...' : 'Connecting to instance...', 26, rowStart + 8);
    tex.needsUpdate = true;
    return;
  }

  rows.slice(0, maxRows).forEach(([sid, entry], index) => {
    const y = rowStart + index * rowHeight;
    const isLocal = sid === _presenceState.localSid;
    const baseName = String(entry?.name || sid || 'Unknown').trim();
    const role = String(entry?.role || 'player').toUpperCase();
    const label = isLocal ? `${baseName} (YOU)` : baseName;

    ctx.fillStyle = index % 2 ? 'rgba(24,34,56,0.65)' : 'rgba(18,26,44,0.65)';
    ctx.fillRect(18, y - 24, c.width - 36, 32);
    ctx.strokeStyle = isLocal ? '#89d3ff' : '#304f78';
    ctx.lineWidth = 1;
    ctx.strokeRect(18.5, y - 23.5, c.width - 37, 31);

    ctx.fillStyle = isLocal ? '#e8f8ff' : '#c8d9f2';
    ctx.font = `bold ${isLocal ? 21 : 20}px Georgia`;
    ctx.fillText(label.slice(0, 30), 28, y - 2);

    ctx.fillStyle = '#8aa8ce';
    ctx.font = '16px Georgia';
    ctx.textAlign = 'right';
    ctx.fillText(role.slice(0, 10), c.width - 30, y - 2);
    ctx.textAlign = 'left';
  });

  if (rows.length > maxRows) {
    ctx.fillStyle = '#6f86a8';
    ctx.font = '18px Georgia';
    ctx.fillText(`+${rows.length - maxRows} more`, 26, rowStart + maxRows * rowHeight + 6);
  }

  tex.needsUpdate = true;
}

function _refreshPlayersTablet() {
  if (!_playersTablet) return;
  _drawPresenceRows(_playersTablet.userData.rosterCanvas, _playersTablet.userData.rosterTex);
}

async function _pollPresenceState() {
  try {
    const res = await fetch('/state', { cache: 'no-store' });
    if (!res.ok) return;
    const payload = await res.json();
    const players = (payload && typeof payload.players === 'object') ? payload.players : {};
    _presenceState.roster = players;
    _presenceState.lastPollSuccessAt = performance.now() * 0.001;
    if (!_presenceState.usingSocket) _presenceState.connected = true;
    _refreshPlayersTablet();
  } catch (_) {
    if (!_presenceState.usingSocket) {
      const now = performance.now() * 0.001;
      // Keep a brief grace window so transient fetch failures don't flap UI state.
      if ((now - _presenceState.lastPollSuccessAt) > 6) {
        _presenceState.connected = false;
        _refreshPlayersTablet();
      }
    }
  }
}

function _startPresencePolling() {
  if (_presenceState.pollTimer) return;
  _pollPresenceState();
  _presenceState.pollTimer = setInterval(_pollPresenceState, 2000);
}

function _publishLocalPresence(force = false) {
  const socket = _presenceState.socket;
  if (!socket || !_presenceState.connected) return;
  const now = performance.now() * 0.001;
  if (!force && (now - _presenceState.lastPublishTime) < 0.75) return;
  _presenceState.lastPublishTime = now;

  const payload = {
    name: _resolveVrHubDisplayName(),
    role: 'player',
    side: 'heroes',
    position: {
      x: Number(playerRig.position.x.toFixed(3)),
      y: Number(playerRig.position.y.toFixed(3)),
      z: Number(playerRig.position.z.toFixed(3)),
    },
    rotation: {
      x: 0,
      y: Number(playerRig.rotation.y.toFixed(4)),
      z: 0,
    },
  };
  socket.emit('player-update', payload);
}

function _connectPresenceSocket() {
  if (_presenceState.socket) return;
  if (typeof window.io !== 'function') {
    _presenceState.connected = false;
    _refreshPlayersTablet();
    return;
  }
  const socket = window.io();
  _presenceState.socket = socket;

  socket.on('connect', () => {
    _presenceState.usingSocket = true;
    _presenceState.connected = true;
    _presenceState.localSid = String(socket.id || _presenceState.localSid || '').trim();
    socket.emit('register-role', { role: 'player' });
    _publishLocalPresence(true);
    _refreshPlayersTablet();
  });

  socket.on('connect_error', () => {
    _presenceState.usingSocket = false;
    _presenceState.connected = false;
    _refreshPlayersTablet();
  });

  socket.on('disconnect', () => {
    _presenceState.usingSocket = false;
    _presenceState.connected = false;
    _refreshPlayersTablet();
  });

  socket.on('player-id', (payload) => {
    const sid = String(payload?.id || '').trim();
    if (sid) _presenceState.localSid = sid;
    _refreshPlayersTablet();
  });

  socket.on('players-state', (players) => {
    _presenceState.roster = (players && typeof players === 'object') ? players : {};
    _refreshPlayersTablet();
  });

  socket.on('player-update', (entry) => {
    if (!entry || !entry.id) return;
    _presenceState.roster[entry.id] = entry;
    _refreshPlayersTablet();
  });

  socket.on('player-joined', (entry) => {
    if (!entry || !entry.id) return;
    _presenceState.roster[entry.id] = entry;
    _refreshPlayersTablet();
  });

  socket.on('player-left', (payload) => {
    const sid = String(payload?.id || '').trim();
    if (!sid) return;
    delete _presenceState.roster[sid];
    _refreshPlayersTablet();
  });
}

function _updateFireballs(dt) {
  for (let i = _fireballs.length - 1; i >= 0; i--) {
    const fb = _fireballs[i];
    fb.userData.life -= dt;
    if (fb.userData.life <= 0) {
      scene.remove(fb); _fireballs.splice(i, 1); continue;
    }
    fb.position.addScaledVector(fb.userData.velocity, dt);
    // Slight wobble
    fb.children[0].scale.setScalar(0.9 + 0.1 * Math.sin(fb.userData.life * 18));
  }
}

function _updateArcaneShots(dt) {
  for (let i = _arcaneShots.length - 1; i >= 0; i--) {
    const orb = _arcaneShots[i];
    orb.userData.life -= dt;
    if (orb.userData.life <= 0) {
      scene.remove(orb); _arcaneShots.splice(i, 1); continue;
    }
    orb.position.addScaledVector(orb.userData.velocity, dt);
    // Slightly slower pulse than fireball for a heavier magical feel
    orb.children[0].scale.setScalar(0.92 + 0.08 * Math.sin(orb.userData.life * 14));
  }
}

function _castLightningStrike() {
  const cam = renderer.xr.getCamera();
  const origin = new THREE.Vector3();
  cam.getWorldPosition(origin);
  const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(cam.quaternion).normalize();

  // Project look direction onto the ground plane (y=0) to find strike point.
  // If looking up or level, fall back to 10 units ahead on the XZ plane.
  let strikeX, strikeZ;
  if (dir.y < -0.01) {
    const t = Math.min(-origin.y / dir.y, 22);
    strikeX = origin.x + dir.x * t;
    strikeZ = origin.z + dir.z * t;
  } else {
    strikeX = origin.x + dir.x * 10;
    strikeZ = origin.z + dir.z * 10;
  }

  const BOLT_HEIGHT = 7;
  const bolt = new THREE.Group();
  bolt.position.set(strikeX, 0, strikeZ);

  // Outer shaft — wide electric column
  const shaft = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.055, BOLT_HEIGHT, 4, 8),
    new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.55 })
  );
  shaft.position.y = BOLT_HEIGHT / 2;
  bolt.add(shaft); // children[0]

  // Inner bright core
  const core = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.018, BOLT_HEIGHT, 4, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.90 })
  );
  core.position.y = BOLT_HEIGHT / 2;
  bolt.add(core); // children[1]

  // Ground impact splash
  const impact = new THREE.Mesh(
    new THREE.SphereGeometry(0.9, 10, 6),
    new THREE.MeshBasicMaterial({ color: 0x99eeff, transparent: true, opacity: 0.45, side: THREE.BackSide })
  );
  impact.position.y = 0.1;
  bolt.add(impact); // children[2]

  // Intense point light at ground strike
  const light = new THREE.PointLight(0xaaffff, 14.0, 18, 2);
  light.position.y = 0.5;
  bolt.add(light); // children[3]

  bolt.userData.life = 0.65;
  bolt.userData.maxLife = 0.65;
  scene.add(bolt);
  _lightningBolts.push(bolt);
}

function _updateLightningBolts(dt) {
  for (let i = _lightningBolts.length - 1; i >= 0; i--) {
    const bolt = _lightningBolts[i];
    bolt.userData.life -= dt;
    if (bolt.userData.life <= 0) {
      scene.remove(bolt); _lightningBolts.splice(i, 1); continue;
    }
    const t = bolt.userData.life / bolt.userData.maxLife; // 1 → 0
    const flicker = 0.35 + 0.65 * Math.abs(Math.sin(bolt.userData.life * 58));
    bolt.children[0].material.opacity = t * 0.55 * flicker;
    bolt.children[1].material.opacity = t * 0.90 * flicker;
    bolt.children[2].material.opacity = t * 0.45 * flicker;
    bolt.children[3].intensity = 14.0 * t * flicker;
  }
}

        topBg: '#2a0a40', bottomBg: '#1a0630', border: '#ff88ff',
        innerGlow: 'rgba(255,140,255,0.45)', iconColor: '#ffffff',
        labelColor: '#ff99ff', flavorColor: '#cc66ee',
      } : {
        topBg: '#160720', bottomBg: '#0a0416', border: '#cc55ff',
        innerGlow: 'rgba(180,80,255,0.35)', iconColor: '#eeaaff',
        labelColor: '#cc66ff', flavorColor: '#8844aa',
      }
    );
  }
  _updateDrawUi();
  _updateDesktopHint();
}

function _toggleDrawMode() { _setDrawActive(!_drawMode); }

function _setDrawModeType(nextType) {
  if (nextType !== 'draw' && nextType !== 'select') return;
  _setToolSystemMode(nextType);
  _refreshDrawModeHeader();
  _updateDrawUi();
  _updateDesktopHint();
}

function _cycleEditMode() {
  if (!_drawMode) {
    _setDrawModeType('draw');
    return;
  }
  if (_drawModeType === 'draw') {
    _setDrawModeType('select');
    return;
  }
  _setDrawActive(false);
}

function _setDrawSelectMode(mode) {
  if (!['vertex', 'edge', 'face'].includes(mode)) return;
  _setToolSystemSelectionKind(mode);
  _drawSelection.length = 0;
  _updateDrawSelectionVisuals();
  _updateDrawPreview();
  _updateDrawUi();
  _updateDesktopHint();
  if (_drawPanel) {
    _drawSpellBtn(
      _drawPanel.userData.drawToggleBtnCanvas,
      _drawPanel.userData.drawToggleBtnTex,
      '✶', _drawSelectMode.toUpperCase(), 'Select mode',
      _drawMode ? {
        topBg: '#2a0a40', bottomBg: '#1a0630', border: '#ff88ff',
        innerGlow: 'rgba(255,140,255,0.45)', iconColor: '#ffffff',
        labelColor: '#ff99ff', flavorColor: '#cc66ee',
      } : {
        topBg: '#160720', bottomBg: '#0a0416', border: '#cc55ff',
        innerGlow: 'rgba(180,80,255,0.35)', iconColor: '#eeaaff',
        labelColor: '#cc66ff', flavorColor: '#8844aa',
      }
    );
  }
}

function _selectDrawElement(idx, additive = false) {
  let max = 0;
  if (_drawSelectMode === 'vertex') max = _drawVerts.length;
  else if (_drawSelectMode === 'edge') max = _drawEdges.length;
  else max = _drawFaces.length;
  if (idx < 0 || idx >= max) return false;
  if (!additive) {
    _drawSelection.length = 0;
    _drawSelection.push(idx);
  } else {
    const at = _drawSelection.indexOf(idx);
    if (at >= 0) _drawSelection.splice(at, 1);
    else _drawSelection.push(idx);
  }
  _updateDrawSelectionVisuals();
  _updateDrawPreview();
  _updateDrawUi();
  return true;
}

function _selectedVertexIndices() {
  if (_drawSelectMode === 'vertex') {
    return [...new Set(_drawSelection)].filter(i => i >= 0 && i < _drawVerts.length);
  }
  if (_drawSelectMode === 'edge') {
    const out = [];
    for (const si of _drawSelection) {
      const e = _drawEdges[si];
      if (!e) continue;
      out.push(e.a, e.b);
    }
    return [...new Set(out)];
  }
  const out = [];
  for (const si of _drawSelection) {
    const f = _drawFaces[si];
    if (!f) continue;
    out.push(f.a, f.b, f.c);
  }
  return [...new Set(out)];
}

function _updateWorldGizmoFromSelection() {
  if (!_compassRoot || _compassGrabState.holder || !_drawMode) return;
  const verts = _selectedVertexIndices();
  if (!verts.length) return;
  _tmpSelectionCenter.set(0, 0, 0);
  for (const idx of verts) {
    if (_drawVerts[idx]) _tmpSelectionCenter.add(_drawVerts[idx]);
  }
  _tmpSelectionCenter.multiplyScalar(1 / verts.length);
  _compassRoot.position.copy(_tmpSelectionCenter);
}

function _updateDrawSelectionVisuals() {
  for (let i = 0; i < _drawVertMeshes.length; i++) {
    const selected = _selectedVertexIndices().includes(i);
    _drawVertMeshes[i].material.color.setHex(selected ? 0x66ffee : 0xffee00);
  }
  for (let i = 0; i < _drawEdges.length; i++) {
    const edge = _drawEdges[i];
    edge.line.material.color.setHex(_drawSelectMode === 'edge' && _drawSelection.includes(i) ? 0x99ffff : 0x66d1ff);
  }
  for (let i = 0; i < _drawFaces.length; i++) {
    const face = _drawFaces[i];
    face.mesh.material.color.setHex(_drawSelectMode === 'face' && _drawSelection.includes(i) ? 0xffdd99 : 0xb587ff);
  }
}

function _placeDrawVertex(worldPos) {
  const v = worldPos.clone();
  _drawVerts.push(v);
  const marker = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 9, 7),
    new THREE.MeshBasicMaterial({ color: 0xffee00 })
  );
  marker.position.copy(v);
  scene.add(marker);
  _drawVertMeshes.push(marker);
  if (_drawSelectMode === 'vertex') {
    _drawSelection.length = 0;
    _drawSelection.push(_drawVerts.length - 1);
  }
  _updateDrawSelectionVisuals();
  _updateDrawPreview();
  _updateDrawUi();
}

function _findNearestDrawVertex(point, radius = 0.16) {
  let best = -1;
  let bestSq = radius * radius;
  for (let i = 0; i < _drawVerts.length; i++) {
    const dSq = _drawVerts[i].distanceToSquared(point);
    if (dSq <= bestSq) { bestSq = dSq; best = i; }
  }
  return best;
}

function _ensureDrawEdge(a, b) {
  if (a === b) return false;
  const lo = Math.min(a, b);
  const hi = Math.max(a, b);
  if (_drawEdges.some(e => e.a === lo && e.b === hi)) return false;
  const geo = new THREE.BufferGeometry().setFromPoints([
    _drawVerts[lo].clone(),
    _drawVerts[hi].clone(),
  ]);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x66d1ff }));
  scene.add(line);
  _drawEdges.push({ a: lo, b: hi, line });
  return true;
}

function _createEdgeFromSelection() {
  const verts = _selectedVertexIndices();
  if (verts.length < 2) return;
  const a = verts[verts.length - 2];
  const b = verts[verts.length - 1];
  _ensureDrawEdge(a, b);
  _updateDrawSelectionVisuals();
  _updateDrawUi();
}

function _createFaceFromSelection() {
  const verts = _selectedVertexIndices();
  if (verts.length < 3) return;
  const a = verts[verts.length - 3];
  const b = verts[verts.length - 2];
  const c = verts[verts.length - 1];
  if (a === b || b === c || a === c) return;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(9);
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mesh = new THREE.Mesh(
    geo,
    new THREE.MeshStandardMaterial({ color: 0xb587ff, roughness: 0.55, metalness: 0.15, side: THREE.DoubleSide, transparent: true, opacity: 0.72 })
  );
  scene.add(mesh);
  _drawFaces.push({ a, b, c, mesh });
  _ensureDrawEdge(a, b);
  _ensureDrawEdge(b, c);
  _ensureDrawEdge(c, a);
  _updateDrawMeshGeometry();
  _updateDrawSelectionVisuals();
  _updateDrawUi();
}

function _fillFromSelection() {
  _createFaceFromSelection();
}

function _extrudeSelection() {
  const verts = _selectedVertexIndices();
  if (!verts.length) return;
  const map = new Map();
  const newIndices = [];
  for (const vi of verts) {
    const v = _drawVerts[vi].clone();
    v.y += 0.20;
    _drawVerts.push(v);
    const marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 9, 7),
      new THREE.MeshBasicMaterial({ color: 0xffee00 })
    );
    marker.position.copy(v);
    scene.add(marker);
    _drawVertMeshes.push(marker);
    const ni = _drawVerts.length - 1;
    map.set(vi, ni);
    newIndices.push(ni);
    _ensureDrawEdge(vi, ni);
  }
  for (const edge of _drawEdges.slice()) {
    if (map.has(edge.a) && map.has(edge.b)) {
      _ensureDrawEdge(map.get(edge.a), map.get(edge.b));
    }
  }
  if (_drawSelectMode === 'vertex') {
    _drawSelection.length = 0;
    _drawSelection.push(...newIndices);
  }
  _updateDrawSelectionVisuals();
  _updateDrawMeshGeometry();
  _updateDrawPreview();
  _updateDrawUi();
}

function _duplicateSelection() {
  const verts = _selectedVertexIndices();
  if (!verts.length) return;
  const map = new Map();
  const newIndices = [];
  for (const vi of verts) {
    const v = _drawVerts[vi].clone().add(new THREE.Vector3(0.15, 0, 0.15));
    _drawVerts.push(v);
    const marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 9, 7),
      new THREE.MeshBasicMaterial({ color: 0xffee00 })
    );
    marker.position.copy(v);
    scene.add(marker);
    _drawVertMeshes.push(marker);
    const ni = _drawVerts.length - 1;
    map.set(vi, ni);
    newIndices.push(ni);
  }
  for (const edge of _drawEdges) {
    if (map.has(edge.a) && map.has(edge.b)) _ensureDrawEdge(map.get(edge.a), map.get(edge.b));
  }
  for (const face of _drawFaces) {
    if (map.has(face.a) && map.has(face.b) && map.has(face.c)) {
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(9);
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const mesh = new THREE.Mesh(
        geo,
        new THREE.MeshStandardMaterial({ color: 0xb587ff, roughness: 0.55, metalness: 0.15, side: THREE.DoubleSide, transparent: true, opacity: 0.72 })
      );
      scene.add(mesh);
      _drawFaces.push({ a: map.get(face.a), b: map.get(face.b), c: map.get(face.c), mesh });
    }
  }
  if (_drawSelectMode === 'vertex') {
    _drawSelection.length = 0;
    _drawSelection.push(...newIndices);
  }
  _updateDrawMeshGeometry();
  _updateDrawSelectionVisuals();
  _updateDrawPreview();
  _updateDrawUi();
}

function _deleteSelection() {
  if (_drawSelectMode === 'face' && _drawSelection.length) {
    const toDelete = [...new Set(_drawSelection)].sort((a, b) => b - a);
    for (const idx of toDelete) {
      const face = _drawFaces[idx];
      if (!face) continue;
      scene.remove(face.mesh);
      _drawFaces.splice(idx, 1);
    }
    _drawSelection.length = 0;
    _updateDrawSelectionVisuals();
    _updateDrawPreview();
    _updateDrawUi();
    return;
  }
  if (_drawSelectMode === 'edge' && _drawSelection.length) {
    const toDelete = [...new Set(_drawSelection)].sort((a, b) => b - a);
    for (const idx of toDelete) {
      const edge = _drawEdges[idx];
      if (!edge) continue;
      scene.remove(edge.line);
      _drawEdges.splice(idx, 1);
    }
    _drawFaces.forEach((f, i) => {
      const hasAB = _drawEdges.some(e => (e.a === f.a && e.b === f.b) || (e.a === f.b && e.b === f.a));
      const hasBC = _drawEdges.some(e => (e.a === f.b && e.b === f.c) || (e.a === f.c && e.b === f.b));
      const hasCA = _drawEdges.some(e => (e.a === f.c && e.b === f.a) || (e.a === f.a && e.b === f.c));
      if (!(hasAB && hasBC && hasCA)) {
        scene.remove(f.mesh);
        _drawFaces[i] = null;
      }
    });
    for (let i = _drawFaces.length - 1; i >= 0; i--) if (_drawFaces[i] === null) _drawFaces.splice(i, 1);
    _drawSelection.length = 0;
    _updateDrawSelectionVisuals();
    _updateDrawPreview();
    _updateDrawUi();
    return;
  }
}

function _mergeSelection() {
  const verts = _selectedVertexIndices();
  if (verts.length < 2) return;
  const keep = verts[0];
  _tmpDrawPivot.set(0, 0, 0);
  for (const vi of verts) _tmpDrawPivot.add(_drawVerts[vi]);
  _tmpDrawPivot.multiplyScalar(1 / verts.length);
  _drawVerts[keep].copy(_tmpDrawPivot);
  _drawVertMeshes[keep].position.copy(_tmpDrawPivot);
  for (let i = 1; i < verts.length; i++) {
    const old = verts[i];
    for (const edge of _drawEdges) {
      if (edge.a === old) edge.a = keep;
      if (edge.b === old) edge.b = keep;
    }
    for (const face of _drawFaces) {
      if (face.a === old) face.a = keep;
      if (face.b === old) face.b = keep;
      if (face.c === old) face.c = keep;
    }
  }
  _drawSelection.length = 0;
  _drawSelection.push(keep);
  _updateDrawMeshGeometry();
  _updateDrawSelectionVisuals();
  _updateDrawPreview();
  _updateDrawUi();
}

function _updateDrawMeshGeometry() {
  for (const edge of _drawEdges) {
    edge.line.geometry.setFromPoints([_drawVerts[edge.a], _drawVerts[edge.b]]);
  }
  for (const face of _drawFaces) {
    const attr = face.mesh.geometry.getAttribute('position');
    attr.setXYZ(0, _drawVerts[face.a].x, _drawVerts[face.a].y, _drawVerts[face.a].z);
    attr.setXYZ(1, _drawVerts[face.b].x, _drawVerts[face.b].y, _drawVerts[face.b].z);
    attr.setXYZ(2, _drawVerts[face.c].x, _drawVerts[face.c].y, _drawVerts[face.c].z);
    attr.needsUpdate = true;
    face.mesh.geometry.computeVertexNormals();
  }
}

function _nudgeDrawSelection(dx, dy, dz) {
  const verts = _selectedVertexIndices();
  if (!verts.length) return;
  for (const idx of verts) {
    _drawVerts[idx].x += dx;
    _drawVerts[idx].y += dy;
    _drawVerts[idx].z += dz;
    _drawVertMeshes[idx].position.copy(_drawVerts[idx]);
  }
  _updateDrawMeshGeometry();
  _updateDrawPreview();
}

function _undoDrawStep() {
  if (_drawFaces.length) {
    const lastFace = _drawFaces.pop();
    scene.remove(lastFace.mesh);
    _updateDrawUi();
    return;
  }
  if (_drawEdges.length) {
    const lastEdge = _drawEdges.pop();
    scene.remove(lastEdge.line);
    _updateDrawUi();
    return;
  }
  if (_drawVerts.length) {
    const lastIdx = _drawVerts.length - 1;
    const inUse = _drawEdges.some(e => e.a === lastIdx || e.b === lastIdx) || _drawFaces.some(f => f.a === lastIdx || f.b === lastIdx || f.c === lastIdx);
    if (inUse) return;
    _drawVerts.pop();
    const marker = _drawVertMeshes.pop();
    if (marker) scene.remove(marker);
    for (let i = _drawSelection.length - 1; i >= 0; i--) {
      if (_drawSelection[i] >= _drawVerts.length) _drawSelection.splice(i, 1);
    }
    _updateDrawSelectionVisuals();
    _updateDrawPreview();
    _updateDrawUi();
  }
}

function _startDrawTransform(op) {
  const verts = _selectedVertexIndices();
  if (!verts.length) return;
  _drawTransform.active = true;
  _drawTransform.op = op;
  _drawTransform.axis = null;
  _drawTransform.amount = 0;
  _drawTransform.selectedVerts = verts;
  _drawTransform.startVerts = verts.map(i => _drawVerts[i].clone());
  _drawTransform.pivot.set(0, 0, 0);
  for (const v of _drawTransform.startVerts) _drawTransform.pivot.add(v);
  _drawTransform.pivot.multiplyScalar(1 / _drawTransform.startVerts.length);
  _updateDrawUi();
}

function _setDrawTransformAxis(axis, exclude = false) {
  if (!_drawTransform.active) return;
  _drawTransform.axis = exclude ? `not-${axis}` : axis;
  _applyDrawTransform();
}

function _accumulateDrawTransform(delta) {
  if (!_drawTransform.active) return;
  _drawTransform.amount += delta;
  _applyDrawTransform();
}

function _applyDrawTransform() {
  if (!_drawTransform.active) return;
  const axis = _drawTransform.axis;
  const op = _drawTransform.op;
  const amount = _drawTransform.amount;
  for (let i = 0; i < _drawTransform.selectedVerts.length; i++) {
    const idx = _drawTransform.selectedVerts[i];
    const start = _drawTransform.startVerts[i];
    const out = _drawVerts[idx];
    out.copy(start);
    if (op === 'grab') {
      if (axis === 'x') out.x = start.x + amount;
      else if (axis === 'y') out.y = start.y + amount;
      else if (axis === 'z') out.z = start.z + amount;
      else if (axis === 'not-x') { out.y = start.y + amount * 0.6; out.z = start.z + amount; }
      else if (axis === 'not-y') { out.x = start.x + amount; out.z = start.z + amount * 0.6; }
      else if (axis === 'not-z') { out.x = start.x + amount; out.y = start.y + amount * 0.6; }
      else { out.x = start.x + amount; out.z = start.z + amount * 0.8; }
    }
    if (op === 'scale') {
      const base = 1 + amount * 0.45;
      const sx = axis === 'y' || axis === 'z' || axis === 'not-x' ? 1 : base;
      const sy = axis === 'x' || axis === 'z' || axis === 'not-y' ? 1 : base;
      const sz = axis === 'x' || axis === 'y' || axis === 'not-z' ? 1 : base;
      out.x = _drawTransform.pivot.x + (start.x - _drawTransform.pivot.x) * sx;
      out.y = _drawTransform.pivot.y + (start.y - _drawTransform.pivot.y) * sy;
      out.z = _drawTransform.pivot.z + (start.z - _drawTransform.pivot.z) * sz;
    }
    if (op === 'rotate') {
      const ang = amount * 0.9;
      const rel = _tmpDrawWork.copy(start).sub(_drawTransform.pivot);
      if (axis === 'x') rel.applyAxisAngle(new THREE.Vector3(1, 0, 0), ang);
      else if (axis === 'z') rel.applyAxisAngle(new THREE.Vector3(0, 0, 1), ang);
      else rel.applyAxisAngle(new THREE.Vector3(0, 1, 0), ang);
      out.copy(_drawTransform.pivot).add(rel);
    }
    _drawVertMeshes[idx].position.copy(out);
  }
  _updateDrawMeshGeometry();
  _updateDrawPreview();
}

function _confirmDrawTransform() {
  if (!_drawTransform.active) return;
  _drawTransform.active = false;
  _drawTransform.op = null;
  _drawTransform.axis = null;
  _drawTransform.selectedVerts = [];
  _drawTransform.startVerts = [];
  _updateDrawUi();
}

function _cancelDrawTransform() {
  if (!_drawTransform.active) return;
  for (let i = 0; i < _drawTransform.selectedVerts.length; i++) {
    const idx = _drawTransform.selectedVerts[i];
    _drawVerts[idx].copy(_drawTransform.startVerts[i]);
    _drawVertMeshes[idx].position.copy(_drawVerts[idx]);
  }
  _updateDrawMeshGeometry();
  _drawTransform.active = false;
  _drawTransform.op = null;
  _drawTransform.axis = null;
  _drawTransform.selectedVerts = [];
  _drawTransform.startVerts = [];
  _updateDrawUi();
}

function _toggleSelectAllDraw() {
  let max = 0;
  if (_drawSelectMode === 'vertex') max = _drawVerts.length;
  else if (_drawSelectMode === 'edge') max = _drawEdges.length;
  else max = _drawFaces.length;
  if (_drawSelection.length === max) _drawSelection.length = 0;
  else {
    _drawSelection.length = 0;
    for (let i = 0; i < max; i++) _drawSelection.push(i);
  }
  _updateDrawSelectionVisuals();
  _updateDrawPreview();
  _updateDrawUi();
}

function _updateDrawPreview() {
  if (_drawPreviewLine) { scene.remove(_drawPreviewLine); _drawPreviewLine = null; }
  if (_drawPreviewFace) { scene.remove(_drawPreviewFace); _drawPreviewFace = null; }
  const verts = _selectedVertexIndices();
  if (verts.length >= 2) {
    const pts = verts.map(i => _drawVerts[i].clone());
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    _drawPreviewLine = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffee00 }));
    scene.add(_drawPreviewLine);
  }
  if (verts.length >= 3) {
    const i0 = verts[verts.length - 3];
    const i1 = verts[verts.length - 2];
    const i2 = verts[verts.length - 1];
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute([
      _drawVerts[i0].x, _drawVerts[i0].y, _drawVerts[i0].z,
      _drawVerts[i1].x, _drawVerts[i1].y, _drawVerts[i1].z,
      _drawVerts[i2].x, _drawVerts[i2].y, _drawVerts[i2].z,
    ], 3));
    geo.computeVertexNormals();
    _drawPreviewFace = new THREE.Mesh(
      geo,
      new THREE.MeshBasicMaterial({ color: 0xffe08a, transparent: true, opacity: 0.25, side: THREE.DoubleSide })
    );
    scene.add(_drawPreviewFace);
  }
}

function _drawPointFromRay(ray, additiveSelect = false, raycaster = null) {
  if (raycaster && _drawSelectMode === 'vertex') {
    const markerHits = raycaster.intersectObjects(_drawVertMeshes, false);
    if (markerHits.length) {
      const idx = _drawVertMeshes.indexOf(markerHits[0].object);
      if (idx >= 0) return _selectDrawElement(idx, additiveSelect);
    }
  }
  if (raycaster && _drawSelectMode === 'edge') {
    raycaster.params.Line.threshold = 0.09;
    const edgeHits = raycaster.intersectObjects(_drawEdges.map(e => e.line), false);
    if (edgeHits.length) {
      const idx = _drawEdges.findIndex(e => e.line === edgeHits[0].object);
      if (idx >= 0) return _selectDrawElement(idx, additiveSelect);
    }
  }
  if (raycaster && _drawSelectMode === 'face') {
    const faceHits = raycaster.intersectObjects(_drawFaces.map(f => f.mesh), false);
    if (faceHits.length) {
      const idx = _drawFaces.findIndex(f => f.mesh === faceHits[0].object);
      if (idx >= 0) return _selectDrawElement(idx, additiveSelect);
    }
  }
  _groundPlane.constant = -_drawPlaneY;
  if (ray.intersectPlane(_groundPlane, _tmpDrawHit)) {
    if (_drawSelectMode !== 'vertex') return false;
    const nearIdx = _findNearestDrawVertex(_tmpDrawHit, 0.12);
    if (nearIdx >= 0) _selectDrawElement(nearIdx, additiveSelect);
    else if (_drawMode && _drawModeType === 'draw') _placeDrawVertex(_tmpDrawHit);
    else return false;
    return true;
  }
  return false;
}

function _cancelDraw(full = false) {
  _cancelDrawTransform();
  _drawSelection.length = 0;
  _updateDrawSelectionVisuals();
  _updateDrawPreview();
  if (full) {
    _drawSelectMode = 'vertex';
  }
  _updateDrawUi();
}

function _updateDrawUi() {
  const el = document.getElementById('draw-ui');
  if (!el) return;
  if (_drawMode) {
    const n = _drawVerts.length;
    const e = _drawEdges.length;
    const f = _drawFaces.length;
    const s = _drawSelection.length;
    const editMode = _drawModeType.toUpperCase();
    const mode = _drawSelectMode.toUpperCase();
    const tx = _drawTransform.active ? ` | ${_drawTransform.op.toUpperCase()}${_drawTransform.axis ? ` ${_drawTransform.axis.toUpperCase()}` : ''}` : '';
    el.style.display = 'block';
    el.innerHTML =
      `✏️ ${editMode} (${mode}) — V:${n} E:${e} F:${f} | Sel:${s} | Plane Y:${_drawPlaneY.toFixed(2)}${tx}` +
      `<br><small>Tab / header: cycle OFF→DRAW→SELECT • 1/2/3: select type • A: select all • G/R/S then X/Y/Z • Shift+X/Y/Z exclude axis • E: extrude • F: fill • Shift+D: duplicate • X/Delete: delete • M: merge • Enter/Click confirm • Esc/RightClick cancel</small>`;
  } else {
    el.style.display = 'none';
  }
}

function _applyBrightness(b) {
  _brightness = b;
  renderer.toneMappingExposure = b;
  _controlTablet.userData.handle.position.y = _brightnessToY(b);
  _drawBrightnessValue(_controlTablet.userData.labelCanvas, _controlTablet.userData.labelTex, b);
}

function _setLaserActive(next) {
  _laserActive = !!next;
  _laserGroup.visible = _laserActive;
  _laserPivots.forEach(({ light }) => { light.intensity = _laserActive ? 3.5 : 0; });
  _drawTabletBtn(_controlTablet.userData.laserBtnCanvas, _controlTablet.userData.laserBtnTex, '✦', 'LASER', _laserActive);
}

function _setDiscoActive(next) {
  _discoActive = !!next;
  _discoGroup.visible = _discoActive;
  _discoLights.forEach(l => { l.intensity = _discoActive ? 8 : 0; });
  _drawTabletBtn(_controlTablet.userData.discoBtnCanvas, _controlTablet.userData.discoBtnTex, '🪩', 'DISCO', _discoActive);
}

_applyBrightness(1.0);
_refreshSkyBtns();

function _updateLasers(dt) {
  if (_laserActive) {
    _laserPivots.forEach(({ outerPivot, innerPivot, speedX, speedY, speedZ }) => {
      outerPivot.rotation.y += speedY * dt;
      innerPivot.rotation.x += speedX * dt;
      innerPivot.rotation.z += speedZ * dt;
    });
  }
  if (_discoActive) {
    _discoBall.rotation.y += 0.8 * dt;
    _discoGroup.rotation.y += 0.3 * dt;
  }
}

// Sky buttons live on the control tablet (see _buildControlTablet)

function _deadzone(v) {
  return Math.abs(v) < STICK_DEADZONE ? 0 : v;
}

function _readStick(gamepad) {
  if (!gamepad || !gamepad.axes || gamepad.axes.length < 2) return { x: 0, y: 0 };

  // XR gamepad layouts vary by browser/runtime: some expose the stick on
  // axes[0,1], others on axes[2,3]. Pick whichever pair is most active.
  const candidates = [
    { x: _deadzone(gamepad.axes[0] || 0), y: _deadzone(gamepad.axes[1] || 0) },
    { x: _deadzone(gamepad.axes[2] || 0), y: _deadzone(gamepad.axes[3] || 0) },
  ];
  let best = candidates[0];
  let bestMag = Math.abs(best.x) + Math.abs(best.y);
  for (let i = 1; i < candidates.length; i++) {
    const c = candidates[i];
    const mag = Math.abs(c.x) + Math.abs(c.y);
    if (mag > bestMag) { best = c; bestMag = mag; }
  }
  return best;
}

function _gamepadFromHandedness(handedness) {
  const session = renderer.xr.getSession();
  if (!session) return null;
  for (const source of session.inputSources) {
    if (source && source.handedness === handedness && source.gamepad) return source.gamepad;
  }
  return null;
}

function _isGrabPressed(gp) {
  if (!gp || !gp.buttons) return false;
  // Quest usually maps trigger to [0] and squeeze/grip to [1].
  const trigger = gp.buttons[0];
  const grip = gp.buttons[1];
  const pressed = (b) => !!(b && (b.pressed || (b.value || 0) > 0.7));
  return pressed(trigger) || pressed(grip);
}

function _updatePanelInteraction(leftGp, rightGp) {
  const leftCtrl = _controllersByHand.left;
  const rightCtrl = _controllersByHand.right;
  const leftPressed = _isGrabPressed(leftGp);
  const rightPressed = _isGrabPressed(rightGp);

  // World compass interactions:
  // - center sphere: move the compass itself (translation only)
  // - axis pull in draw mode: move selected draw elements along that axis
  if (_compassGrabState.holder) {
    const holdCtrl = _controllersByHand[_compassGrabState.holder];
    const holdPressed = _compassGrabState.holder === 'left' ? leftPressed : rightPressed;
    if (!holdCtrl || !holdPressed || !_compassRoot) {
      _compassGrabState.holder = null;
      _compassGrabState.mode = null;
      _compassGrabState.selectedVerts = [];
      _compassGrabState.startVerts = [];
      _toolSystem.activeTool = 'idle';
    } else {
      holdCtrl.getWorldPosition(_tmpCtrlPos);
      if (_compassGrabState.mode === 'drag-selection' && _drawMode && _compassGrabState.selectedVerts.length) {
        _toolSystem.activeTool = 'drag-selection';
        const amount = _tmpDrawWork
          .copy(_tmpCtrlPos)
          .sub(_compassGrabState.startCtrl)
          .dot(_compassGrabState.axis);
        for (let i = 0; i < _compassGrabState.selectedVerts.length; i++) {
          const idx = _compassGrabState.selectedVerts[i];
          const start = _compassGrabState.startVerts[i];
          if (!start || !_drawVerts[idx] || !_drawVertMeshes[idx]) continue;
          _drawVerts[idx].copy(start).addScaledVector(_compassGrabState.axis, amount);
          _drawVertMeshes[idx].position.copy(_drawVerts[idx]);
        }
        _updateDrawMeshGeometry();
        _updateDrawPreview();
      } else {
        _toolSystem.activeTool = 'move-gizmo';
        _compassRoot.position.copy(_tmpCtrlPos).add(_compassGrabState.offset);
        _compassRoot.quaternion.identity();
      }
    }
  }

  // Direct vertex grab — both hands can independently hold a vertex.
  for (const hand of ['left', 'right']) {
    const hg = _handGrab[hand];
    if (!hg.active) continue;
    const holdCtrl = _controllersByHand[hand];
    const holdPressed = hand === 'left' ? leftPressed : rightPressed;
    const idx = hg.vertIndex;
    if (!holdCtrl || !holdPressed || !_drawMode || idx < 0 || idx >= _drawVerts.length || !_drawVertMeshes[idx]) {
      hg.active = false;
      hg.vertIndex = -1;
    } else {
      _toolSystem.activeTool = 'grab-vertex';
      holdCtrl.getWorldPosition(_tmpCtrlPos);
      _drawVerts[idx].copy(_tmpCtrlPos).add(hg.offset);
      _drawVertMeshes[idx].position.copy(_drawVerts[idx]);
      _updateDrawMeshGeometry();
      _updateDrawPreview();
    }
  }

  // ── Control tablet: slider drag (continuous hold) ─────────────────────────
  if (_sliderState.holder) {
    const holdCtrl = _controllersByHand[_sliderState.holder];
    const holdPressed = _sliderState.holder === 'left' ? leftPressed : rightPressed;
    if (!holdCtrl || !holdPressed) {
      _sliderState.holder = null;
    } else {
      holdCtrl.getWorldPosition(_tmpSliderCtrl);
      const localY = _controlTablet.worldToLocal(_tmpSliderCtrl.clone()).y;
      const newB = _yToBrightness(localY - _sliderState.grabLocalY + _brightnessToY(_sliderState.grabBrightness));
      _applyBrightness(newB);
    }
  } else {
    // Try to grab slider handle
    const trySliderGrab = (hand, ctrl, pressed, wasPressed) => {
      if (!ctrl || !pressed || wasPressed) return false;
      ctrl.getWorldPosition(_tmpSliderCtrl);
      _controlTablet.userData.handle.getWorldPosition(_tmpSliderPos);
      if (_tmpSliderCtrl.distanceTo(_tmpSliderPos) > 0.12) return false;
      const localY = _controlTablet.worldToLocal(_tmpSliderCtrl.clone()).y;
      _sliderState.holder = hand;
      _sliderState.grabLocalY = localY;
      _sliderState.grabBrightness = _brightness;
      return true;
    };
    trySliderGrab('left',  leftCtrl,  leftPressed,  _grabPressedPrev.left) ||
    trySliderGrab('right', rightCtrl, rightPressed, _grabPressedPrev.right);
  }

  // ── Release tablet grab ───────────────────────────────────────────────────
  if (_tabletGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    scene.attach(_controlTablet); _tabletGrabState.holder = null;
  }
  if (_tabletGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    scene.attach(_controlTablet); _tabletGrabState.holder = null;
  }
  if (_playersGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    scene.attach(_playersTablet); _playersGrabState.holder = null;
  }
  if (_playersGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    scene.attach(_playersTablet); _playersGrabState.holder = null;
  }
  if (_drawPanelGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    scene.attach(_drawPanel); _drawPanelGrabState.holder = null;
  }
  if (_drawPanelGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    scene.attach(_drawPanel); _drawPanelGrabState.holder = null;
  }

  // ── Fresh-press actions (buttons + tablet grab + sky pickers) ─────────────
  const anyFreshPress =
    (leftPressed  && !_grabPressedPrev.left) ||
    (rightPressed && !_grabPressedPrev.right);

  if (anyFreshPress && !_sliderState.holder) {
    const ctrls = [
      leftPressed  && !_grabPressedPrev.left  ? { ctrl: leftCtrl,  hand: 'left'  } : null,
      rightPressed && !_grabPressedPrev.right ? { ctrl: rightCtrl, hand: 'right' } : null,
    ].filter(Boolean);

    for (const { ctrl, hand } of ctrls) {
      if (!ctrl) continue;
      ctrl.getWorldPosition(_tmpCtrlPos);

      // Grab an existing vertex directly with the hand/controller.
      if (!_handGrab[hand].active && _drawMode && _drawVerts.length) {
        const nearIdx = _findNearestDrawVertex(_tmpCtrlPos, 0.11);
        if (nearIdx >= 0) {
          if (_drawSelectMode !== 'vertex') _setDrawSelectMode('vertex');
          _selectDrawElement(nearIdx, false);
          _handGrab[hand].active = true;
          _handGrab[hand].vertIndex = nearIdx;
          _handGrab[hand].offset.copy(_drawVerts[nearIdx]).sub(_tmpCtrlPos);
          continue;
        }
      }

      // Pull a compass axis to move current draw selection along that axis.
      if (
        !_compassGrabState.holder &&
        _drawMode &&
        _compassRoot &&
        _compassAxisHandles.length
      ) {
        const selVerts = _selectedVertexIndices();
        if (selVerts.length) {
          let hitAxis = null;
          for (const axisHandle of _compassAxisHandles) {
            axisHandle.node.getWorldPosition(_tmpCompassAxisPos);
            if (_tmpCtrlPos.distanceTo(_tmpCompassAxisPos) <= 0.13) {
              hitAxis = axisHandle;
              break;
            }
          }
          if (hitAxis) {
            if (_drawTransform.active) _cancelDrawTransform();
            _compassGrabState.holder = hand;
            _compassGrabState.mode = 'drag-selection';
            _compassGrabState.axis.copy(hitAxis.dir).normalize();
            _compassGrabState.startCtrl.copy(_tmpCtrlPos);
            _compassGrabState.selectedVerts = selVerts;
            _compassGrabState.startVerts = selVerts.map(i => _drawVerts[i].clone());
            continue;
          }
        }
      }

      // Grab/move world compass by center sphere only.
      if (!_compassGrabState.holder && _compassCenter && _compassRoot) {
        _compassCenter.getWorldPosition(_tmpCompassPos);
        if (_tmpCtrlPos.distanceTo(_tmpCompassPos) <= 0.12) {
          _compassGrabState.holder = hand;
          _compassGrabState.mode = 'move-compass';
          _compassGrabState.offset.copy(_compassRoot.position).sub(_tmpCtrlPos);
          _compassRoot.quaternion.identity();
          continue;
        }
      }

      // Sky buttons on control tablet
      let hitSky = false;
      for (const skyBtn of (_controlTablet.userData.skyBtnMeshes || [])) {
        skyBtn.getWorldPosition(_tmpPanelPos);
        if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.12) {
          _applySkyPreset(skyBtn.userData.skyPreset);
          hitSky = true; break;
        }
      }
      if (hitSky) continue;

      // Spell panel — fireball button
      _spellPanel.userData.fireballBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.15) {
        _castFireball();
        continue;
      }

      // Spell panel — arcane shot button
      _spellPanel.userData.arcaneBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.15) {
        _castArcaneShot();
        continue;
      }

      // Spell panel — lightning strike button
      _spellPanel.userData.lightningBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.15) {
        _castLightningStrike();
        continue;
      }

      // Spell panel — grab to move
      if (!_spellGrabState.holder) {
        let spellInRange = false;
        for (const sh of (_spellPanel.userData.sideHandles || [])) {
          sh.getWorldPosition(_tmpPanelPos);
          if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.14) { spellInRange = true; break; }
        }
        if (!spellInRange) {
          _spellPanel.getWorldPosition(_tmpPanelPos);
          if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= PANEL_GRAB_DISTANCE) spellInRange = true;
        }
        if (spellInRange) {
          ctrl.attach(_spellPanel);
          _spellGrabState.holder = hand;
          continue;
        }
      }

      // LASER button
      _controlTablet.userData.laserBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.14) {
        _setLaserActive(!_laserActive);
        continue;
      }

      // DISCO button
      _controlTablet.userData.discoBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.14) {
        _setDiscoActive(!_discoActive);
        continue;
      }

      // Draw panel — toggle draw mode button
      _drawPanel.userData.drawModeBtnMesh.getWorldPosition(_tmpDrawPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpDrawPanelPos) <= 0.15) {
        _cycleEditMode();
        continue;
      }

      // Draw panel — vertex button
      _drawPanel.userData.drawToggleBtnMesh.getWorldPosition(_tmpDrawPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpDrawPanelPos) <= 0.15) {
        if (_drawMode) _setDrawSelectMode('vertex');
        continue;
      }

      // Draw panel — edge button
      _drawPanel.userData.drawEdgeBtnMesh.getWorldPosition(_tmpDrawPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpDrawPanelPos) <= 0.15) {
        if (!_drawMode) _setDrawActive(true);
        _setDrawSelectMode('edge');
        continue;
      }

      // Draw panel — face button
      _drawPanel.userData.drawFaceBtnMesh.getWorldPosition(_tmpDrawPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpDrawPanelPos) <= 0.15) {
        if (!_drawMode) _setDrawActive(true);
        _setDrawSelectMode('face');
        continue;
      }

      // Draw panel — undo button
      _drawPanel.userData.drawUndoBtnMesh.getWorldPosition(_tmpDrawPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpDrawPanelPos) <= 0.15) {
        if (_drawMode) {
          if (_drawTransform.active) _cancelDrawTransform();
          else _undoDrawStep();
        }
        continue;
      }

      // Draw panel — XYZ gizmo nudge buttons
      // Panel nudge buttons are intentionally inactive; use hand+gizmo interactions.

      // Draw mode only — place vertex on ground via controller ray
      if (_drawMode && _drawModeType === 'draw') {
        ctrl.getWorldQuaternion(_tmpDrawQuat);
        _tmpDrawDir.set(0, 0, -1).applyQuaternion(_tmpDrawQuat);
        _drawRay.set(_tmpCtrlPos, _tmpDrawDir);
        _drawPointFromRay(_drawRay, false, null);
        continue;
      }

      // Grab whole tablet to move it (check handles first, then center)
      if (!_tabletGrabState.holder) {
        let tabletInRange = false;
        for (const handleBar of (_controlTablet.userData.sideHandles || [])) {
          handleBar.getWorldPosition(_tmpTabletPos);
          if (_tmpCtrlPos.distanceTo(_tmpTabletPos) <= 0.14) { tabletInRange = true; break; }
        }
        if (!tabletInRange) {
          _controlTablet.getWorldPosition(_tmpTabletPos);
          if (_tmpCtrlPos.distanceTo(_tmpTabletPos) <= PANEL_GRAB_DISTANCE) tabletInRange = true;
        }
        if (tabletInRange) {
          ctrl.attach(_controlTablet);
          _tabletGrabState.holder = hand;
          continue;
        }
      }

      // Players panel grab
      if (!_playersGrabState.holder) {
        let playersInRange = false;
        for (const handleBar of (_playersTablet.userData.sideHandles || [])) {
          handleBar.getWorldPosition(_tmpPlayersPos);
          if (_tmpCtrlPos.distanceTo(_tmpPlayersPos) <= 0.14) { playersInRange = true; break; }
        }
        if (!playersInRange) {
          _playersTablet.getWorldPosition(_tmpPlayersPos);
          if (_tmpCtrlPos.distanceTo(_tmpPlayersPos) <= PANEL_GRAB_DISTANCE) playersInRange = true;
        }
        if (playersInRange) {
          ctrl.attach(_playersTablet);
          _playersGrabState.holder = hand;
          continue;
        }
      }

      // Draw panel grab
      if (!_drawPanelGrabState.holder) {
        let drawInRange = false;
        for (const sh of (_drawPanel.userData.sideHandles || [])) {
          sh.getWorldPosition(_tmpDrawPanelPos);
          if (_tmpCtrlPos.distanceTo(_tmpDrawPanelPos) <= 0.14) { drawInRange = true; break; }
        }
        if (!drawInRange) {
          _drawPanel.getWorldPosition(_tmpDrawPanelPos);
          if (_tmpCtrlPos.distanceTo(_tmpDrawPanelPos) <= PANEL_GRAB_DISTANCE) drawInRange = true;
        }
        if (drawInRange) {
          ctrl.attach(_drawPanel);
          _drawPanelGrabState.holder = hand;
          continue;
        }
      }

    }
  }
  if (_spellGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    scene.attach(_spellPanel); _spellGrabState.holder = null;
  }
  if (_spellGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    scene.attach(_spellPanel); _spellGrabState.holder = null;
  }
  if (_compassGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    _compassGrabState.holder = null;
    _compassGrabState.mode = null;
    _compassGrabState.selectedVerts = [];
    _compassGrabState.startVerts = [];
    _toolSystem.activeTool = 'idle';
    if (_compassRoot) _compassRoot.quaternion.identity();
  }
  if (_compassGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    _compassGrabState.holder = null;
    _compassGrabState.mode = null;
    _compassGrabState.selectedVerts = [];
    _compassGrabState.startVerts = [];
    _toolSystem.activeTool = 'idle';
    if (_compassRoot) _compassRoot.quaternion.identity();
  }
  if (_handGrab.left.active && (!leftCtrl || !leftPressed)) {
    _handGrab.left.active = false; _handGrab.left.vertIndex = -1;
  }
  if (_handGrab.right.active && (!rightCtrl || !rightPressed)) {
    _handGrab.right.active = false; _handGrab.right.vertIndex = -1;
  }
  if (!_handGrab.left.active && !_handGrab.right.active) {
    if (_toolSystem.activeTool === 'grab-vertex') _toolSystem.activeTool = 'idle';
  }

  _grabPressedPrev.left = leftPressed;
  _grabPressedPrev.right = rightPressed;
}


function _updateQuestLocomotion(dt) {
  if (!renderer.xr.isPresenting) {
    _grabPressedPrev.left = false;
    _grabPressedPrev.right = false;
    if (_tabletGrabState.holder) {
      scene.attach(_controlTablet);
      _tabletGrabState.holder = null;
    }
    if (_spellGrabState.holder) {
      scene.attach(_spellPanel);
      _spellGrabState.holder = null;
    }
    if (_playersGrabState.holder) {
      scene.attach(_playersTablet);
      _playersGrabState.holder = null;
    }
    if (_drawPanelGrabState.holder) {
      scene.attach(_drawPanel);
      _drawPanelGrabState.holder = null;
    }
    if (_compassGrabState.holder) {
      _compassGrabState.holder = null;
      _compassGrabState.mode = null;
      _compassGrabState.selectedVerts = [];
      _compassGrabState.startVerts = [];
      if (_compassRoot) _compassRoot.quaternion.identity();
    }
    if (_vertexGrabState.holder) {
      _vertexGrabState.holder = null;
      _vertexGrabState.vertIndex = -1;
    }
    _toolSystem.activeTool = 'idle';
    return;
  }

  const leftGp = _gamepadFromHandedness('left') || _controllersByHand.left?.userData?.inputSource?.gamepad;
  const rightGp = _gamepadFromHandedness('right') || _controllersByHand.right?.userData?.inputSource?.gamepad;
  _updatePanelInteraction(leftGp, rightGp);
  const left = _readStick(leftGp);
  const right = _readStick(rightGp);

  const xrCam = renderer.xr.getCamera(camera);
  xrCam.getWorldDirection(_tmpForward);
  _tmpForward.y = 0;
  if (_tmpForward.lengthSq() < 1e-6) _tmpForward.set(0, 0, -1);
  else _tmpForward.normalize();
  _tmpRight.crossVectors(_tmpForward, _tmpUp).normalize();

  const moveStep = MOVE_SPEED * dt;
  if (left.y !== 0) playerRig.position.addScaledVector(_tmpForward, -left.y * moveStep);
  if (left.x !== 0) playerRig.position.addScaledVector(_tmpRight, left.x * moveStep);

  if (right.x !== 0) playerRig.rotation.y -= right.x * TURN_SPEED * dt;
  playerPitch.rotation.x = 0;

  // Keep artificial locomotion look upright: yaw on rig + pitch on pivot only.
  playerRig.rotation.x = 0;
  playerRig.rotation.z = 0;
  playerPitch.rotation.y = 0;
  playerPitch.rotation.z = 0;
}

function _updateDesktopHint() {
  if (!_hintEl) return;
  if (renderer.xr.isPresenting) {
    _hintEl.textContent = 'VR active';
    if (_crosshairEl) _crosshairEl.classList.remove('show');
    return;
  }
  if (_crosshairEl) _crosshairEl.classList.add('show');
  const lockHint = _desktopState.pointerLocked ? 'Esc: unlock mouse' : 'Click canvas: lock mouse';
  const drawHint = _drawMode
    ? ` | ${_drawModeType.toUpperCase()}(${_drawSelectMode}): 1/2/3 select, G/R/S transform, X/Y/Z axis, E extrude, F fill`
    : '';
  _hintEl.textContent = `Desktop: WASD move, mouse look, sky 1/2/3, spells F/G/H, Tab cycles off/draw/select${drawHint} • ${lockHint}`;
}

function _desktopInteractTargets() {
  return [
    ...(_controlTablet?.userData?.skyBtnMeshes || []),
    _controlTablet?.userData?.laserBtnMesh,
    _controlTablet?.userData?.discoBtnMesh,
    _spellPanel?.userData?.fireballBtnMesh,
    _spellPanel?.userData?.arcaneBtnMesh,
    _spellPanel?.userData?.lightningBtnMesh,
    _drawPanel?.userData?.drawModeBtnMesh,
    _drawPanel?.userData?.drawToggleBtnMesh,
    _drawPanel?.userData?.drawEdgeBtnMesh,
    _drawPanel?.userData?.drawFaceBtnMesh,
    _drawPanel?.userData?.drawUndoBtnMesh,
  ].filter(Boolean);
}

function _desktopTriggerInteraction(target) {
  if (!target) return false;
  if (target.userData?.skyPreset) {
    _applySkyPreset(target.userData.skyPreset);
    return true;
  }
  if (target === _controlTablet?.userData?.laserBtnMesh) {
    _setLaserActive(!_laserActive);
    return true;
  }
  if (target === _controlTablet?.userData?.discoBtnMesh) {
    _setDiscoActive(!_discoActive);
    return true;
  }
  if (target === _spellPanel?.userData?.fireballBtnMesh) {
    _castFireball();
    return true;
  }
  if (target === _spellPanel?.userData?.arcaneBtnMesh) {
    _castArcaneShot();
    return true;
  }
  if (target === _spellPanel?.userData?.lightningBtnMesh) {
    _castLightningStrike();
    return true;
  }
  if (target === _drawPanel?.userData?.drawModeBtnMesh) {
    _cycleEditMode();
    return true;
  }
  if (target === _drawPanel?.userData?.drawToggleBtnMesh) {
    if (_drawMode) _setDrawSelectMode('vertex');
    return true;
  }
  if (target === _drawPanel?.userData?.drawEdgeBtnMesh) {
    if (!_drawMode) _setDrawActive(true);
    _setDrawSelectMode('edge');
    return true;
  }
  if (target === _drawPanel?.userData?.drawFaceBtnMesh) {
    if (!_drawMode) _setDrawActive(true);
    _setDrawSelectMode('face');
    return true;
  }
  if (target === _drawPanel?.userData?.drawUndoBtnMesh) {
    if (_drawMode) {
      if (_drawTransform.active) _cancelDrawTransform();
      else _undoDrawStep();
    }
    return true;
  }
  return false;
}

function _desktopClickInteract(clientX, clientY, centerRay = false, additiveSelect = false) {
  if (renderer.xr.isPresenting) return false;
  const rect = canvas.getBoundingClientRect();
  if (!centerRay) {
    _desktopState.mouseNdc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    _desktopState.mouseNdc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  } else {
    _desktopState.mouseNdc.set(0, 0);
  }
  _desktopState.raycaster.setFromCamera(_desktopState.mouseNdc, camera);
  const hits = _desktopState.raycaster.intersectObjects(_desktopInteractTargets(), false);
  if (hits.length) return _desktopTriggerInteraction(hits[0].object);
  // Draw mode: no button hit — place/select vertices in 3D edit mode
  if (_drawMode) {
    return _drawPointFromRay(_desktopState.raycaster.ray, additiveSelect, _desktopState.raycaster);
  }
  return false;
}

function _initDesktopControls() {
  _desktopState.yaw = playerRig.rotation.y;
  _desktopState.pitch = playerPitch.rotation.x;
  _updateDesktopHint();

  canvas.addEventListener('click', (e) => {
    if (renderer.xr.isPresenting) return;
    if (!_desktopState.pointerLocked && document.pointerLockElement !== canvas) {
      canvas.requestPointerLock();
      return;
    }
    if (_drawMode && _drawTransform.active) {
      _confirmDrawTransform();
      return;
    }
    _desktopClickInteract(e.clientX, e.clientY, _desktopState.pointerLocked, !!e.shiftKey);
  });

  canvas.addEventListener('contextmenu', (e) => {
    if (_drawMode && _drawTransform.active) {
      e.preventDefault();
      _cancelDrawTransform();
    }
  });

  document.addEventListener('pointerlockchange', () => {
    _desktopState.pointerLocked = document.pointerLockElement === canvas;
    _updateDesktopHint();
  });

  window.addEventListener('mousemove', (e) => {
    if (renderer.xr.isPresenting || !_desktopState.pointerLocked) return;
    if (_drawMode && _drawTransform.active) {
      _accumulateDrawTransform((e.movementX - e.movementY * 0.5) * 0.01);
      return;
    }
    _desktopState.yaw -= e.movementX * _desktopState.mouseSensitivity;
    _desktopState.pitch -= e.movementY * _desktopState.mouseSensitivity;
    _desktopState.pitch = THREE.MathUtils.clamp(_desktopState.pitch, -LOOK_LIMIT, 0);
  });

  window.addEventListener('keydown', (e) => {
    if (renderer.xr.isPresenting) return;
    const key = String(e.key || '').toLowerCase();
    _desktopState.keys[key] = true;
    if (e.repeat) return;

    if (key === 'tab') {
      e.preventDefault();
      _cycleEditMode();
      return;
    }

    if (_drawMode) {
      if (key === '1') { _setDrawSelectMode('vertex'); return; }
      if (key === '2') { _setDrawSelectMode('edge'); return; }
      if (key === '3') { _setDrawSelectMode('face'); return; }
      if (key === 'a') { _toggleSelectAllDraw(); return; }

      if (_drawTransform.active) {
        if (key === 'x' || key === 'y' || key === 'z') {
          _setDrawTransformAxis(key, !!e.shiftKey);
          return;
        }
        if (key === 'enter') { _confirmDrawTransform(); return; }
        if (key === 'escape') { _cancelDrawTransform(); return; }
      }

      if (key === 'g') { _startDrawTransform('grab'); return; }
      if (key === 'r') { _startDrawTransform('rotate'); return; }
      if (key === 's') { _startDrawTransform('scale'); return; }
      if (key === 'e') { _extrudeSelection(); return; }
      if (key === 'f') { _fillFromSelection(); return; }
      if (key === 'm') { _mergeSelection(); return; }
      if (key === 'x' || key === 'delete') { _deleteSelection(); return; }
      if (key === 'd' && e.shiftKey) { _duplicateSelection(); return; }
      if (key === 'backspace') { e.preventDefault(); _undoDrawStep(); return; }
      if (key === 'escape') { _setDrawActive(false); return; }
    }

    if (key === '1') _applySkyPreset('blue');
    else if (key === '2') _applySkyPreset('green');
    else if (key === '3') _applySkyPreset('red');
    else if (key === 'l') _setLaserActive(!_laserActive);
    else if (key === 'k') _setDiscoActive(!_discoActive);
    else if (key === 'f') _castFireball();
    else if (key === 'g') _castArcaneShot();
    else if (key === 'h') _castLightningStrike();
    else if (key === '[') _applyBrightness(_brightness - 0.1);
    else if (key === ']') _applyBrightness(_brightness + 0.1);
  });

  window.addEventListener('keyup', (e) => {
    const key = String(e.key || '').toLowerCase();
    _desktopState.keys[key] = false;
  });

  renderer.xr.addEventListener('sessionstart', _updateDesktopHint);
  renderer.xr.addEventListener('sessionend', () => {
    _desktopState.yaw = playerRig.rotation.y;
    _desktopState.pitch = 0;
    _updateDesktopHint();
  });
}

function _updateDesktopLocomotion(dt) {
  if (renderer.xr.isPresenting || !_desktopState.active) return;

  const keys = _desktopState.keys;
  const forward = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
  const strafe = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
  const moveVec = new THREE.Vector3(strafe, 0, -forward);
  if (moveVec.lengthSq() > 0) {
    moveVec.normalize().multiplyScalar(MOVE_SPEED * dt);
    moveVec.applyAxisAngle(_tmpUp, _desktopState.yaw);
    playerRig.position.add(moveVec);
  }

  if (keys['arrowleft']) _desktopState.yaw += TURN_SPEED * dt;
  if (keys['arrowright']) _desktopState.yaw -= TURN_SPEED * dt;
  if (keys['arrowup']) _desktopState.pitch = THREE.MathUtils.clamp(_desktopState.pitch - LOOK_SPEED * dt * 0.7, -LOOK_LIMIT, 0);
  if (keys['arrowdown']) _desktopState.pitch = THREE.MathUtils.clamp(_desktopState.pitch + LOOK_SPEED * dt * 0.7, -LOOK_LIMIT, 0);

  playerRig.rotation.set(0, _desktopState.yaw, 0);
  playerPitch.rotation.set(_desktopState.pitch, 0, 0);
}

// VR button
const vrBtn = createVRButton(renderer);
if (vrBtn) document.getElementById('vr-btn-wrap').appendChild(vrBtn);
_connectPresenceSocket();
_initDesktopControls();

// ─── Starfield ────────────────────────────────────────────────────────────────
(function buildStars() {
  const count = 1800;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 30 + Math.random() * 20;
    pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xfff8e8, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.7,
  })));
})();

// ─── Floor grid ───────────────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 30, 30, 30);
const floorMat = new THREE.MeshStandardMaterial({

const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
