// ─── Inline minimal VRButton ─────────────────────────────────────────────────
function createVRButton(renderer) {
  const btn = document.createElement('button');
  btn.style.cssText = [
    'padding:12px 22px',
    'border:1px solid rgba(200,185,140,0.55)',
    'border-radius:10px',
    'background:rgba(15,19,31,0.94)',
    'color:#e8d89a',
    'font-size:13px',
    'letter-spacing:0.12em',
    'text-transform:uppercase',
    'cursor:pointer',
    'backdrop-filter:blur(4px)',
  ].join(';');

  if (!('xr' in navigator)) {
    document.getElementById('no-xr-msg').classList.add('show');
    return null;
  }

  let session = null;

  async function onStart(s) {
    s.addEventListener('end', onEnd);
    await renderer.xr.setSession(s);
    btn.textContent = 'Exit VR';
    session = s;
  }

  function onEnd() {
    session.removeEventListener('end', onEnd);
    btn.textContent = 'Enter VR';
    session = null;
  }

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (!supported) {
      document.getElementById('no-xr-msg').classList.add('show');
      btn.textContent = 'VR Not Supported';
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
    } else {
      btn.textContent = 'Enter VR';
      btn.onclick = () => {
        if (!session) {
          navigator.xr.requestSession('immersive-vr', {
            optionalFeatures: ['local-floor', 'bounded-floor', 'layers'],
          }).then(onStart);
        } else {
          session.end();
        }
      };
      // Auto-start if arriving from account hub Enter VR button
      let autostart = false;
      try { autostart = sessionStorage.getItem('vr-autostart') === '1'; sessionStorage.removeItem('vr-autostart'); } catch(_) {}
      if (autostart) btn.onclick();
    }
  }).catch(() => {
    document.getElementById('no-xr-msg').classList.add('show');
  });

  return btn;
}

const SKY_PRESETS = {
  blue: {
    label: 'Blue',

let _skyMat;
(function _buildSkybox() {
  const p = SKY_PRESETS.blue;
  const skyGeo = new THREE.SphereGeometry(60, 48, 24);
  _skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      uZenith:  { value: p.zenith.clone() },
      uUpper:   { value: p.upper.clone() },
      uMid:     { value: p.mid.clone() },
      uHorizon: { value: p.horizon.clone() },
      uNadir:   { value: p.nadir.clone() },
      uGlow:    { value: p.glow.clone() },
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uZenith;
      uniform vec3 uUpper;
      uniform vec3 uMid;
      uniform vec3 uHorizon;
      uniform vec3 uNadir;
      uniform vec3 uGlow;
      varying vec3 vWorldPos;

      // 5-stop smooth gradient
      vec3 skyGradient(float t) {
        if (t > 0.75) return mix(uUpper,   uZenith,  (t - 0.75) * 4.0);
        if (t > 0.50) return mix(uMid,     uUpper,   (t - 0.50) * 4.0);
        if (t > 0.30) return mix(uHorizon, uMid,     (t - 0.30) * 5.0);
        if (t > 0.10) return mix(uNadir,   uHorizon, (t - 0.10) * 5.0);
        return uNadir;
      }

      void main() {
        vec3 dir = normalize(vWorldPos);
        float t = clamp(dir.y * 0.5 + 0.5, 0.0, 1.0);
        vec3 sky = skyGradient(t);

        // Soft horizon glow band — peaks at t≈0.5, fades above and below
        float glowBand = exp(-pow((t - 0.48) / 0.09, 2.0));
        sky += uGlow * glowBand * 0.28;

        // Subtle lateral nebula sweep using world-space XZ angle
        float angle = atan(dir.z, dir.x);
        float nebula = sin(angle * 2.0 + 1.3) * 0.5 + 0.5;
        float nebulaHeight = smoothstep(0.55, 0.80, t) * (1.0 - smoothstep(0.80, 1.0, t));
        sky += uGlow * nebula * nebulaHeight * 0.10;

        // Sparse dim stars
        vec3 sp = floor(vWorldPos * 90.0);
        float h = fract(sin(dot(sp, vec3(127.1, 311.7, 74.3))) * 43758.5453);
        // vary star brightness slightly by a second hash
        float h2 = fract(sin(dot(sp, vec3(269.5, 183.3, 52.1))) * 43758.5453);
        float brightness = mix(0.15, 0.45, h2);
        float star = step(0.9985, h) * smoothstep(0.0, 0.35, dir.y) * brightness;

        gl_FragColor = vec4(sky + star, 1.0);
      }
    `
  });
  const skyMesh = new THREE.Mesh(skyGeo, _skyMat);
  skyMesh.renderOrder = -1;
  scene.add(skyMesh);
})();

function _applySkyPreset(name) {
  const p = SKY_PRESETS[name];
  if (!p || !_skyMat) return;
  _skyMat.uniforms.uZenith.value.copy(p.zenith);
  _skyMat.uniforms.uUpper.value.copy(p.upper);
  _skyMat.uniforms.uMid.value.copy(p.mid);
  _skyMat.uniforms.uHorizon.value.copy(p.horizon);
  _skyMat.uniforms.uNadir.value.copy(p.nadir);
  _skyMat.uniforms.uGlow.value.copy(p.glow);
  scene.fog.color.setHex(p.fogColor);
  renderer.setClearColor(p.fogColor, 1);
  // Update scene lighting to match preset
  _sceneAmbient.color.setHex(p.ambientColor);
  _sceneAmbient.intensity = p.ambientIntensity;
  _sceneSun.color.setHex(p.sunColor);
  _sceneSun.intensity = p.sunIntensity;
  _sceneRim.color.setHex(p.rimColor);
  _sceneRim.intensity = p.rimIntensity;
  _currentSky = name;
  if (_controlTablet) _refreshSkyBtns();
}

// ─── Laser light show (beams) ────────────────────────────────────────────────
let _laserActive = false;

const _laserPivots = [];

function _buildLasers() {
  const DEFS = [
    { col: 0xff0033, sx: 0,    sy: 1.4,  sz: 0.3  },
    { col: 0x00ff66, sx: 0.4,  sy: -1.1, sz: 0    },
    { col: 0x3388ff, sx: 0,    sy: 0.8,  sz: -0.9 },
    { col: 0xff00ff, sx: -0.5, sy: 1.9,  sz: 0    },
    { col: 0x00ffff, sx: 0.7,  sy: -0.6, sz: 0.5  },
    { col: 0xffff00, sx: -0.3, sy: 0.5,  sz: -1.3 },
  ];
  DEFS.forEach(({ col, sx, sy, sz }) => {
    const outerPivot = new THREE.Group();
    outerPivot.position.set(0, 4.0, 0);
    const innerPivot = new THREE.Group();
    outerPivot.add(innerPivot);
    const beam = new THREE.Mesh(
      new THREE.CylinderGeometry(0.006, 0.012, 10, 5),
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.65 })
    );
    beam.position.y = -5;
    innerPivot.add(beam);
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 8, 6),
      new THREE.MeshBasicMaterial({ color: col })
    );
    innerPivot.add(dot);
    const light = new THREE.PointLight(col, 0, 14, 2);
    innerPivot.add(light);
    _laserGroup.add(outerPivot);
    _laserPivots.push({ outerPivot, innerPivot, speedX: sx, speedY: sy, speedZ: sz, light });
  });
  _laserGroup.visible = false;
  scene.add(_laserGroup);
}
_buildLasers();

// ─── Brightness constants ────────────────────────────────────────────────────
const BRIGHTNESS_MIN = 0.2;
const BRIGHTNESS_MAX = 3.0;
const BRIGHTNESS_HEIGHT = 0.26;
let _brightness = 1.0;
const _sliderState = { holder: null, grabLocalY: 0, grabBrightness: 0 };
const _tmpSliderPos = new THREE.Vector3();
const _tmpSliderCtrl = new THREE.Vector3();
const _tmpTabletPos = new THREE.Vector3();
let _currentSky = 'blue';

function _brightnessToY(b) {
  const t = (b - BRIGHTNESS_MIN) / (BRIGHTNESS_MAX - BRIGHTNESS_MIN);
  return (t - 0.5) * BRIGHTNESS_HEIGHT;
}
function _yToBrightness(y) {
  const t = y / BRIGHTNESS_HEIGHT + 0.5;
  return THREE.MathUtils.clamp(
    BRIGHTNESS_MIN + t * (BRIGHTNESS_MAX - BRIGHTNESS_MIN),
    BRIGHTNESS_MIN, BRIGHTNESS_MAX
  );
}

// ─── Control Tablet ───────────────────────────────────────────────────────────
// One grabbable, movable panel: brightness slider + laser toggle + disco toggle.
const _tabletGrabState = { holder: null };
let _controlTablet = null;

function _drawTabletBtn(c, tex, icon, label, active) {
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const bg = ctx.createLinearGradient(0, 0, 0, c.height);
  if (active) { bg.addColorStop(0, '#3a0a18'); bg.addColorStop(1, '#1a0208'); }
  else        { bg.addColorStop(0, '#0d1828'); bg.addColorStop(1, '#080e18'); }
  ctx.fillStyle = bg;
  if (ctx.roundRect) { ctx.roundRect(0, 0, c.width, c.height, 12); } else { ctx.rect(0, 0, c.width, c.height); }
  ctx.fill();
  ctx.strokeStyle = active ? '#ff4466' : '#3366aa';
  ctx.lineWidth = 3;
  if (ctx.roundRect) { ctx.roundRect(2, 2, c.width - 4, c.height - 4, 10); } else { ctx.rect(2, 2, c.width - 4, c.height - 4); }
  ctx.stroke();
  ctx.fillStyle = active ? '#ff6688' : '#88aadd';
  ctx.font = 'bold 30px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(icon + ' ' + label, c.width / 2, 46);
  ctx.font = 'bold 22px Georgia';
  ctx.fillStyle = active ? '#ffaabb' : '#557799';
  ctx.fillText(active ? '● ON' : '○ OFF', c.width / 2, 84);
  tex.needsUpdate = true;
}

function _drawBrightnessValue(c, tex, b) {
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = 'rgba(8,14,28,0.9)';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = '#2255aa';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, c.width - 2, c.height - 2);
  ctx.fillStyle = '#99bbff';
  ctx.font = 'bold 24px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(b.toFixed(2), c.width / 2, c.height / 2 + 8);
  tex.needsUpdate = true;
}

function _drawSkyBtn(c, tex, presetName, active) {
  const p = SKY_PRESETS[presetName];
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const hz = p.horizon, zn = p.zenith;
  const bg = ctx.createLinearGradient(0, 0, 0, c.height);
  bg.addColorStop(0, `rgb(${Math.round(zn.r*255)},${Math.round(zn.g*255)},${Math.round(zn.b*255)})`);
  bg.addColorStop(1, `rgb(${Math.round(hz.r*255)},${Math.round(hz.g*255)},${Math.round(hz.b*255)})`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, c.width, c.height);
  if (active) { ctx.fillStyle = 'rgba(255,255,255,0.20)'; ctx.fillRect(0, 0, c.width, c.height); }
  ctx.strokeStyle = active ? '#ffffff' : p.accentHex;
  ctx.lineWidth = active ? 5 : 2;
  ctx.strokeRect(2, 2, c.width - 4, c.height - 4);
  ctx.fillStyle = active ? '#ffffff' : p.accentHex;
  ctx.font = `bold ${active ? 26 : 22}px Georgia`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(p.label, c.width / 2, c.height / 2);
  tex.needsUpdate = true;
}

function _refreshSkyBtns() {
  if (!_controlTablet) return;
  for (const btn of (_controlTablet.userData.skyBtnMeshes || [])) {
    _drawSkyBtn(btn.userData.canvas, btn.userData.tex, btn.userData.skyPreset, btn.userData.skyPreset === _currentSky);
  }
}

function _buildControlTablet() {

  hdrCtx.strokeStyle = '#4488cc'; hdrCtx.lineWidth = 3; hdrCtx.strokeRect(2, 2, 508, 76);
  hdrCtx.fillStyle = '#88ccff'; hdrCtx.font = 'bold 36px Georgia'; hdrCtx.textAlign = 'center';
  hdrCtx.fillText('⚙  CONTROL PANEL', 256, 52);
  const hdr = new THREE.Mesh(
    new THREE.PlaneGeometry(0.37, 0.058),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(hdrC), transparent: true, side: THREE.DoubleSide })
  );
  hdr.position.set(0, 0.221, Z);
  root.add(hdr);

  // Vertical divider between left/right sections
  const div = new THREE.Mesh(
    new THREE.BoxGeometry(0.002, 0.37, 0.002),
    new THREE.MeshBasicMaterial({ color: 0x223355 })
  );
  div.position.set(0, -0.02, Z);
  root.add(div);

  // ── Left: Brightness slider ─────────────────────────────────────────────────
  const bLblC = document.createElement('canvas'); bLblC.width = 192; bLblC.height = 48;
  const bLblCtx = bLblC.getContext('2d');
  bLblCtx.fillStyle = '#5577aa'; bLblCtx.font = '22px Georgia'; bLblCtx.textAlign = 'center';
  bLblCtx.fillText('BRIGHTNESS', 96, 34);
  const bLbl = new THREE.Mesh(
    new THREE.PlaneGeometry(0.135, 0.034),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(bLblC), transparent: true, side: THREE.DoubleSide })
  );
  bLbl.position.set(-0.10, 0.157, Z);
  root.add(bLbl);

  // ☀ top / 🌑 bottom icons
  ['☀', '🌑'].forEach((sym, i) => {
    const ic = document.createElement('canvas'); ic.width = 64; ic.height = 64;
    const iCtx = ic.getContext('2d');
    iCtx.font = '44px sans-serif'; iCtx.textAlign = 'center'; iCtx.textBaseline = 'middle';
    iCtx.fillText(sym, 32, 32);
    const im = new THREE.Mesh(
      new THREE.PlaneGeometry(0.038, 0.038),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(ic), transparent: true, side: THREE.DoubleSide })
    );
    im.position.set(-0.10, i === 0 ? BRIGHTNESS_HEIGHT / 2 + 0.028 : -(BRIGHTNESS_HEIGHT / 2 + 0.028), Z);
    root.add(im);
  });

  // Track
  const track = new THREE.Mesh(
    new THREE.BoxGeometry(0.010, BRIGHTNESS_HEIGHT, 0.010),
    new THREE.MeshBasicMaterial({ color: 0x224466 })
  );
  track.position.set(-0.10, 0, Z);
  root.add(track);

  // Handle
  const handle = new THREE.Mesh(
    new THREE.SphereGeometry(0.020, 14, 10),

function _drawSpellBtn(c, tex, icon, label, flavor) {
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const bg = ctx.createLinearGradient(0, 0, 0, c.height);
  bg.addColorStop(0, '#2a0a00'); bg.addColorStop(1, '#100400');
  ctx.fillStyle = bg;
  if (ctx.roundRect) ctx.roundRect(0, 0, c.width, c.height, 14); else ctx.rect(0, 0, c.width, c.height);
  ctx.fill();
  ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 3;
  if (ctx.roundRect) ctx.roundRect(2, 2, c.width-4, c.height-4, 12); else ctx.rect(2, 2, c.width-4, c.height-4);
  ctx.stroke();
  // inner glow line
  ctx.strokeStyle = 'rgba(255,120,0,0.35)'; ctx.lineWidth = 1;
  if (ctx.roundRect) ctx.roundRect(5, 5, c.width-10, c.height-10, 9); else ctx.rect(5, 5, c.width-10, c.height-10);
  ctx.stroke();
  ctx.fillStyle = '#ffaa44'; ctx.font = 'bold 52px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(icon, c.width/2, 70);
  ctx.fillStyle = '#ff8822'; ctx.font = 'bold 26px Georgia'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(label, c.width/2, 108);
  ctx.fillStyle = '#aa5522'; ctx.font = '18px Georgia';
  ctx.fillText(flavor, c.width/2, 132);
  tex.needsUpdate = true;
}

function _castFireball() {
  // Spawn a fireball from the player's eye position, shoot it forward
  const origin = new THREE.Vector3();
  renderer.xr.getCamera().getWorldPosition(origin);
  const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(renderer.xr.getCamera().quaternion).normalize();

  const fb = new THREE.Group();
  // Core sphere
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.10, 14, 10),
    new THREE.MeshBasicMaterial({ color: 0xff4400 })
  );
  fb.add(core);
  // Outer glow shell
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.17, 14, 10),
    new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.35, side: THREE.BackSide })
  );
  fb.add(glow);
  // Point light
  const light = new THREE.PointLight(0xff5500, 6, 8, 2);
  fb.add(light);

  fb.position.copy(origin).addScaledVector(dir, 0.5);
  fb.userData.velocity = dir.clone().multiplyScalar(8);
  fb.userData.life = 4.0;
  scene.add(fb);
  _fireballs.push(fb);
}

function _updateFireballs(dt) {
  for (let i = _fireballs.length - 1; i >= 0; i--) {
    const fb = _fireballs[i];
    fb.userData.life -= dt;
    if (fb.userData.life <= 0) {
      scene.remove(fb); _fireballs.splice(i, 1); continue;
    }
    fb.position.addScaledVector(fb.userData.velocity, dt);
    // Slight wobble
    fb.children[0].scale.setScalar(0.9 + 0.1 * Math.sin(fb.userData.life * 18));
  }
}

// Sky buttons live on the control tablet (see _buildControlTablet)

function _deadzone(v) {
  return Math.abs(v) < STICK_DEADZONE ? 0 : v;
}

function _readStick(gamepad) {
  if (!gamepad || !gamepad.axes || gamepad.axes.length < 2) return { x: 0, y: 0 };

  // XR gamepad layouts vary by browser/runtime: some expose the stick on
  // axes[0,1], others on axes[2,3]. Pick whichever pair is most active.
  const candidates = [
    { x: _deadzone(gamepad.axes[0] || 0), y: _deadzone(gamepad.axes[1] || 0) },
    { x: _deadzone(gamepad.axes[2] || 0), y: _deadzone(gamepad.axes[3] || 0) },
  ];
  let best = candidates[0];
  let bestMag = Math.abs(best.x) + Math.abs(best.y);
  for (let i = 1; i < candidates.length; i++) {
    const c = candidates[i];
    const mag = Math.abs(c.x) + Math.abs(c.y);
    if (mag > bestMag) { best = c; bestMag = mag; }
  }
  return best;
}

function _gamepadFromHandedness(handedness) {
  const session = renderer.xr.getSession();
  if (!session) return null;
  for (const source of session.inputSources) {
    if (source && source.handedness === handedness && source.gamepad) return source.gamepad;
  }
  return null;
}

function _isGrabPressed(gp) {
  if (!gp || !gp.buttons) return false;
  // Quest usually maps trigger to [0] and squeeze/grip to [1].
  const trigger = gp.buttons[0];
  const grip = gp.buttons[1];
  const pressed = (b) => !!(b && (b.pressed || (b.value || 0) > 0.7));
  return pressed(trigger) || pressed(grip);
}

function _updatePanelInteraction(leftGp, rightGp) {
  const leftCtrl = _controllersByHand.left;
  const rightCtrl = _controllersByHand.right;
  const leftPressed = _isGrabPressed(leftGp);
  const rightPressed = _isGrabPressed(rightGp);

  // ── Control tablet: slider drag (continuous hold) ─────────────────────────
  if (_sliderState.holder) {
    const holdCtrl = _controllersByHand[_sliderState.holder];
    const holdPressed = _sliderState.holder === 'left' ? leftPressed : rightPressed;
    if (!holdCtrl || !holdPressed) {
      _sliderState.holder = null;
    } else {
      holdCtrl.getWorldPosition(_tmpSliderCtrl);
      const localY = _controlTablet.worldToLocal(_tmpSliderCtrl.clone()).y;
      const newB = _yToBrightness(localY - _sliderState.grabLocalY + _brightnessToY(_sliderState.grabBrightness));
      _applyBrightness(newB);
    }
  } else {
    // Try to grab slider handle
    const trySliderGrab = (hand, ctrl, pressed, wasPressed) => {
      if (!ctrl || !pressed || wasPressed) return false;
      ctrl.getWorldPosition(_tmpSliderCtrl);
      _controlTablet.userData.handle.getWorldPosition(_tmpSliderPos);
      if (_tmpSliderCtrl.distanceTo(_tmpSliderPos) > 0.12) return false;
      const localY = _controlTablet.worldToLocal(_tmpSliderCtrl.clone()).y;
      _sliderState.holder = hand;
      _sliderState.grabLocalY = localY;
      _sliderState.grabBrightness = _brightness;
      return true;
    };
    trySliderGrab('left',  leftCtrl,  leftPressed,  _grabPressedPrev.left) ||
    trySliderGrab('right', rightCtrl, rightPressed, _grabPressedPrev.right);
  }

  // ── Release tablet grab ───────────────────────────────────────────────────
  if (_tabletGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    scene.attach(_controlTablet); _tabletGrabState.holder = null;
  }
  if (_tabletGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    scene.attach(_controlTablet); _tabletGrabState.holder = null;
  }

  // ── Fresh-press actions (buttons + tablet grab + sky pickers) ─────────────
  const anyFreshPress =
    (leftPressed  && !_grabPressedPrev.left) ||
    (rightPressed && !_grabPressedPrev.right);

  if (anyFreshPress && !_sliderState.holder) {
    const ctrls = [
      leftPressed  && !_grabPressedPrev.left  ? { ctrl: leftCtrl,  hand: 'left'  } : null,
      rightPressed && !_grabPressedPrev.right ? { ctrl: rightCtrl, hand: 'right' } : null,
    ].filter(Boolean);

    for (const { ctrl, hand } of ctrls) {
      if (!ctrl) continue;
      ctrl.getWorldPosition(_tmpCtrlPos);

      // Sky buttons on control tablet
      let hitSky = false;
      for (const skyBtn of (_controlTablet.userData.skyBtnMeshes || [])) {
        skyBtn.getWorldPosition(_tmpPanelPos);
        if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.12) {
          _applySkyPreset(skyBtn.userData.skyPreset);
          hitSky = true; break;
        }
      }
      if (hitSky) continue;

      // Spell panel — fireball button
      _spellPanel.userData.fireballBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.15) {
        _castFireball();
        continue;
      }

      // Spell panel — grab to move
      if (!_spellGrabState.holder) {
        let spellInRange = false;
        for (const sh of (_spellPanel.userData.sideHandles || [])) {
          sh.getWorldPosition(_tmpPanelPos);
          if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.14) { spellInRange = true; break; }
        }
        if (!spellInRange) {
          _spellPanel.getWorldPosition(_tmpPanelPos);
          if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= PANEL_GRAB_DISTANCE) spellInRange = true;
        }
        if (spellInRange) {
          ctrl.attach(_spellPanel);
          _spellGrabState.holder = hand;
          continue;
        }
      }

      // LASER button
      _controlTablet.userData.laserBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.14) {
        _laserActive = !_laserActive;
        _laserGroup.visible = _laserActive;
        _laserPivots.forEach(({ light }) => { light.intensity = _laserActive ? 3.5 : 0; });
        _drawTabletBtn(_controlTablet.userData.laserBtnCanvas, _controlTablet.userData.laserBtnTex, '✦', 'LASER', _laserActive);
        continue;
      }

      // DISCO button
      _controlTablet.userData.discoBtnMesh.getWorldPosition(_tmpPanelPos);
      if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= 0.14) {
        _discoActive = !_discoActive;
        _discoGroup.visible = _discoActive;
        _discoLights.forEach(l => { l.intensity = _discoActive ? 8 : 0; });
        _drawTabletBtn(_controlTablet.userData.discoBtnCanvas, _controlTablet.userData.discoBtnTex, '🪩', 'DISCO', _discoActive);
        continue;
      }

      // Grab whole tablet to move it (check handles first, then center)
      if (!_tabletGrabState.holder) {
        let tabletInRange = false;
        for (const handleBar of (_controlTablet.userData.sideHandles || [])) {
          handleBar.getWorldPosition(_tmpTabletPos);
          if (_tmpCtrlPos.distanceTo(_tmpTabletPos) <= 0.14) { tabletInRange = true; break; }
        }
        if (!tabletInRange) {
          _controlTablet.getWorldPosition(_tmpTabletPos);
          if (_tmpCtrlPos.distanceTo(_tmpTabletPos) <= PANEL_GRAB_DISTANCE) tabletInRange = true;
        }
        if (tabletInRange) {
          ctrl.attach(_controlTablet);
          _tabletGrabState.holder = hand;
          continue;
        }
      }

      // World panel grab
      if (!_panelGrabState.holder) {
        _worldPanel.getWorldPosition(_tmpPanelPos);
        if (_tmpCtrlPos.distanceTo(_tmpPanelPos) <= PANEL_GRAB_DISTANCE) {
          ctrl.attach(_worldPanel);
          _panelGrabState.holder = hand;
        }
      }
    }
  }

  // ── Release world panel grab ──────────────────────────────────────────────
  if (_panelGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    scene.attach(_worldPanel); _panelGrabState.holder = null;
  }
  if (_panelGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    scene.attach(_worldPanel); _panelGrabState.holder = null;
  }
  if (_spellGrabState.holder === 'left' && (!leftCtrl || !leftPressed)) {
    scene.attach(_spellPanel); _spellGrabState.holder = null;
  }
  if (_spellGrabState.holder === 'right' && (!rightCtrl || !rightPressed)) {
    scene.attach(_spellPanel); _spellGrabState.holder = null;
  }

  _grabPressedPrev.left = leftPressed;
  _grabPressedPrev.right = rightPressed;
}


function _updateQuestLocomotion(dt) {
  if (!renderer.xr.isPresenting) {
    _grabPressedPrev.left = false;
    _grabPressedPrev.right = false;
    if (_panelGrabState.holder) {
      scene.attach(_worldPanel);
      _panelGrabState.holder = null;
    }
    if (_tabletGrabState.holder) {
      scene.attach(_controlTablet);
      _tabletGrabState.holder = null;
    }
    if (_spellGrabState.holder) {
      scene.attach(_spellPanel);
      _spellGrabState.holder = null;
    }
    return;
  }

  const leftGp = _gamepadFromHandedness('left') || _controllersByHand.left?.userData?.inputSource?.gamepad;
  const rightGp = _gamepadFromHandedness('right') || _controllersByHand.right?.userData?.inputSource?.gamepad;
  _updatePanelInteraction(leftGp, rightGp);
  const left = _readStick(leftGp);
  const right = _readStick(rightGp);

  const xrCam = renderer.xr.getCamera(camera);
  xrCam.getWorldDirection(_tmpForward);
  _tmpForward.y = 0;
  if (_tmpForward.lengthSq() < 1e-6) _tmpForward.set(0, 0, -1);
  else _tmpForward.normalize();
  _tmpRight.crossVectors(_tmpForward, _tmpUp).normalize();

  const moveStep = MOVE_SPEED * dt;
  if (left.y !== 0) playerRig.position.addScaledVector(_tmpForward, -left.y * moveStep);
  if (left.x !== 0) playerRig.position.addScaledVector(_tmpRight, left.x * moveStep);

  if (right.x !== 0) playerRig.rotation.y -= right.x * TURN_SPEED * dt;
  playerPitch.rotation.x = 0;

  // Keep artificial locomotion look upright: yaw on rig + pitch on pivot only.
  playerRig.rotation.x = 0;
  playerRig.rotation.z = 0;
  playerPitch.rotation.y = 0;
  playerPitch.rotation.z = 0;
}

// VR button
const vrBtn = createVRButton(renderer);
if (vrBtn) document.getElementById('vr-btn-wrap').appendChild(vrBtn);

// ─── Lighting ─────────────────────────────────────────────────────────────────
const _sceneAmbient = new THREE.AmbientLight(0x1a2050, 4.0);
scene.add(_sceneAmbient);

const _sceneSun = new THREE.DirectionalLight(0x6699ff, 1.6);
_sceneSun.position.set(4, 8, 3);
scene.add(_sceneSun);

const _sceneRim = new THREE.DirectionalLight(0x2244cc, 0.9);
_sceneRim.position.set(-5, 2, -4);
scene.add(_sceneRim);

// Soft fill from below to reduce harsh shadows
const _sceneFill = new THREE.DirectionalLight(0x112244, 0.4);
_sceneFill.position.set(0, -4, 2);
scene.add(_sceneFill);

// ─── Starfield ────────────────────────────────────────────────────────────────
(function buildStars() {
  const count = 1800;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 30 + Math.random() * 20;
    pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xfff8e8, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.7,
  })));
})();

// ─── Floor grid ───────────────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 30, 30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0e1a,
  roughness: 0.9,
  metalness: 0.1,
  wireframe: true,
  transparent: true,
  opacity: 0.18,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
scene.add(floor);

// XYZ compass — placed 1.5m in front of the player at floor level
(function buildCompass() {
  const root = new THREE.Group();
  root.position.set(0, 0.01, -1.5); // just above floor, 1.5m ahead

  const axes = [
    { dir: new THREE.Vector3(1, 0, 0),  color: 0xff2222, label: '+X' },
    { dir: new THREE.Vector3(0, 1, 0),  color: 0x22ff22, label: '+Y' },
    { dir: new THREE.Vector3(0, 0, -1), color: 0x2288ff, label: '-Z (fwd)' },
  ];

  axes.forEach(({ dir, color, label }) => {
    // Arrow shaft
    const points = [new THREE.Vector3(0,0,0), dir.clone().multiplyScalar(0.3)];
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(points),
      new THREE.LineBasicMaterial({ color, linewidth: 2 })
    );
    root.add(line);

    // Arrowhead (small cone)
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.02, 0.07, 6),
      new THREE.MeshBasicMaterial({ color })
    );
    cone.position.copy(dir.clone().multiplyScalar(0.33));
    // Orient cone along axis
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    root.add(cone);

    // Text sprite (canvas texture)
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 64, 32);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
    sprite.scale.set(0.18, 0.09, 1);
    sprite.position.copy(dir.clone().multiplyScalar(0.45));
    root.add(sprite);
  });

  // Origin dot
  root.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.025, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  ));

  scene.add(root);
})();

// ── Hand Tracking — per-segment live deformation ─────────────────────────────
//
// Each bone segment is an independent CylinderMesh. Every frame:
//   position  = midpoint of the two joint world positions
//   scale.y   = distance between the joints  (unit cylinder → exact length)
//   quaternion = Y-axis aligned to the joint-to-joint direction
//
// This is the standard approach used by Three.js XRHandModel and all major
// WebXR demos. SkinnedMesh requires a pre-authored bind pose and proper
// inverse-bind matrices; dynamically captured rest poses cannot satisfy those
// constraints reliably.
//
// Joint pairs: [proximalName, distalName, cylinderRadius, sphereCapRadius]
const HAND_SEGMENTS = [
  // Wrist → metacarpals (palm fan)
  ['wrist','thumb-metacarpal',               0.013, 0.013],
  ['wrist','index-finger-metacarpal',        0.013, 0],
  ['wrist','middle-finger-metacarpal',       0.013, 0],
  ['wrist','ring-finger-metacarpal',         0.012, 0],
  ['wrist','pinky-finger-metacarpal',        0.011, 0],
  // Palm cross-bars
  ['index-finger-metacarpal','middle-finger-metacarpal', 0.009, 0],
  ['middle-finger-metacarpal','ring-finger-metacarpal',  0.009, 0],
  ['ring-finger-metacarpal','pinky-finger-metacarpal',   0.008, 0],
  // Thumb
  ['thumb-metacarpal','thumb-phalanx-proximal',   0.011, 0.010],
  ['thumb-phalanx-proximal','thumb-phalanx-distal',0.010, 0.009],
  ['thumb-phalanx-distal','thumb-tip',             0.009, 0.009],
  // Index
  ['index-finger-metacarpal','index-finger-phalanx-proximal',        0.010, 0.010],
  ['index-finger-phalanx-proximal','index-finger-phalanx-intermediate',0.009,0.009],
  ['index-finger-phalanx-intermediate','index-finger-phalanx-distal', 0.008, 0.008],
  ['index-finger-phalanx-distal','index-finger-tip',                  0.007, 0.008],
  // Middle
  ['middle-finger-metacarpal','middle-finger-phalanx-proximal',        0.011, 0.010],
  ['middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate',0.010,0.009],
  ['middle-finger-phalanx-intermediate','middle-finger-phalanx-distal', 0.009,0.008],
  ['middle-finger-phalanx-distal','middle-finger-tip',                  0.008,0.008],
  // Ring
  ['ring-finger-metacarpal','ring-finger-phalanx-proximal',        0.010, 0.009],
  ['ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate',0.009,0.009],
  ['ring-finger-phalanx-intermediate','ring-finger-phalanx-distal', 0.008,0.008],
  ['ring-finger-phalanx-distal','ring-finger-tip',                  0.007,0.007],
  // Pinky
  ['pinky-finger-metacarpal','pinky-finger-phalanx-proximal',        0.009, 0.009],
  ['pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate',0.008,0.008],
  ['pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal', 0.007,0.007],
  ['pinky-finger-phalanx-distal','pinky-finger-tip',                  0.006,0.007],
];

// A sphere cap at the wrist root.
const WRIST_CAP_RADIUS = 0.014;

const _handMat     = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.75, metalness: 0.0 });
const _handMatFlat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.75, metalness: 0.0 });
const _ctrlMat     = new THREE.MeshStandardMaterial({ color: 0xf1f1f1, roughness: 0.6, metalness: 0.05 });
const _ctrlAccent  = new THREE.MeshStandardMaterial({ color: 0x21242a, roughness: 0.8, metalness: 0.1 });

// Shared geometries — unit cylinder (h=1) scaled per-frame; spheres per radius.
const _cylGeoCache = new Map();
const _sphGeoCache = new Map();
function _cylGeo(r) {
  if (!_cylGeoCache.has(r)) _cylGeoCache.set(r, new THREE.CylinderGeometry(r, r, 1, 8, 1));
  return _cylGeoCache.get(r);
}
function _sphGeo(r) {
  if (!_sphGeoCache.has(r)) _sphGeoCache.set(r, new THREE.SphereGeometry(r, 8, 6));
  return _sphGeoCache.get(r);
}

// Reusable per-frame temporaries — zero GC pressure.
const _pA  = new THREE.Vector3(), _pB = new THREE.Vector3();
const _dir = new THREE.Vector3(), _yUp = new THREE.Vector3(0, 1, 0);
const _q   = new THREE.Quaternion();

function _alignSegment(mesh, jA, jB) {
  jA.getWorldPosition(_pA);
  jB.getWorldPosition(_pB);
  _dir.subVectors(_pB, _pA);
  const len = _dir.length();
  if (len < 0.0005) { mesh.visible = false; return; }
  mesh.visible = true;
  mesh.position.addVectors(_pA, _pB).multiplyScalar(0.5);
  mesh.scale.y = len;
  _q.setFromUnitVectors(_yUp, _dir.normalize());
  mesh.quaternion.copy(_q);
}

// Static fallback hand (controller mode).
function buildStaticHand(isRight) {
  const root = new THREE.Group();
  root.rotation.x = -Math.PI * 0.25;
  const flip = isRight ? 1 : -1;
  function addSphere(r, x, y, z, mat = _ctrlMat) {
    const m = new THREE.Mesh(_sphGeo(r), mat);
    m.position.set(x, y, z);
    root.add(m);
  }

  // Grip/handle: rounded downward chain.
  [
    { r: 0.022, x: 0, y: -0.010, z: 0.014 },
    { r: 0.020, x: 0, y: -0.031, z: 0.004 },
    { r: 0.017, x: 0, y: -0.048, z: -0.006 },
    { r: 0.014, x: 0, y: -0.061, z: -0.016 },
  ].forEach(({ r, x, y, z }) => addSphere(r, x, y, z));

  // Main face/body near top of grip.
  [
    { r: 0.020, x: 0, y: 0.004, z: 0.018 },
    { r: 0.016, x: 0, y: 0.013, z: 0.006 },
    { r: 0.015, x: 0, y: -0.001, z: 0.030 },
  ].forEach(({ r, x, y, z }) => addSphere(r, x, y, z));

  // Tracking ring arc (Quest-like halo), mirrored by handedness.
  [
    { r: 0.010, x: flip * 0.010, y: 0.026, z: 0.020 },
    { r: 0.010, x: flip * 0.026, y: 0.032, z: 0.010 },
    { r: 0.010, x: flip * 0.037, y: 0.024, z: -0.004 },
    { r: 0.010, x: flip * 0.035, y: 0.010, z: -0.016 },
    { r: 0.010, x: flip * 0.021, y: 0.001, z: -0.022 },
  ].forEach(({ r, x, y, z }) => addSphere(r, x, y, z));

  // Thumbstick and face buttons on top plate.
  addSphere(0.007, flip * 0.008, 0.022, 0.010, _ctrlAccent);
  addSphere(0.005, flip * 0.018, 0.017, 0.018, _ctrlAccent);
  addSphere(0.005, flip * 0.024, 0.013, 0.012, _ctrlAccent);

  // Trigger and grip accents.
  addSphere(0.007, flip * 0.012, -0.004, 0.033, _ctrlAccent);
  addSphere(0.006, flip * 0.018, -0.028, 0.004, _ctrlAccent);

  return root;
}

const _handUpdaters = [];

[0, 1].forEach(idx => {
  const ctrl    = renderer.xr.getController(idx);
  const xrHand  = renderer.xr.getHand(idx);
  const isRight = idx === 0;

  ctrl.addEventListener('connected', (e) => {
    ctrl.userData.inputSource = e.data;
    const handedness = e.data?.handedness;
    if (handedness === 'left' || handedness === 'right') {
      _controllersByHand[handedness] = ctrl;
    }
  });
  ctrl.addEventListener('disconnected', () => {
    const hand = ctrl.userData?.inputSource?.handedness;
    if (hand === 'left' || hand === 'right') {
      if (_controllersByHand[hand] === ctrl) _controllersByHand[hand] = null;
    }
    ctrl.userData.inputSource = null;
  });

  const staticHand = buildStaticHand(isRight);
  ctrl.add(staticHand);
  playerRig.add(ctrl);
  playerRig.add(xrHand);

  // Build all segment + cap meshes up-front (world-space, hidden by default).
  const segMeshes = HAND_SEGMENTS.map(([, , cylR]) => {
    const m = new THREE.Mesh(_cylGeo(cylR), _handMat);
    m.visible = false;
    scene.add(m);
    return m;
  });

  const capMeshes = HAND_SEGMENTS.map(([, , , capR]) => {
    if (!capR) return null;
    const m = new THREE.Mesh(_sphGeo(capR), _handMat);
    m.visible = false;
    scene.add(m);
    return m;
  });

  // Wrist cap
  const wristCap = new THREE.Mesh(_sphGeo(WRIST_CAP_RADIUS), _handMat);
  wristCap.visible = false;
  scene.add(wristCap);

  let _tracking = false;

  _handUpdaters.push(() => {
    // Three.js sets xrHand.visible = true only when it has a valid hand pose
    // each frame. Polling this is more reliable than the 'connected' event
    // whose e.data.hand may be null/undefined depending on session type.
    const nowTracking = xrHand.visible;
    if (nowTracking !== _tracking) {
      _tracking = nowTracking;
      staticHand.visible = !nowTracking;
      if (!nowTracking) {
        segMeshes.forEach(m => { m.visible = false; });
        capMeshes.forEach(m => { if (m) m.visible = false; });
        wristCap.visible = false;
      }
    }
    if (!_tracking) return;

    HAND_SEGMENTS.forEach(([nameA, nameB], i) => {
      const jA = xrHand.joints[nameA], jB = xrHand.joints[nameB];
      // Only align when both joints have a valid pose from the XR runtime.
      if (jA && jB && jA.visible && jB.visible) {
        _alignSegment(segMeshes[i], jA, jB);
        const cap = capMeshes[i];
        if (cap) {
          jB.getWorldPosition(cap.position);
          cap.visible = true;
        }
      } else {
        segMeshes[i].visible = false;
        if (capMeshes[i]) capMeshes[i].visible = false;
      }
    });
    // Wrist cap
    const wj = xrHand.joints['wrist'];
    if (wj && wj.visible) {
      wj.getWorldPosition(wristCap.position);
      wristCap.visible = true;
    }
    else { wristCap.visible = false; }
  });
});
// Animation loop — drive hand segment deformation then render.
renderer.setAnimationLoop(() => {
  const dt = Math.min(_clock.getDelta(), 0.05);
  _updateQuestLocomotion(dt);
  _updateLasers(dt);
  _updateFireballs(dt);
  _handUpdaters.forEach(fn => fn());
  renderer.render(scene, camera);
});
</script>
