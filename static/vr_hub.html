<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Paraval VR Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06090f;
      font-family: Georgia, serif;
    }
    #c {
      display: block;
      width: 100%; height: 100%;
    }
    #vr-btn-wrap {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #back-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      text-decoration: none;
      color: rgba(200,185,140,0.72);
      font-size: 13px;
      letter-spacing: 0.06em;
      border: 1px solid rgba(200,185,140,0.22);
      border-radius: 8px;
      padding: 7px 11px;
      background: rgba(6,9,15,0.7);
      backdrop-filter: blur(4px);
    }
    #back-link:hover { color: #e8d89a; border-color: rgba(200,185,140,0.55); }
    #hint {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(200,185,140,0.5);
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
      white-space: nowrap;
    }
    #no-xr-msg {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #c8b98c;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 24px;
    }
    #no-xr-msg.show { display: flex; }
    #no-xr-msg a { color: #a0c4e8; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-link" href="/">← Home</a>
<div id="hint"></div>
<div id="vr-btn-wrap"></div>
<div id="no-xr-msg">
  <span>WebXR / immersive-VR is not supported in this browser.</span>
  <span>Try Chrome on Android, Meta Browser, or a WebXR-capable desktop browser.</span>
  <a href="/">← Return to Home</a>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/static/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Inline minimal VRButton ─────────────────────────────────────────────────
function createVRButton(renderer) {
  const btn = document.createElement('button');
  btn.style.cssText = [
    'padding:12px 22px',
    'border:1px solid rgba(200,185,140,0.55)',
    'border-radius:10px',
    'background:rgba(15,19,31,0.94)',
    'color:#e8d89a',
    'font-size:13px',
    'letter-spacing:0.12em',
    'text-transform:uppercase',
    'cursor:pointer',
    'backdrop-filter:blur(4px)',
  ].join(';');

  if (!('xr' in navigator)) {
    document.getElementById('no-xr-msg').classList.add('show');
    return null;
  }

  let session = null;

  async function onStart(s) {
    s.addEventListener('end', onEnd);
    await renderer.xr.setSession(s);
    btn.textContent = 'Exit VR';
    session = s;
  }

  function onEnd() {
    session.removeEventListener('end', onEnd);
    btn.textContent = 'Enter VR';
    session = null;
  }

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (!supported) {
      document.getElementById('no-xr-msg').classList.add('show');
      btn.textContent = 'VR Not Supported';
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
    } else {
      btn.textContent = 'Enter VR';
      btn.onclick = () => {
        if (!session) {
          navigator.xr.requestSession('immersive-vr', {
            optionalFeatures: ['local-floor', 'bounded-floor', 'layers'],
          }).then(onStart);
        } else {
          session.end();
        }
      };
      // Auto-start if arriving from account hub Enter VR button
      let autostart = false;
      try { autostart = sessionStorage.getItem('vr-autostart') === '1'; sessionStorage.removeItem('vr-autostart'); } catch(_) {}
      if (autostart) btn.onclick();
    }
  }).catch(() => {
    document.getElementById('no-xr-msg').classList.add('show');
  });

  return btn;
}

// ─── Scene setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.setClearColor(0x06090f, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06090f, 0.045);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 80);
camera.position.set(0, 1.6, 0);
scene.add(camera);

// VR button
const vrBtn = createVRButton(renderer);
if (vrBtn) document.getElementById('vr-btn-wrap').appendChild(vrBtn);

// ─── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1830, 3.5));

const sun = new THREE.DirectionalLight(0xfff5d0, 1.8);
sun.position.set(4, 8, 3);
scene.add(sun);

const rimLight = new THREE.DirectionalLight(0x4466ff, 0.6);
rimLight.position.set(-5, 2, -4);
scene.add(rimLight);

// ─── Starfield ────────────────────────────────────────────────────────────────
(function buildStars() {
  const count = 1800;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 30 + Math.random() * 20;
    pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xfff8e8, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.7,
  })));
})();

// ─── Floor grid ───────────────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 30, 30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0e1a,
  roughness: 0.9,
  metalness: 0.1,
  wireframe: true,
  transparent: true,
  opacity: 0.18,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
scene.add(floor);

// XYZ compass — placed 1.5m in front of the player at floor level
(function buildCompass() {
  const root = new THREE.Group();
  root.position.set(0, 0.01, -1.5); // just above floor, 1.5m ahead

  const axes = [
    { dir: new THREE.Vector3(1, 0, 0),  color: 0xff2222, label: '+X' },
    { dir: new THREE.Vector3(0, 1, 0),  color: 0x22ff22, label: '+Y' },
    { dir: new THREE.Vector3(0, 0, -1), color: 0x2288ff, label: '-Z (fwd)' },
  ];

  axes.forEach(({ dir, color, label }) => {
    // Arrow shaft
    const points = [new THREE.Vector3(0,0,0), dir.clone().multiplyScalar(0.3)];
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(points),
      new THREE.LineBasicMaterial({ color, linewidth: 2 })
    );
    root.add(line);

    // Arrowhead (small cone)
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.02, 0.07, 6),
      new THREE.MeshBasicMaterial({ color })
    );
    cone.position.copy(dir.clone().multiplyScalar(0.33));
    // Orient cone along axis
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    root.add(cone);

    // Text sprite (canvas texture)
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 64, 32);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
    sprite.scale.set(0.18, 0.09, 1);
    sprite.position.copy(dir.clone().multiplyScalar(0.45));
    root.add(sprite);
  });

  // Origin dot
  root.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.025, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  ));

  scene.add(root);
})();

// ── Hand Tracking + Controller Fallback ──────────────────────────────────────
// Bone connections: adjacent joint pairs used to build deforming cylinder segments.
const HAND_BONES = [
  // Wrist fan to metacarpals
  ['wrist','thumb-metacarpal'],
  ['wrist','index-finger-metacarpal'],
  ['wrist','middle-finger-metacarpal'],
  ['wrist','ring-finger-metacarpal'],
  ['wrist','pinky-finger-metacarpal'],
  // Knuckle cross-bar
  ['index-finger-metacarpal', 'middle-finger-metacarpal'],
  ['middle-finger-metacarpal','ring-finger-metacarpal'],
  ['ring-finger-metacarpal',  'pinky-finger-metacarpal'],
  // Thumb
  ['thumb-metacarpal','thumb-phalanx-proximal'],
  ['thumb-phalanx-proximal','thumb-phalanx-distal'],
  ['thumb-phalanx-distal','thumb-tip'],
  // Index
  ['index-finger-metacarpal','index-finger-phalanx-proximal'],
  ['index-finger-phalanx-proximal','index-finger-phalanx-intermediate'],
  ['index-finger-phalanx-intermediate','index-finger-phalanx-distal'],
  ['index-finger-phalanx-distal','index-finger-tip'],
  // Middle
  ['middle-finger-metacarpal','middle-finger-phalanx-proximal'],
  ['middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate'],
  ['middle-finger-phalanx-intermediate','middle-finger-phalanx-distal'],
  ['middle-finger-phalanx-distal','middle-finger-tip'],
  // Ring
  ['ring-finger-metacarpal','ring-finger-phalanx-proximal'],
  ['ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate'],
  ['ring-finger-phalanx-intermediate','ring-finger-phalanx-distal'],
  ['ring-finger-phalanx-distal','ring-finger-tip'],
  // Pinky
  ['pinky-finger-metacarpal','pinky-finger-phalanx-proximal'],
  ['pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate'],
  ['pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal'],
  ['pinky-finger-phalanx-distal','pinky-finger-tip'],
];

// Joint sphere caps at knuckles + fingertips for visual roundness.
const CAP_JOINTS = [
  'wrist',
  'thumb-tip','index-finger-tip','middle-finger-tip','ring-finger-tip','pinky-finger-tip',
  'thumb-phalanx-proximal',
  'index-finger-phalanx-proximal','middle-finger-phalanx-proximal',
  'ring-finger-phalanx-proximal', 'pinky-finger-phalanx-proximal',
];

const _handMat    = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.85, metalness: 0.0 });
// Unit-height cylinder (height=1m) — scale.y is set per-frame to match joint-to-joint distance.
const _boneCylGeo = new THREE.CylinderGeometry(0.008, 0.008, 1, 8, 1);
const _jointCapGeo = new THREE.SphereGeometry(0.009, 8, 6);

// Reusable temporaries — avoid allocating on every frame.
const _bpA = new THREE.Vector3(), _bpB = new THREE.Vector3();
const _bdir = new THREE.Vector3(), _bUp = new THREE.Vector3(0, 1, 0);

// Reorients a unit-height cylinder so it spans from joint A to joint B.
function _updateBone(mesh, jA, jB) {
  jA.getWorldPosition(_bpA);
  jB.getWorldPosition(_bpB);
  _bdir.subVectors(_bpB, _bpA);
  const len = _bdir.length();
  if (len < 0.001) { mesh.visible = false; return; }
  mesh.visible = true;
  mesh.position.addVectors(_bpA, _bpB).multiplyScalar(0.5);
  mesh.scale.y = len;
  mesh.quaternion.setFromUnitVectors(_bUp, _bdir.divideScalar(len));
}

const _boneUpdaters = []; // per-frame callbacks registered per hand

// Static procedural hand — shown when hand tracking is unavailable (controller mode).
function buildProceduralHand(isRight) {
  const root = new THREE.Group();
  const flip = isRight ? 1 : -1;
  function addBox(w, h, d, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), _handMat);
    m.position.set(x, y, z);
    root.add(m);
  }
  // Palm
  addBox(0.078, 0.022, 0.095, 0, 0, 0.048);
  // Four fingers: index → pinky
  const fingers = [
    { x: flip *  0.026, lens: [0.032, 0.022, 0.018], w: 0.016 },
    { x: flip *  0.009, lens: [0.036, 0.025, 0.019], w: 0.017 },
    { x: -flip * 0.008, lens: [0.030, 0.021, 0.016], w: 0.015 },
    { x: -flip * 0.025, lens: [0.022, 0.016, 0.013], w: 0.012 },
  ];
  fingers.forEach(({ x, lens, w }) => {
    let z = 0;
    lens.forEach(len => { addBox(w, w * 0.85, len, x, 0, z - len / 2); z -= len + 0.002; });
  });
  // Thumb
  const tp = new THREE.Group();
  tp.position.set(flip * 0.040, 0, 0.038);
  tp.rotation.z = flip * -0.55;
  tp.rotation.y = flip *  0.30;
  let tz = 0;
  [{ w: 0.018, d: 0.034 }, { w: 0.015, d: 0.026 }].forEach(({ w, d }) => {
    const s = new THREE.Mesh(new THREE.BoxGeometry(w, w * 0.85, d), _handMat);
    s.position.set(0, 0, tz - d / 2); tp.add(s); tz -= d + 0.003;
  });
  root.add(tp);
  return root;
}

[0, 1].forEach(idx => {
  const ctrl    = renderer.xr.getController(idx);
  const xrHand  = renderer.xr.getHand(idx);
  const isRight = idx === 0;

  // Static fallback hand lives in controller space
  const staticHand = buildProceduralHand(isRight);
  ctrl.add(staticHand);

  // Ray pointer — only useful in controller mode
  const rayLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-3)]),
    new THREE.LineBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.4 })
  );
  ctrl.add(rayLine);
  scene.add(ctrl);

  // Bone cylinder meshes — world-space objects repositioned every frame.
  const boneMeshes = HAND_BONES.map(([nameA, nameB]) => {
    const mesh = new THREE.Mesh(_boneCylGeo, _handMat);
    mesh.visible = false;
    scene.add(mesh);
    return { mesh, nameA, nameB };
  });

  // Sphere caps at knuckles / fingertips — children of their XRJointSpace.
  CAP_JOINTS.forEach(name => {
    const joint = xrHand.joints[name];
    if (joint) {
      const cap = new THREE.Mesh(_jointCapGeo, _handMat);
      cap.visible = false;
      joint.add(cap);
    }
  });
  scene.add(xrHand);

  let _tracking = false;

  // Per-frame: update every bone cylinder from live joint world-space positions.
  _boneUpdaters.push(() => {
    if (!_tracking) return;
    boneMeshes.forEach(({ mesh, nameA, nameB }) => {
      const jA = xrHand.joints[nameA], jB = xrHand.joints[nameB];
      if (jA && jB) _updateBone(mesh, jA, jB);
    });
  });

  xrHand.addEventListener('connected', e => {
    _tracking = !!e.data.hand;
    staticHand.visible = !_tracking;
    rayLine.visible    = !_tracking;
    boneMeshes.forEach(({ mesh }) => { mesh.visible = _tracking; });
    CAP_JOINTS.forEach(name => {
      const j = xrHand.joints[name];
      if (j && j.children[0]) j.children[0].visible = _tracking;
    });
  });
  xrHand.addEventListener('disconnected', () => {
    _tracking = false;
    staticHand.visible = true;
    rayLine.visible    = true;
    boneMeshes.forEach(({ mesh }) => { mesh.visible = false; });
    CAP_JOINTS.forEach(name => {
      const j = xrHand.joints[name];
      if (j && j.children[0]) j.children[0].visible = false;
    });
  });
});

// Animation loop — drive hand bone deformation then render.
renderer.setAnimationLoop(() => {
  _boneUpdaters.forEach(fn => fn());
  renderer.render(scene, camera);
});
</script>
</body>
</html>
