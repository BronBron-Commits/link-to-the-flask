<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Paraval VR Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06090f;
      font-family: Georgia, serif;
    }
    #c {
      display: block;
      width: 100%; height: 100%;
    }
    #vr-btn-wrap {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #back-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      text-decoration: none;
      color: rgba(200,185,140,0.72);
      font-size: 13px;
      letter-spacing: 0.06em;
      border: 1px solid rgba(200,185,140,0.22);
      border-radius: 8px;
      padding: 7px 11px;
      background: rgba(6,9,15,0.7);
      backdrop-filter: blur(4px);
    }
    #back-link:hover { color: #e8d89a; border-color: rgba(200,185,140,0.55); }
    #hint {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(200,185,140,0.5);
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
      white-space: nowrap;
    }
    #no-xr-msg {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #c8b98c;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 24px;
    }
    #no-xr-msg.show { display: flex; }
    #no-xr-msg a { color: #a0c4e8; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-link" href="/">← Home</a>
<div id="hint"></div>
<div id="vr-btn-wrap"></div>
<div id="no-xr-msg">
  <span>WebXR / immersive-VR is not supported in this browser.</span>
  <span>Try Chrome on Android, Meta Browser, or a WebXR-capable desktop browser.</span>
  <a href="/">← Return to Home</a>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/static/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Inline minimal VRButton ─────────────────────────────────────────────────
function createVRButton(renderer) {
  const btn = document.createElement('button');
  btn.style.cssText = [
    'padding:12px 22px',
    'border:1px solid rgba(200,185,140,0.55)',
    'border-radius:10px',
    'background:rgba(15,19,31,0.94)',
    'color:#e8d89a',
    'font-size:13px',
    'letter-spacing:0.12em',
    'text-transform:uppercase',
    'cursor:pointer',
    'backdrop-filter:blur(4px)',
  ].join(';');

  if (!('xr' in navigator)) {
    document.getElementById('no-xr-msg').classList.add('show');
    return null;
  }

  let session = null;

  async function onStart(s) {
    s.addEventListener('end', onEnd);
    await renderer.xr.setSession(s);
    btn.textContent = 'Exit VR';
    session = s;
  }

  function onEnd() {
    session.removeEventListener('end', onEnd);
    btn.textContent = 'Enter VR';
    session = null;
  }

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (!supported) {
      document.getElementById('no-xr-msg').classList.add('show');
      btn.textContent = 'VR Not Supported';
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
    } else {
      btn.textContent = 'Enter VR';
      btn.onclick = () => {
        if (!session) {
          navigator.xr.requestSession('immersive-vr', {
            optionalFeatures: ['local-floor', 'bounded-floor', 'layers'],
          }).then(onStart);
        } else {
          session.end();
        }
      };
      // Auto-start if arriving from account hub Enter VR button
      let autostart = false;
      try { autostart = sessionStorage.getItem('vr-autostart') === '1'; sessionStorage.removeItem('vr-autostart'); } catch(_) {}
      if (autostart) btn.onclick();
    }
  }).catch(() => {
    document.getElementById('no-xr-msg').classList.add('show');
  });

  return btn;
}

// ─── Scene setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.setClearColor(0x06090f, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06090f, 0.045);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 80);
camera.position.set(0, 1.6, 0);
scene.add(camera);

// VR button
const vrBtn = createVRButton(renderer);
if (vrBtn) document.getElementById('vr-btn-wrap').appendChild(vrBtn);

// ─── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1830, 3.5));

const sun = new THREE.DirectionalLight(0xfff5d0, 1.8);
sun.position.set(4, 8, 3);
scene.add(sun);

const rimLight = new THREE.DirectionalLight(0x4466ff, 0.6);
rimLight.position.set(-5, 2, -4);
scene.add(rimLight);

// ─── Starfield ────────────────────────────────────────────────────────────────
(function buildStars() {
  const count = 1800;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 30 + Math.random() * 20;
    pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xfff8e8, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.7,
  })));
})();

// ─── Floor grid ───────────────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 30, 30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0e1a,
  roughness: 0.9,
  metalness: 0.1,
  wireframe: true,
  transparent: true,
  opacity: 0.18,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
scene.add(floor);

// XYZ compass — placed 1.5m in front of the player at floor level
(function buildCompass() {
  const root = new THREE.Group();
  root.position.set(0, 0.01, -1.5); // just above floor, 1.5m ahead

  const axes = [
    { dir: new THREE.Vector3(1, 0, 0),  color: 0xff2222, label: '+X' },
    { dir: new THREE.Vector3(0, 1, 0),  color: 0x22ff22, label: '+Y' },
    { dir: new THREE.Vector3(0, 0, -1), color: 0x2288ff, label: '-Z (fwd)' },
  ];

  axes.forEach(({ dir, color, label }) => {
    // Arrow shaft
    const points = [new THREE.Vector3(0,0,0), dir.clone().multiplyScalar(0.3)];
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(points),
      new THREE.LineBasicMaterial({ color, linewidth: 2 })
    );
    root.add(line);

    // Arrowhead (small cone)
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.02, 0.07, 6),
      new THREE.MeshBasicMaterial({ color })
    );
    cone.position.copy(dir.clone().multiplyScalar(0.33));
    // Orient cone along axis
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    root.add(cone);

    // Text sprite (canvas texture)
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 64, 32);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
    sprite.scale.set(0.18, 0.09, 1);
    sprite.position.copy(dir.clone().multiplyScalar(0.45));
    root.add(sprite);
  });

  // Origin dot
  root.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.025, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  ));

  scene.add(root);
})();

// ── Skinned Hand Mesh with WebXR Joint Skeleton ───────────────────────────────
//
// Strategy:
//   1. 25 THREE.Bone objects mirror the WebXR XRJointSpace hierarchy.
//   2. A SkinnedMesh is built from capsule-tube segments per bone; each vertex
//      carries skinIndex/skinWeight attributes pointing to exactly one bone.
//   3. Every frame the bone's matrixWorld is overwritten directly from the
//      corresponding XRJointSpace.matrixWorld, then skeleton.update() applies
//      the bind-pose inverse to produce the skinning matrices.
//   4. When hand tracking is unavailable a static controller-space box hand is
//      shown as fallback.
//
// Joint order matches the WebXR Hand Input spec (index 0-24).
const JOINT_NAMES = [
  'wrist',                                              // 0
  'thumb-metacarpal','thumb-phalanx-proximal',          // 1-2
  'thumb-phalanx-distal','thumb-tip',                   // 3-4
  'index-finger-metacarpal','index-finger-phalanx-proximal',     // 5-6
  'index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip', // 7-9
  'middle-finger-metacarpal','middle-finger-phalanx-proximal',    // 10-11
  'middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip', // 12-14
  'ring-finger-metacarpal','ring-finger-phalanx-proximal',        // 15-16
  'ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip', // 17-19
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal',      // 20-21
  'pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip', // 22-24
];

// Parent index for each joint (WebXR spec hierarchy).
const JOINT_PARENT = [
  -1,  // wrist = root
   0,1,2,3,           // thumb chain
   0,5,6,7,8,         // index chain
   0,10,11,12,13,     // middle chain
   0,15,16,17,18,     // ring chain
   0,20,21,22,23,     // pinky chain
];

// Each finger segment: [proximalJointIdx, distalJointIdx, tubeRadius]
const BONE_SEGMENTS = [
  [0,1,0.012],[1,2,0.010],[2,3,0.009],[3,4,0.008],           // thumb
  [0,5,0.012],[5,6,0.011],[6,7,0.009],[7,8,0.008],[8,9,0.007], // index
  [0,10,0.012],[10,11,0.011],[11,12,0.009],[12,13,0.008],[13,14,0.007], // middle
  [0,15,0.011],[15,16,0.010],[16,17,0.008],[17,18,0.007],[18,19,0.006], // ring
  [0,20,0.010],[20,21,0.009],[21,22,0.007],[22,23,0.006],[23,24,0.006], // pinky
  // Palm cross-bars
  [5,10,0.008],[10,15,0.008],[15,20,0.007],
];

const _handMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.8, metalness: 0.0, skinning: true });
const _handMatFlat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.8, metalness: 0.0 });

// Build a tube (capsule-like) geometry from origin (0,0,0) to (0,len,0),
// all vertices weighted 100% to boneIdx, and the distal end blended toward
// distalBoneIdx so the joint bends smoothly.
function buildBoneTube(len, radius, boneIdx, distalIdx, radialSegs = 6, heightSegs = 3) {
  const positions = [], normals = [], skinIndices = [], skinWeights = [];
  const indices = [];

  const rows = heightSegs + 1;
  for (let r = 0; r < rows; r++) {
    const t = r / heightSegs;          // 0 at proximal, 1 at distal
    const y = t * len;
    // Blend weight: proximal end = full bone, distal end = 50/50 split
    const wProx = 1 - t * 0.5;
    const wDist = t * 0.5;
    for (let s = 0; s <= radialSegs; s++) {
      const angle = (s / radialSegs) * Math.PI * 2;
      const cx = Math.cos(angle) * radius;
      const cz = Math.sin(angle) * radius;
      positions.push(cx, y, cz);
      normals.push(cx / radius, 0, cz / radius);
      skinIndices.push(boneIdx, distalIdx, 0, 0);
      skinWeights.push(wProx, wDist, 0, 0);
    }
  }
  // Quads between rows
  const cols = radialSegs + 1;
  for (let r = 0; r < heightSegs; r++) {
    for (let s = 0; s < radialSegs; s++) {
      const a = r * cols + s, b = a + cols, c = b + 1, d = a + 1;
      indices.push(a, b, d, b, c, d);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',   new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal',     new THREE.Float32BufferAttribute(normals,   3));
  geo.setAttribute('skinIndex',  new THREE.Uint16BufferAttribute(skinIndices,  4));
  geo.setAttribute('skinWeight', new THREE.Float32BufferAttribute(skinWeights, 4));
  geo.setIndex(indices);
  return geo;
}

// Build one complete skinned hand mesh from a rest-pose joint position map.
// restPositions: Map<jointName, THREE.Vector3> in world space (captured at first frame).
function buildSkinnedHand(restPositions) {
  // Create bones matching the joint hierarchy.
  const bones = JOINT_NAMES.map((name, i) => {
    const b = new THREE.Bone();
    b.name = name;
    b.position.copy(restPositions.get(name) || new THREE.Vector3());
    return b;
  });
  // Parent bones (subtract parent world pos → local).
  bones.forEach((b, i) => {
    const pi = JOINT_PARENT[i];
    if (pi === -1) return; // wrist = scene root
    const parentPos = bones[pi].position;
    b.position.sub(parentPos); // convert to local space relative to parent
    bones[pi].add(b);
  });

  // Root pivot — placed at wrist world position.
  const rootPivot = new THREE.Group();
  rootPivot.position.copy(restPositions.get('wrist') || new THREE.Vector3());
  rootPivot.add(bones[0]);

  const skeleton = new THREE.Skeleton(bones);

  // Merge all segment geometries into one SkinnedMesh.
  const mergedPositions = [], mergedNormals = [], mergedSkinIdx = [], mergedSkinWt = [];
  const mergedIndices = [];
  let vertexOffset = 0;

  BONE_SEGMENTS.forEach(([proxIdx, distIdx, radius]) => {
    const pPos = restPositions.get(JOINT_NAMES[proxIdx]) || new THREE.Vector3();
    const dPos = restPositions.get(JOINT_NAMES[distIdx]) || new THREE.Vector3();
    const len  = pPos.distanceTo(dPos);
    if (len < 0.001) return;

    const geo = buildBoneTube(len, radius, proxIdx, distIdx);
    const pos = geo.attributes.position;
    const nor = geo.attributes.normal;
    const si  = geo.attributes.skinIndex;
    const sw  = geo.attributes.skinWeight;
    const idx = geo.index.array;

    // Orient the local tube from proximal joint toward distal joint.
    const dir = new THREE.Vector3().subVectors(dPos, pPos).normalize();
    const up  = new THREE.Vector3(0, 1, 0);
    const q   = new THREE.Quaternion().setFromUnitVectors(up, dir);
    const mat = new THREE.Matrix4().makeRotationFromQuaternion(q);
    mat.setPosition(pPos);

    for (let v = 0; v < pos.count; v++) {
      const lp = new THREE.Vector3(pos.getX(v), pos.getY(v), pos.getZ(v)).applyMatrix4(mat);
      mergedPositions.push(lp.x, lp.y, lp.z);
      const ln = new THREE.Vector3(nor.getX(v), nor.getY(v), nor.getZ(v)).applyMatrix3(new THREE.Matrix3().getNormalMatrix(mat));
      mergedNormals.push(ln.x, ln.y, ln.z);
      mergedSkinIdx.push(si.getX(v), si.getY(v), si.getZ(v), si.getW(v));
      mergedSkinWt.push(sw.getX(v), sw.getY(v), sw.getZ(v), sw.getW(v));
    }
    for (let i = 0; i < idx.length; i++) mergedIndices.push(idx[i] + vertexOffset);
    vertexOffset += pos.count;
  });

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',   new THREE.Float32BufferAttribute(mergedPositions, 3));
  geo.setAttribute('normal',     new THREE.Float32BufferAttribute(mergedNormals,   3));
  geo.setAttribute('skinIndex',  new THREE.Uint16BufferAttribute(mergedSkinIdx,  4));
  geo.setAttribute('skinWeight', new THREE.Float32BufferAttribute(mergedSkinWt,  4));
  geo.setIndex(mergedIndices);

  const skinnedMesh = new THREE.SkinnedMesh(geo, _handMat);
  skinnedMesh.add(bones[0]);
  skinnedMesh.bind(skeleton);

  return { skinnedMesh, skeleton, bones, rootPivot };
}

// Static fallback hand (no hand-tracking).
function buildStaticHand(isRight) {
  const root = new THREE.Group();
  const flip = isRight ? 1 : -1;
  function addBox(w, h, d, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), _handMatFlat);
    m.position.set(x, y, z); root.add(m);
  }
  addBox(0.078, 0.022, 0.095, 0, 0, 0.048);
  const fingers = [
    { x: flip * 0.026,  lens: [0.032,0.022,0.018], w: 0.016 },
    { x: flip * 0.009,  lens: [0.036,0.025,0.019], w: 0.017 },
    { x: -flip * 0.008, lens: [0.030,0.021,0.016], w: 0.015 },
    { x: -flip * 0.025, lens: [0.022,0.016,0.013], w: 0.012 },
  ];
  fingers.forEach(({ x, lens, w }) => {
    let z = 0;
    lens.forEach(len => { addBox(w, w*0.85, len, x, 0, z - len/2); z -= len + 0.002; });
  });
  const tp = new THREE.Group();
  tp.position.set(flip * 0.040, 0, 0.038);
  tp.rotation.z = flip * -0.55; tp.rotation.y = flip * 0.30;
  let tz = 0;
  [{ w: 0.018, d: 0.034 },{ w: 0.015, d: 0.026 }].forEach(({ w, d }) => {
    const s = new THREE.Mesh(new THREE.BoxGeometry(w, w*0.85, d), _handMatFlat);
    s.position.set(0, 0, tz - d/2); tp.add(s); tz -= d + 0.003;
  });
  root.add(tp);
  return root;
}

const _handUpdaters = [];
const _tmpMat4 = new THREE.Matrix4();

[0, 1].forEach(idx => {
  const ctrl   = renderer.xr.getController(idx);
  const xrHand = renderer.xr.getHand(idx);
  const isRight = idx === 0;

  // Fallback: static box hand on the controller.
  const staticHand = buildStaticHand(isRight);
  ctrl.add(staticHand);
  const rayLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-3)]),
    new THREE.LineBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.4 })
  );
  ctrl.add(rayLine);
  scene.add(ctrl);
  scene.add(xrHand);

  let _tracking = false;
  let _skinnedData = null; // { skinnedMesh, skeleton, bones }
  let _restCaptured = false;

  // Called once on first tracked frame to build the skinned mesh from the real rest pose.
  function _captureAndBuild() {
    const restPos = new Map();
    JOINT_NAMES.forEach(name => {
      const j = xrHand.joints[name];
      if (j) {
        const wp = new THREE.Vector3();
        j.getWorldPosition(wp);
        restPos.set(name, wp);
      } else {
        restPos.set(name, new THREE.Vector3());
      }
    });
    _skinnedData = buildSkinnedHand(restPos);
    scene.add(_skinnedData.skinnedMesh);
    _restCaptured = true;
  }

  _handUpdaters.push(() => {
    if (!_tracking) return;
    if (!_restCaptured) { _captureAndBuild(); return; }

    const { skeleton, bones } = _skinnedData;
    // Drive each bone's world matrix directly from its XRJointSpace.
    JOINT_NAMES.forEach((name, i) => {
      const joint = xrHand.joints[name];
      if (!joint) return;
      // XRJointSpace world matrix is maintained by Three.js XR manager each frame.
      joint.updateWorldMatrix(true, false);
      bones[i].matrixWorld.copy(joint.matrixWorld);
      // Decompose into local TRS so Three.js hierarchy remains consistent.
      const pi = JOINT_PARENT[i];
      if (pi === -1) {
        bones[i].matrix.copy(joint.matrixWorld);
      } else {
        _tmpMat4.copy(bones[pi].matrixWorld).invert();
        bones[i].matrix.multiplyMatrices(_tmpMat4, joint.matrixWorld);
      }
      bones[i].matrix.decompose(bones[i].position, bones[i].quaternion, bones[i].scale);
      bones[i].matrixWorldNeedsUpdate = false;
    });
    skeleton.update();
  });

  xrHand.addEventListener('connected', e => {
    _tracking = !!e.data.hand;
    staticHand.visible = !_tracking;
    rayLine.visible    = !_tracking;
    if (_skinnedData) _skinnedData.skinnedMesh.visible = _tracking;
  });
  xrHand.addEventListener('disconnected', () => {
    _tracking = false;
    _restCaptured = false;
    staticHand.visible = true;
    rayLine.visible    = true;
    if (_skinnedData) { scene.remove(_skinnedData.skinnedMesh); _skinnedData = null; }
  });
});

// Animation loop — drive skinned hand deformation then render.
renderer.setAnimationLoop(() => {
  _handUpdaters.forEach(fn => fn());
  renderer.render(scene, camera);
});
</script>
</body>
</html>
